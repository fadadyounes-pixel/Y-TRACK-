/* ŌöĆŌöĆŌöĆ ERROR BOUNDARY ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { err: null };
  }
  static getDerivedStateFromError(e) { return { err: e }; }
  componentDidCatch(e, info) { console.error("CareerMap error:", e, info); }
  render() {
    if (this.state.err) {
      return React.createElement("div", { style: { display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", height:"100%", background:"#06111f", padding:24, textAlign:"center" } },
        React.createElement("div", { style: { fontSize:40, marginBottom:16 } }, "ŌÜĀ’ĖÅ"),
        React.createElement("p", { style: { color:"#f0f4f8", fontSize:16, fontWeight:700, marginBottom:8 } }, "Une erreur est survenue"),
        React.createElement("p", { style: { color:"#dc4c3c", fontSize:12, fontFamily:"monospace", background:"rgba(220,76,60,.1)", padding:"12px 16px", borderRadius:8, maxWidth:400, wordBreak:"break-word" } }, String(this.state.err)),
        React.createElement("button", { onClick: function(){ window.location.reload(); }, style: { marginTop:20, padding:"10px 24px", background:"#1aabaa", border:"none", borderRadius:10, color:"#06111f", fontWeight:800, fontSize:14, cursor:"pointer" } }, "Recharger")
      );
    }
    return this.props.children;
  }
}

  var pivotFill = onLight ? "#0f7e7d" : "#fff";

      <circle cx="24" cy="24" r="20" stroke={stroke} strokeWidth="2.6"/>

const ADMIN_CODE   = "@adminyfadad";
const RE_CANDIDATE = /^[A-Z]{2}\d{3,}$/;
const RE_ADVISOR   = /^@[A-Za-z]{2,}ADV$/i;

function detectRole(raw) {
  if (!raw) return null;
  const v = raw.trim();
  if (!v) return null;
  if (v.toLowerCase() === ADMIN_CODE.toLowerCase()) return "admin";
  if (RE_ADVISOR.test(v))   return "advisor";
  if (RE_CANDIDATE.test(v)) return "candidate";

/* ŌöĆŌöĆŌöĆ SCORING ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
function scoreGroup(questions, keyFn, answers, offset) {
  const s = {}, n = {};
  questions.forEach((q, i) => {
    const k = keyFn(q);
    s[k] = s[k] || 0;
    n[k] = n[k] || 0;
    const a = answers[i + offset];
    if (a != null) { s[k] += WTS[a]; n[k]++; }
  });
  const out = {};
  Object.keys(s).forEach(k => {
    out[k] = Math.round((s[k] / ((n[k] || 5) * 5)) * 100);
  });
  return out;
}
function computeScores(ans) {
  return {
    h: scoreGroup(HQ, q => q.c, ans, 0),
    b: scoreGroup(BQ, q => q.t, ans, 30),
    s: scoreGroup(SQ, q => q.d, ans, 55),
  };
}
function ranked(sc) {
  return Object.keys(sc || {}).sort((a, b) => (sc[b] || 0) - (sc[a] || 0));
}
function avg(sc) {
  const v = Object.values(sc || {});
  return v.length ? Math.round(v.reduce((a, b) => a + b, 0) / v.length) : 0;
}

      en:{
        R:{hi:"Your high Realistic score ("+v+"%) shows a strong natural orientation toward hands-on, technical work. You thrive in environments where you can see and touch the results of your work. Careers in engineering, construction, agriculture, mechanics, and industrial technology fit this profile well.<br/><br/>Seek roles that value field work, technical skills, and practical expertise. Advanced technical training (BTS, professional degrees) is an excellent investment for your career path.",
          med:"Your Realistic score ("+v+"%) shows moderate interest in practical and technical activities. This dimension complements your main strengths, especially in hybrid roles combining technical skills with social or analytical aptitudes.<br/><br/>Explore training programs with practical components (internships, applied projects) to develop this dimension purposefully.",
          lo:"Your Realistic score ("+v+"%) suggests that hands-on technical work is not your primary orientation. Focus on your dominant dimensions and remain open to the technical aspects your career may occasionally require."},
        I:{hi:"Your high Investigative score ("+v+"%) reveals exceptional intellectual curiosity and a strong drive for analysis and research. Fields such as research, medicine, computer science, and data science align perfectly with this profile.<br/><br/>Pursue demanding academic paths and develop deep technical expertise. Participating in research projects or scientific competitions will significantly strengthen your profile.",
          med:"Your Investigative score ("+v+"%) shows meaningful analytical interest and aptitude for systematic reasoning. This helps you approach problems methodically and collaborate effectively with scientific profiles.<br/><br/>Add training in data analysis or research methodology to develop this valuable dimension.",
          lo:"Your Investigative score ("+v+"%) indicates that deep analytical thinking is not your primary strength. Focus on your dominant dimensions and partner with analytical colleagues when needed."},
        A:{hi:"Your high Artistic score ("+v+"%) confirms a creative, original, and deeply expressive personality. Fields such as design, communication, arts, and creative marketing are especially suited to your profile.<br/><br/>Build a strong portfolio, participate in competitions, and develop a digital presence that showcases your creative identity.",
          med:"Your Artistic score ("+v+"%) indicates a creative sensibility that meaningfully enriches your professional profile. It allows you to bring original solutions and communicate more effectively.<br/><br/>Explore creative workshops and design courses to cultivate this dimension.",
          lo:"Your Artistic score ("+v+"%) suggests expressive creativity is not your primary orientation. Your strengths lie in other dimensions ŌĆö leverage them fully."},
        S:{hi:"Your high Social score ("+v+"%) reflects a deep orientation toward human interaction and helping others. Teaching, healthcare, social work, HR, and coaching careers align well with this profile.<br/><br/>Seek roles that combine expertise with client relations or training. Certifications in coaching or team management will strengthen your professional positioning.",
          med:"Your Social score ("+v+"%) shows a genuine aptitude for teamwork and interpersonal communication. You can build constructive professional relationships effectively.<br/><br/>Actively seek collaborative work experiences to strengthen your relational skills.",
          lo:"Your Social score ("+v+"%) suggests you prefer environments with less constant human interaction. Your strengths lie in other dimensions ŌĆö make the most of them."},
        E:{hi:"Your high Enterprising score ("+v+"%) reveals a strong leadership temperament and a natural taste for initiative. Commerce, management, entrepreneurship, and business leadership align with this profile.<br/><br/>Develop skills in financial management and strategic leadership. A business school path or launching your own project will be powerful accelerators.",
          med:"Your Enterprising score ("+v+"%) shows a notable aptitude for initiative and decision-making. You can take calculated risks and assert yourself in competitive contexts.<br/><br/>Seek leadership opportunities (project management, mentoring) to strengthen this dimension.",
          lo:"Your Enterprising score ("+v+"%) indicates that risk-taking and leadership are not your dominant natural orientations. Structured environments with clear objectives suit you better."},
        C:{hi:"Your high Conventional score ("+v+"%) shows a rigorous, methodical, and procedure-oriented temperament. Accounting, law, administration, and finance fields are a great match.<br/><br/>Pursue training in management or accounting. Professional certifications (CPA, CIMA) will reinforce your credibility.",
          med:"Your Conventional score ("+v+"%) indicates a good capacity to work within structured frameworks and respect established procedures.<br/><br/>Familiarize yourself with project management tools and work organization methods.",
          lo:"Your Conventional score ("+v+"%) suggests you prefer flexible environments over highly procedural ones. Your dominant dimensions will guide you toward more fitting professional contexts."}

function openPDF(profile, scores, role) {
  var html = buildReportHTML(profile, scores, role);
  var w = window.open("", "_blank");
  if (!w) { alert("Please allow pop-ups to download the PDF."); return; }
  w.document.write(html);
  w.document.close();
  w.focus();
  setTimeout(function() { try { w.print(); } catch(e) {} }, 600);
}

function openReport(html, filename) {
  /* Try Blob download */
  try {
    var blob = new Blob([html], { type:"text/html;charset=utf-8" });
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement("a");
    a.href = url; a.download = filename || "CareerMap-Report.html";
    document.body.appendChild(a); a.click();
    setTimeout(function(){ URL.revokeObjectURL(url); document.body.removeChild(a); }, 300);
    return;
  } catch(e1) {}
  /* Fallback: new tab */
  try {
    var w = window.open("", "_blank");
    if (w) { w.document.open(); w.document.write(html); w.document.close(); return; }
  } catch(e2) {}
  /* Last fallback: data URI */
  try {
    var a2 = document.createElement("a");
    a2.href = "data:text/html;charset=utf-8," + encodeURIComponent(html);
    a2.download = filename || "CareerMap-Report.html";
    document.body.appendChild(a2); a2.click(); document.body.removeChild(a2);
  } catch(e3) {}
}

/* ŌöĆŌöĆŌöĆ SPEEDOMETER GAUGE ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
function SpeedoGauge({ selected, onSelect, opts }) {
  var W=340, H=200, cx=170, cy=190, RO=148, RI=50, CR=16;

  function toRad(deg){ return deg * Math.PI / 180; }
  function pt(deg, r){ return { x: cx + r*Math.cos(toRad(deg)), y: cy - r*Math.sin(toRad(deg)) }; }

  function segPath(a1, a2) {
    var p1=pt(a1,RO), p2=pt(a2,RO), p3=pt(a2,RI), p4=pt(a1,RI);
    return "M "+p1.x+" "+p1.y+
           " A "+RO+" "+RO+" 0 0 0 "+p2.x+" "+p2.y+
           " L "+p3.x+" "+p3.y+
           " A "+RI+" "+RI+" 0 0 1 "+p4.x+" "+p4.y+" Z";
  }

  var SEGS = [[180,144],[144,108],[108,72],[72,36],[36,0]];
  var MIDS = [162, 126, 90, 54, 18];

  /* Bright colours for selected segment ŌĆö each segment gets its own accent */
  var SEG_COLS = ["#e53935","#fb8c00","#fdd835","#43a047","#00acc1"];

  var hasSel  = selected !== null && selected !== undefined;
  var needDeg = hasSel ? MIDS[selected] : 90;
  var tip     = pt(needDeg, RO * 0.72);
  var tail    = pt(needDeg + 180, 18);

  return (
    <svg width="100%" viewBox={"0 0 "+W+" "+H}
      style={{ display:"block", overflow:"visible" }}>
      <defs>
        <linearGradient id="sg_chrome" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%"   stopColor="#f5f5f5"/>
          <stop offset="18%"  stopColor="#d8d8d8"/>
          <stop offset="52%"  stopColor="#a0a0a0"/>
          <stop offset="82%"  stopColor="#888"/>
          <stop offset="100%" stopColor="#c8c8c8"/>
        </linearGradient>
        <linearGradient id="sg_shine" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stopColor="rgba(255,255,255,.55)"/>
          <stop offset="38%"  stopColor="rgba(255,255,255,0)"/>
          <stop offset="62%"  stopColor="rgba(255,255,255,0)"/>
          <stop offset="100%" stopColor="rgba(255,255,255,.35)"/>
        </linearGradient>
      </defs>

      {/* ŌöĆŌöĆ Outer chrome ring ŌöĆŌöĆ */}
      <path
        d={"M "+pt(180,RO+CR).x+" "+pt(180,RO+CR).y+
            " A "+(RO+CR)+" "+(RO+CR)+" 0 0 0 "+pt(0,RO+CR).x+" "+pt(0,RO+CR).y+
            " L "+pt(0,RO).x+" "+pt(0,RO).y+
            " A "+RO+" "+RO+" 0 0 1 "+pt(180,RO).x+" "+pt(180,RO).y+" Z"}
        fill="url(#sg_chrome)"/>
      <path
        d={"M "+pt(180,RO+CR).x+" "+pt(180,RO+CR).y+
            " A "+(RO+CR)+" "+(RO+CR)+" 0 0 0 "+pt(0,RO+CR).x+" "+pt(0,RO+CR).y+
            " L "+pt(0,RO).x+" "+pt(0,RO).y+
            " A "+RO+" "+RO+" 0 0 1 "+pt(180,RO).x+" "+pt(180,RO).y+" Z"}
        fill="url(#sg_shine)"/>
      <path d={"M "+pt(180,RO+CR).x+" "+pt(180,RO+CR).y+" A "+(RO+CR)+" "+(RO+CR)+" 0 0 0 "+pt(0,RO+CR).x+" "+pt(0,RO+CR).y}
        fill="none" stroke="#ddd" strokeWidth={1}/>
      <path d={"M "+pt(180,RO).x+" "+pt(180,RO).y+" A "+RO+" "+RO+" 0 0 0 "+pt(0,RO).x+" "+pt(0,RO).y}
        fill="none" stroke="#666" strokeWidth={1}/>

      {/* ŌöĆŌöĆ Segments ŌöĆŌöĆ */}
      {SEGS.map(function(s, i){
        var isSel = selected === i;
        return (
          <path key={i} d={segPath(s[0], s[1])}
            fill={isSel ? SEG_COLS[i] : "#167070"}
            onClick={function(){ onSelect(i); }}
            style={{ cursor:"pointer", transition:"fill .15s" }}/>
        );
      })}

      {/* Segment dividers */}
      {[144,108,72,36].map(function(deg){
        var a=pt(deg,RI+1), b=pt(deg,RO-1);
        return <line key={deg} x1={a.x} y1={a.y} x2={b.x} y2={b.y}
          stroke="rgba(0,0,0,.4)" strokeWidth={1.5}/>;
      })}

      {/* Bottom flat fill */}
      <rect x={cx-RO} y={cy-4} width={RO*2} height={8} fill="#167070"/>

      {/* ŌöĆŌöĆ Labels ŌöĆŌöĆ */}
      {MIDS.map(function(deg, i){
        var lp    = pt(deg, (RO+RI)/2);
        var words = (opts[i]||"").split(" ");
        var isSel = selected === i;
        return (
          <text key={i} x={lp.x} y={lp.y}
            textAnchor="middle" dominantBaseline="middle"
            fill={isSel ? "#fff" : "rgba(255,255,255,.75)"}
            fontSize={isSel ? 11 : 9}
            fontWeight={isSel ? "900" : "500"}
            fontFamily="Arial,sans-serif"
            onClick={function(){ onSelect(i); }}
            style={{ cursor:"pointer", transition:"fill .15s, font-size .15s" }}>
            {words.map(function(w, j){
              return <tspan key={j} x={lp.x} dy={j===0 ? -((words.length-1)*6) : 12}>
                {w.toUpperCase()}
              </tspan>;
            })}
          </text>
        );
      })}

      {/* ŌöĆŌöĆ Needle / Arrow ŌĆö drawn directly, no CSS transition issues ŌöĆŌöĆ */}
      {hasSel && (
        <g>
          {/* Shadow */}
          <line x1={cx+1} y1={cy+1} x2={tip.x+1} y2={tip.y+1}
            stroke="rgba(0,0,0,.3)" strokeWidth={5} strokeLinecap="round"/>
          {/* Main needle shaft */}
          <line x1={cx} y1={cy} x2={tip.x} y2={tip.y}
            stroke="#ffffff" strokeWidth={4} strokeLinecap="round"/>
          {/* Arrowhead triangle */}
          {(function(){
            var ang   = Math.atan2(cy - tip.y, tip.x - cx);
            var aw    = 9;
            var al    = 18;
            var bx    = tip.x - al*Math.cos(ang);
            var by    = tip.y + al*Math.sin(ang);
            var lx    = bx - aw*Math.sin(ang);
            var ly    = by - aw*Math.cos(ang);
            var rx    = bx + aw*Math.sin(ang);
            var ry    = by + aw*Math.cos(ang);
            return <polygon
              points={tip.x+","+tip.y+" "+lx+","+ly+" "+rx+","+ry}
              fill="#ffffff"/>;
          })()}
          {/* Counterweight */}
          <line x1={cx} y1={cy} x2={tail.x} y2={tail.y}
            stroke="rgba(255,255,255,.4)" strokeWidth={4} strokeLinecap="round"/>
        </g>
      )}

      {/* ŌöĆŌöĆ Hub ŌöĆŌöĆ */}
      <circle cx={cx} cy={cy} r={20} fill="#0a3a3a" stroke="#777" strokeWidth={2}/>
      <circle cx={cx} cy={cy} r={11}
        fill={hasSel ? SEG_COLS[selected] : "#334"}
        style={{ transition:"fill .15s" }}/>
      <circle cx={cx} cy={cy} r={5} fill="rgba(255,255,255,.75)"/>
    </svg>
  );
}


/* ŌöĆŌöĆŌöĆ LOGIN ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
function Login({ lang, setLang, onLogin, advisors }) {
  injectCSS();
  var ar = lang === "ar";
  var [val, setVal] = useState("");
  var [err, setErr] = useState("");
  var role = detectRole(val);

  var RCOL = { admin:C.gr, advisor:C.am, candidate:C.teal, unknown:C.re };

  var RICO = { admin:"ŌÜÖ’ĖÅ", advisor:"­¤æö", candidate:"­¤Äō", unknown:"ŌØī" };
  var RLBL = {
    admin:     ar ? "┘ģž»┘Ŗž▒ ž¦┘ä┘åžĖž¦┘ģ"        : lang==="fr" ? "Administrateur"    : "Administrator",
    advisor:   ar ? "┘ģž│ž¬ž┤ž¦ž▒"             : lang==="fr" ? "Conseiller"         : "Advisor",
    candidate: ar ? "┘ģž¬ž▒ž┤žŁ"              : lang==="fr" ? "Candidat"           : "Candidate",
    unknown:   ar ? "žĄ┘Ŗž║ž® ž║┘Ŗž▒ ┘ģž╣ž▒┘ł┘üž®"   : lang==="fr" ? "Format non reconnu" : "Unrecognised format",
  };

  function submit() {

          <input

          <button onClick={submit}

/* ŌöĆŌöĆŌöĆ ASSESSMENT ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
var TIMER_SECS = 10;
var PHASE_SIZES = [30, 25, 20];
var PHASE_COLS  = [C.teal, C.gold, C.pu];
var PHASE_NAMES = ["Holland", "Big Five", "Skill Up"];

function Assessment({ lang, setLang, user, onFinish }) {
  var ar = lang === "ar";
  var [idx, setIdx] = useState(0);
  var [timer, setTimer] = useState(TIMER_SECS);
  var ansRef = useRef({});
  var [, rerender] = useState(0);
  var timerRef = useRef(null);

  var q = ALL_Q[idx];
  var phase = idx < 30 ? 0 : idx < 55 ? 1 : 2;
  var localI = phase===0 ? idx : phase===1 ? idx-30 : idx-55;
  var catKey = q.c || q.t || q.d;
  var catCol = phase===0 ? C.hc[q.c] : phase===1 ? C.b5[q.t] : C.su[q.d];
  var cur = ansRef.current[idx];

  var OPTS_MAIN = {
    en:["Strongly Agree","Agree","Neutral","Disagree","Strongly Disagree"],
    fr:["Tout ├Ā fait d'accord","D'accord","Neutre","Pas d'accord","Pas du tout d'accord"],
    ar:["žŻ┘łž¦┘ü┘é ž©ž┤ž»ž®","žŻ┘łž¦┘ü┘é","┘ģžŁž¦┘Ŗž»","┘äž¦ žŻ┘łž¦┘ü┘é","┘äž¦ žŻ┘łž¦┘ü┘é ž©ž┤ž»ž®"],
  };
  var OPTS_FREQ = {
    en:["Always","Often","Sometimes","Rarely","Never"],
    fr:["Toujours","Souvent","Parfois","Rarement","Jamais"],
    ar:["ž»ž¦ž”┘ģž¦┘ŗ","┘āž½┘Ŗž▒ž¦┘ŗ","žŻžŁ┘Ŗž¦┘åž¦┘ŗ","┘åž¦ž»ž▒ž¦┘ŗ","žŻž©ž»ž¦┘ŗ"],
  };
  var opts = (phase < 2 ? OPTS_MAIN[lang] : OPTS_FREQ[lang]) || OPTS_MAIN.en;

  var timedOut = useRef(false);

  function goNext(sel) {
    clearInterval(timerRef.current);
    if (sel !== null) {
      ansRef.current = Object.assign({}, ansRef.current, { [idx]: sel });
      rerender(function(n) { return n + 1; });
    }
    var nxt = idx + 1;
    if (nxt >= 75) { onFinish(computeScores(ansRef.current)); return; }
    setIdx(nxt);
    setTimer(TIMER_SECS);
  }

  useEffect(function() {
    timedOut.current = false;
    timerRef.current = setInterval(function() {
      setTimer(function(s) {
        if (s <= 1) {
          clearInterval(timerRef.current);
          if (!timedOut.current) {
            timedOut.current = true;
            setTimeout(function() { goNext(null); }, 0);
          }
          return 0;
        }
        return s - 1;
      });
    }, 1000);
    return function() { clearInterval(timerRef.current); };
  }, [idx]);

  function goBack() {
    clearInterval(timerRef.current);
    if (idx > 0) { setIdx(idx - 1); setTimer(TIMER_SECS); }
  }

  var timerCol = timer > 12 ? C.teal : timer > 6 ? C.am : C.re;
  var pct = Math.round((idx / 75) * 100);

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%", background:"transparent" }}>
      <div className="noprint" style={{ background:"#fff", borderBottom:"1px solid #e0eaea", borderRadius:"0 0 20px 20px", padding:"9px 14px 11px", flexShrink:0, boxShadow:"0 2px 14px rgba(15,126,125,.07)" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:7 }}>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <span className="sy" style={{ fontSize:11, fontWeight:800, color:PHASE_COLS[phase] }}>{PHASE_NAMES[phase]}</span>
            <span style={{ width:1, height:12, background:C.bdr }}/>
            <span style={{ fontSize:10, color:C.mu }}>{localI+1}/{PHASE_SIZES[phase]}</span>
            <span style={{ fontSize:9, background:PHASE_COLS[phase]+"18", padding:"2px 7px", borderRadius:99, color:PHASE_COLS[phase], fontWeight:700 }}>{pct}%</span>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:9 }}>
            <LangBtn lang={lang} set={setLang}/>
            <div style={{ display:"flex", alignItems:"center", gap:4 }}>
              <svg width={44} height={44} style={{ transform:"rotate(-90deg)" }}>
                <circle cx={22} cy={22} r={18} fill="none" stroke={C.bdr} strokeWidth={4}/>
                <circle cx={22} cy={22} r={18} fill="none" stroke={timerCol} strokeWidth={4}
                  strokeDasharray={113.1} strokeDashoffset={113.1*(1-timer/TIMER_SECS)}
                  strokeLinecap="round" style={{ transition:"stroke-dashoffset .9s linear,stroke .3s" }}/>
              </svg>
              <span className="sy" style={{ fontSize:16, fontWeight:800, color:timerCol, minWidth:22 }}>{timer}</span>
            </div>
          </div>
        </div>
        <div style={{ display:"flex", gap:3, alignItems:"center" }}>
          <div style={{ flex:30, height:7, background:"#eef3f3", borderRadius:99, overflow:"hidden" }}>
            <div style={{ height:"100%", width:Math.min(idx,30)/30*100+"%", background:"linear-gradient(90deg,#1aabaa,#27c4be)", borderRadius:99, transition:"width .3s" }}/>
          </div>
          <div style={{ width:6, height:6, borderRadius:"50%", background:idx>=30?C.gr:C.bdr, flexShrink:0 }}/>
          <div style={{ flex:25, height:7, background:"#eef3f3", borderRadius:99, overflow:"hidden" }}>
            <div style={{ height:"100%", width:Math.max(0,Math.min(idx-30,25))/25*100+"%", background:"linear-gradient(90deg,#27c4be,#1aabaa)", borderRadius:99, transition:"width .3s" }}/>
          </div>
          <div style={{ width:6, height:6, borderRadius:"50%", background:idx>=55?C.gr:C.bdr, flexShrink:0 }}/>
          <div style={{ flex:20, height:7, background:"#eef3f3", borderRadius:99, overflow:"hidden" }}>
            <div style={{ height:"100%", width:Math.max(0,Math.min(idx-55,20))/20*100+"%", background:"linear-gradient(90deg,#ff7a59,#f0633f)", borderRadius:99, transition:"width .3s" }}/>
          </div>
        </div>
      </div>

      {/* Full screen layout ŌĆö 5 cards always visible */}
      <div style={{ flex:1, display:"flex", flexDirection:"column",
          padding:"10px 14px 10px", width:"100%", overflow:"hidden" }}>

        {/* Category badge */}
        <div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:8, flexShrink:0 }}>
          <span style={{ padding:"3px 11px", borderRadius:99, background:catCol+"22",
              border:"1px solid "+catCol+"55", fontSize:10, fontWeight:800, color:catCol,
              letterSpacing:.4, textTransform:"uppercase" }}>
            {catKey}
          </span>
          <span style={{ fontSize:10, color:C.mu }}>{PHASE_NAMES[phase]}</span>
        </div>

        {/* Question */}
        <div style={{ background:"#fff", borderRadius:16, padding:"12px 16px",
            border:"none", marginBottom:10, flexShrink:0,
            boxShadow:"0 2px 14px rgba(15,126,125,.07)" }}>
          <p className={ar ? "ar" : ""} style={{ fontFamily:"Syne,sans-serif", fontSize:21, fontWeight:700,
              lineHeight:1.55, color:"#15302f", direction:ar?"rtl":"ltr", margin:0 }}>
            {q[lang] || q.en}
          </p>
        </div>

        {/* Answer cards ŌĆö medium fixed height */}
        <div style={{ flexShrink:0, display:"flex", flexDirection:"column", gap:7 }}>
          {opts.map(function(label, i) {
            var isSel = cur === i;
            var CARD_COLS = ["#16a34a","#65a30d","#ca8a04","#ea580c","#dc2626"];
            var col = CARD_COLS[i];
            return (
              <button key={i} onClick={function() { goNext(i); }}
                style={{
                  minHeight:58, flex:"0 0 auto",
                  display:"flex", alignItems:"center", gap:16,
                  padding:"0 18px",
                  background: isSel ? "#e9f7f6" : "#fafbfb",
                  border: isSel ? "2px solid #1aabaa" : "2px solid #e6eded",
                  borderRadius:14,
                  width:"100%", textAlign:"left", cursor:"pointer",
                  transform: isSel ? "scale(1.015)" : "scale(1)",
                  boxShadow: isSel ? "0 6px 16px rgba(26,171,170,.18)" : "none",
                  transition:"background .2s,border .2s,transform .15s,box-shadow .2s", fontFamily:"inherit",
                }}>
                {/* Number / checkmark badge */}
                <div style={{
                  width:20, height:20, borderRadius:"50%", flexShrink:0,
                  background: "transparent",
                  border: isSel ? "6px solid #1aabaa" : "2px solid #c7d4d4",
                  display:"flex", alignItems:"center", justifyContent:"center",
                  transition:"all .15s",
                }}>
                  {isSel ? "\u2713" : (i + 1)}
                </div>
                {/* Label */}
                <span style={{
                  flex:1, fontSize:15, fontWeight: isSel ? 700 : 500,
                  color: isSel ? "#0f6e6d" : "#3a4f4e",
                  letterSpacing:".01em", lineHeight:1.3,
                }}>
                  {label}
                </span>
                {isSel && (
                  <span style={{ fontSize:22, color:"#1aabaa", flexShrink:0 }}>ŌĆ║</span>
                )}
              </button>
            );
          })}
        </div>

        {/* Back button */}
        <div style={{ flexShrink:0, marginTop:7 }}>
          <button onClick={goBack} disabled={idx===0} className="noprint"
            style={{ padding:"5px 14px", background:"#fff", border:"2px solid #e6eded",
              borderRadius:99, color:"#5d7170", fontSize:10, fontWeight:600, opacity:idx===0?0.25:1, cursor:"pointer" }}>
            {ar ? "ž¦┘äž│ž¦ž©┘é ŌåÉ" : lang==="fr" ? "ŌåÉ Retour" : "ŌåÉ Back"}
          </button>
        </div>

      </div>
    </div>
  );
}

        {tab==="advisors" && (

                <div style={{ width:28,height:28,borderRadius:8,background:"rgba(139,92,246,.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14 }}>Ō×Ģ</div>

        {[
          { id:"overview", icon:"­¤ÅĀ", label:"Overview" },
          { id:"candidates", icon:"­¤æź", label:"People", count:src.length },

function AdminStats({ src, lang, ar }) {
  if (!src || src.length===0) {
    return <div style={{ padding:32,textAlign:"center",color:"rgba(255,255,255,.2)",fontSize:13 }}>No candidate data yet.</div>;
  }
  function cnt(arr){ var m={}; arr.forEach(function(v){m[v]=(m[v]||0)+1;}); return m; }
  function StatBar({ label, value, max, color, count, total }) {
    var p = max?Math.round(value/max*100):0;
    var pctVal = total?Math.round(count/total*100):0;
    return (
      <div style={{ marginBottom:10 }}>
        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4 }}>
          <span style={{ fontSize:10,color:"rgba(255,255,255,.55)",maxWidth:"62%",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap" }}>{label}</span>
          <div style={{ display:"flex",alignItems:"center",gap:6 }}>
            <span style={{ fontSize:10,fontWeight:800,color:color }}>{count!==undefined?count:value}</span>
            {total>0&&<span style={{ fontSize:9,color:"rgba(255,255,255,.2)",background:"rgba(255,255,255,.05)",borderRadius:99,padding:"1px 5px" }}>{pctVal||Math.round(value)}%</span>}
          </div>
        </div>
        <div style={{ height:7,background:"rgba(255,255,255,.05)",borderRadius:99,overflow:"hidden" }}>
          <div style={{ height:"100%",width:p+"%",background:"linear-gradient(90deg,"+color+","+color+"88)",borderRadius:99,transition:"width .9s cubic-bezier(.22,.68,0,1.2)" }}/>
        </div>
      </div>
    );
  }
  function Panel({ title, color, children, action }) {
    return (
      <div style={{ background:"rgba(255,255,255,.025)",border:"1px solid rgba(255,255,255,.06)",borderLeft:"3px solid "+(color||"#1aabaa"),borderRadius:14,padding:"14px 14px 12px",marginBottom:10 }}>
        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12 }}>
          <span style={{ fontSize:10,fontWeight:900,color:"rgba(255,255,255,.7)",textTransform:"uppercase",letterSpacing:1 }}>{title}</span>
          {action}
        </div>
        {children}
      </div>
    );
  }

  var total    = src.length;
  var HCOLS2   = {R:"#1aabaa",I:"#8b5cf6",A:"#d4a328",S:"#22c55e",E:"#f97316",C:"#6b8aaa"};
  var HN2      = {R:"R├®aliste",I:"Investigateur",A:"Artistique",S:"Social",E:"Entrepreneur",C:"Conventionnel"};
  var genders  = cnt(src.map(function(c){return (c.profile&&c.profile.gender)||"Unknown";}));
  var ages     = cnt(src.map(function(c){return (c.profile&&c.profile.age)||"Unknown";}));
  var regions2 = cnt(src.map(function(c){return (c.profile&&c.profile.region)||"Unknown";}));
  var edus     = cnt(src.map(function(c){return (c.profile&&c.profile.edu)||"Unknown";}));
  var statuses = cnt(src.map(function(c){return (c.profile&&c.profile.status)||"Unknown";}));
  var hollands2= cnt(src.map(function(c){return ranked(c.scores&&c.scores.h||{})[0]||"?";}));
  var maxHol   = Math.max(1,...Object.values(hollands2));
  var maxReg2  = Math.max(1,...Object.values(regions2));
  var empScores= src.map(function(c){return avg(c.scores&&c.scores.s||{});});
  var avgEmp2  = empScores.length?Math.round(empScores.reduce(function(a,b){return a+b;},0)/empScores.length):0;
  var high2    = empScores.filter(function(v){return v>=65;}).length;
  var mid2     = empScores.filter(function(v){return v>=45&&v<65;}).length;
  var low2     = empScores.filter(function(v){return v<45;}).length;
  var avgH2={R:0,I:0,A:0,S:0,E:0,C:0}; var avgB5={O:0,C2:0,E2:0,A2:0,N:0}; var avgSU={A:0,E:0,C:0,R:0};
  src.forEach(function(c){
    var h=c.scores&&c.scores.h||{}; var b=c.scores&&c.scores.b||{}; var s=c.scores&&c.scores.s||{};
    ["R","I","A","S","E","C"].forEach(function(k){avgH2[k]+=(h[k]||0)/total;});
    ["O","C2","E2","A2","N"].forEach(function(k){avgB5[k]+=(b[k]||0)/total;});
    ["A","E","C","R"].forEach(function(k){avgSU[k]+=(s[k]||0)/total;});
  });

  return (
    <div style={{ padding:"12px 14px" }}>
      {/* Summary row */}
      <div style={{ display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:7,marginBottom:12 }}>
        {[
          {v:total,l:"Total",c:"#1aabaa"},
          {v:avgEmp2+"%",l:"Avg Skill",c:"#f97316"},
          {v:high2,l:"High Ōēź65%",c:"#22c55e"},
          {v:low2,l:"Low <45%",c:"#ef4444"},
        ].map(function(k,i){
          return <div key={i} style={{ background:"rgba(255,255,255,.03)",border:"1px solid "+k.c+"22",borderTop:"2px solid "+k.c,borderRadius:12,padding:"10px 8px",textAlign:"center" }}>
            <div style={{ fontSize:"clamp(16px,4vw,22px)",fontWeight:900,color:k.c,lineHeight:1 }}>{k.v}</div>
            <div style={{ fontSize:8,color:"rgba(255,255,255,.3)",marginTop:4 }}>{k.l}</div>
          </div>;
        })}
      </div>

      {/* Employability */}
      <Panel title="Employability Bands" color="#f97316"
        action={<span style={{ fontSize:9,color:"rgba(255,255,255,.2)" }}>n={total}</span>}>
        <div style={{ display:"flex",gap:6,marginBottom:12 }}>
          {[["Ōēź65% Ready",high2,"#22c55e"],["45ŌĆō64% Dev",mid2,"#f97316"],["<45% Early",low2,"#ef4444"]].map(function(b,i){
            return <div key={i} style={{ flex:1,background:"rgba(255,255,255,.03)",borderRadius:10,padding:"8px 6px",textAlign:"center",border:"1px solid "+b[2]+"22" }}>
              <div style={{ fontSize:16,fontWeight:900,color:b[2] }}>{b[1]}</div>
              <div style={{ fontSize:8,color:"rgba(255,255,255,.3)",marginTop:2 }}>{b[0]}</div>
            </div>;
          })}
        </div>
        <div style={{ marginBottom:6 }}>
          <div style={{ display:"flex",justifyContent:"space-between",marginBottom:4 }}>
            <span style={{ fontSize:9,color:"rgba(255,255,255,.4)" }}>Platform Average</span>
            <span style={{ fontSize:11,fontWeight:900,color:avgEmp2>=65?"#22c55e":avgEmp2>=45?"#f97316":"#ef4444" }}>{avgEmp2}%</span>
          </div>
          <div style={{ height:10,background:"rgba(255,255,255,.06)",borderRadius:99,overflow:"hidden" }}>
            <div style={{ height:"100%",width:avgEmp2+"%",background:"linear-gradient(90deg,#22c55e,#f97316)",borderRadius:99 }}/>
          </div>
        </div>
      </Panel>

      {/* Holland RIASEC Distribution */}
      <Panel title="Holland RIASEC ŌĆö Primary Type" color="#1aabaa">
        {["R","I","A","S","E","C"].map(function(code){
          var n=hollands2[code]||0;
          return <StatBar key={code} label={code+" ŌĆö "+HN2[code]} value={maxHol?Math.round(n/maxHol*100):0} max={100} color={HCOLS2[code]} count={n} total={total}/>;
        })}
      </Panel>

      {/* Holland avg scores */}
      <Panel title="Holland RIASEC ŌĆö Average Scores" color="#8b5cf6">
        {["R","I","A","S","E","C"].map(function(code){
          var v=Math.round(avgH2[code]);
          return <StatBar key={code} label={code+" ŌĆö "+HN2[code]} value={v} max={100} color={HCOLS2[code]} count={v} total={0}/>;
        })}
      </Panel>

      {/* Big Five */}
      <Panel title="Big Five OCEAN ŌĆö Average Scores" color="#8b5cf6">
        {[["O","Openness"],["C2","Conscientiousness"],["E2","Extraversion"],["A2","Agreeableness"],["N","Emot. Stability"]].map(function(item){
          var v=Math.round(avgB5[item[0]]);
          return <StatBar key={item[0]} label={item[0].replace("2","")+" ŌĆö "+item[1]} value={v} max={100} color="#8b5cf6" count={v} total={0}/>;
        })}
      </Panel>

      {/* Skill Up */}
      <Panel title="Skill Up ŌĆö Average Scores" color="#f97316">
        {[["A","Autonomie"],["E","Esprit ├ēco."],["C","Collaboration"],["R","Readiness"]].map(function(item){
          var v=Math.round(avgSU[item[0]]);
          return <StatBar key={item[0]} label={item[1]} value={v} max={100} color="#f97316" count={v} total={0}/>;
        })}
      </Panel>

      {/* Regional */}
      <Panel title="Regional Distribution" color="#1aabaa">
        {Object.entries(regions2).sort(function(a,b){return b[1]-a[1];}).slice(0,8).map(function(item,i){
          return <StatBar key={i} label={item[0]} value={maxReg2?Math.round(item[1]/maxReg2*100):0} max={100} color="#1aabaa" count={item[1]} total={total}/>;
        })}
      </Panel>

      {/* Gender */}
      <Panel title="Gender Distribution" color="#d4a328">
        {Object.entries(genders).sort(function(a,b){return b[1]-a[1];}).map(function(item,i){
          var cols=["#1aabaa","#8b5cf6","#d4a328"];
          return <StatBar key={i} label={item[0]} value={total?Math.round(item[1]/total*100):0} max={100} color={cols[i%3]} count={item[1]} total={total}/>;
        })}
      </Panel>

      {/* Age */}
      <Panel title="Age Distribution" color="#22c55e">
        {["Under 18","18ŌĆō20","21ŌĆō24","25ŌĆō29","30ŌĆō35","36+"].map(function(age,i){
          var v=ages[age]||0;
          return v>0?<StatBar key={i} label={age} value={total?Math.round(v/total*100):0} max={100} color="#22c55e" count={v} total={total}/>:null;
        })}
      </Panel>

      {/* Education */}
      <Panel title="Education Level" color="#d4a328">
        {Object.entries(edus).sort(function(a,b){return b[1]-a[1];}).map(function(item,i){
          return <StatBar key={i} label={item[0]} value={total?Math.round(item[1]/total*100):0} max={100} color="#d4a328" count={item[1]} total={total}/>;
        })}
      </Panel>

      {/* Status */}
      {Object.keys(statuses).length>0&&(
        <Panel title="Occupation Status" color="#6b8aaa">
          {Object.entries(statuses).sort(function(a,b){return b[1]-a[1];}).map(function(item,i){
            var cols2=["#1aabaa","#8b5cf6","#d4a328","#22c55e","#f97316","#6b8aaa"];
            return <StatBar key={i} label={item[0]} value={total?Math.round(item[1]/total*100):0} max={100} color={cols2[i%6]} count={item[1]} total={total}/>;
          })}
        </Panel>
      )}
    </div>
  );
}

function ShareQRModal({ onClose }) {
  var canvasRef = React.useRef(null);
  var url = (function() {
    var u = window.location.href.replace(/[?#].*$/, '').replace(/index\.html$/, '');
    return u.endsWith('/') ? u : u + '/';
  })();

  useEffect(function() {
    if (!canvasRef.current || !window.QRCode) return;
    QRCode.toCanvas(canvasRef.current, url, {
      width: 240, margin: 2,
      color: { dark: '#06111f', light: '#ffffff' }
    });
  }, []);

  return (
    <div onClick={onClose} style={{
      position:'fixed', inset:0, zIndex:99999,
      background:'rgba(8,64,63,.96)',
      display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'center',
      gap:20, cursor:'pointer'
    }}>
      {/* Compass icon */}
      <svg width="64" height="64" viewBox="0 0 512 512">
        <circle cx="256" cy="256" r="248" fill="none" stroke="#1aabaa" strokeWidth="18"/>
        <polygon points="256,90 242,256 256,240 270,256" fill="#1aabaa"/>
        <polygon points="256,422 242,256 256,272 270,256" fill="#0d7a79"/>
        <polygon points="422,256 256,242 272,256 256,270" fill="#0d7a79"/>
        <polygon points="90,256 256,242 240,256 256,270" fill="#1aabaa"/>
        <circle cx="256" cy="256" r="18" fill="#f0f4f8"/>
        <circle cx="256" cy="256" r="8" fill="#1aabaa"/>
      </svg>

      <div style={{ color:'#1aabaa', fontSize:30, fontWeight:700, letterSpacing:3, textTransform:'uppercase' }}>
        CareerMap
      </div>

      <div style={{ background:'#fff', borderRadius:16, padding:14, border:'3px solid #1aabaa', boxShadow:'0 0 40px #1aabaa44' }}>
        <canvas ref={canvasRef}/>
      </div>

      <div style={{ color:'#6b8aaa', fontSize:14, letterSpacing:1 }}>Scan to open the app</div>

      <div style={{
        marginTop:24, color:'#8fadc8', fontSize:13,
        border:'1px solid #1a3a55', borderRadius:20,
        padding:'8px 22px', letterSpacing:1
      }}>
        Tap anywhere to close Ō£Ģ
      </div>
    </div>
  );
}

function App() {
  injectCSS();
  var [lang, setLang] = useState("en");
  var [screen, setScreen] = useState("landing");
  var [user, setUser] = useState(null);
  var [profile, setProfile] = useState(null);
  var [scores, setScores] = useState({ h:{}, b:{}, s:{} });
  var [cands, setCands] = useState(function() { try { return JSON.parse(localStorage.getItem("cm_cands")||"[]"); } catch(e){ return []; } });
  var [viewIdx, setViewIdx] = useState(null);
  var [advisors, setAdvisors] = useState(function() { try { return JSON.parse(localStorage.getItem("cm_advisors")||"[]"); } catch(e){ return []; } });
  var [resultCode, setResultCode] = useState("");
  var [reportHTML, setReportHTML] = useState(null);
  var [showQR, setShowQR] = useState(false);

  // Firebase real-time sync (when configured), otherwise localStorage
  useEffect(function() {
    var unsubA, unsubC;
    try {
      if (!_db) throw new Error("no db");
      unsubA = _db.collection("advisors").onSnapshot(
        function(snap) { try { setAdvisors(snap.docs.map(function(d){ return Object.assign({ _docId: d.id }, d.data()); })); } catch(e){} },
        function(e){ console.error("advisors:", e); }
      );
      unsubC = _db.collection("candidates").onSnapshot(
        function(snap) { try { setCands(snap.docs.map(function(d){ return Object.assign({ _docId: d.id }, d.data()); })); } catch(e){} },
        function(e){ console.error("candidates:", e); }
      );
    } catch(e) {
      try { var a = JSON.parse(localStorage.getItem("cm_advisors")||"[]"); if(a.length) setAdvisors(a); } catch(err){}
      try { var c = JSON.parse(localStorage.getItem("cm_cands")||"[]"); if(c.length) setCands(c); } catch(err){}
    }
    return function(){ try { if(unsubA) unsubA(); if(unsubC) unsubC(); } catch(e){} };
  }, []);

  // localStorage fallback persistence (only when no Firebase)
  useEffect(function() { if (!_db) { try { localStorage.setItem("cm_cands", JSON.stringify(cands)); } catch(e){} } }, [cands]);
  useEffect(function() { if (!_db) { try { localStorage.setItem("cm_advisors", JSON.stringify(advisors)); } catch(e){} } }, [advisors]);

  function setLangDir(l) {
    setLang(l);
    if (typeof document !== "undefined") {
      document.documentElement.setAttribute("dir", l === "ar" ? "rtl" : "ltr");
    }
  }

  function onLogin(u) {
    setReportHTML(null);
    setUser(u);
    if (u.role === "admin")   setScreen("admin");
    else if (u.role === "advisor") setScreen("advisor");
    else setScreen("profile");
  }

  function onLogout() {
    setUser(null); setProfile(null);
    setScores({ h:{}, b:{}, s:{} });
    setViewIdx(null); setResultCode(""); setReportHTML(null);
    setScreen("login");
  }

  function showReport(p, sc, role) {
    setReportHTML({profile:p||{name:user.name,id:user.id,age:'-',gender:'-',edu:'-',region:'-'},scores:sc||{h:{},b:{},s:{}},role:role});
  }

  function onProfile(pf) {
    var displayName = [pf.firstName, pf.lastName].filter(Boolean).join(" ") || user.id;
    var fullProfile = Object.assign({}, pf, { name:displayName, id:user.id });
    setProfile(fullProfile);
    setUser(function(u) { return Object.assign({}, u, { name:displayName }); });
    setScreen("welcome");
  }

  function onDeleteCand(c) {
    if (_db && c._docId) {
      _db.collection("candidates").doc(c._docId).delete().catch(function(e){ alert("Error: "+e.message); });
    } else {
      setCands(function(p){ return p.filter(function(x){ return x.id !== c.id; }); });
    }
  }

  function onFinish(sc) {
    var code = "RPT-" + user.id;
    var duplicate = cands.some(function(x){ return x.id === user.id; });
    if (duplicate && !window.confirm('This candidate already has a result. Save a new one?')) { setScreen("code"); setResultCode(code); return; }
    setScores(sc);
    setResultCode(code);
    var rec = {
      name: user.name, id: user.id, code: code,
      profile: Object.assign({}, profile || {}, { name:user.name, id:user.id }),
      scores: sc,
      savedAt: new Date().toISOString()
    };
    if (_db) {
      _db.collection("candidates").add(rec).catch(function(e){ console.error("save candidate:", e); });
      // onSnapshot will update cands automatically; also set locally for instant UI
      setCands(function(p) { return p.concat([rec]); });
    } else {
      setCands(function(p) { return p.concat([rec]); });
    }
    setScreen("code");
  }

  function onView(i) {
    var c = cands[i];
    setScores(c.scores);
    setProfile(c.profile);
    setViewIdx(i);
    setScreen("report-v");
  }

  function goBack() {
    setScreen(user && user.role === "admin" ? "admin" : "advisor");
  }

  function wrap(el) {
    return (
      <div style={{ width:"100%", height:"100%", display:"flex", flexDirection:"column", overflow:"hidden", position:"relative" }}>
        {el}
        {/* Floating QR share button ŌĆö only on landing/advisor/admin to avoid accidental triggers */}
        {(screen === "landing" || screen === "advisor" || screen === "admin") && <button
          onClick={function(){ setShowQR(true); }}
          title="Share QR Code"
          style={{
            position:"fixed", bottom:20, right:20, zIndex:9000,
            width:48, height:48, borderRadius:"50%",
            background:"#1aabaa", border:"none", cursor:"pointer",
            display:"flex", alignItems:"center", justifyContent:"center",
            boxShadow:"0 4px 16px #1aabaa66",
            padding:0
          }}>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#06111f" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="3" height="3"/>
            <rect x="18" y="14" width="3" height="3"/>
            <rect x="14" y="18" width="3" height="3"/>
            <rect x="18" y="18" width="3" height="3"/>
          </svg>
        </button>}
        {showQR && <ShareQRModal onClose={function(){ setShowQR(false); }}/>}
      </div>
    );
  }

  var viewer = reportHTML ? <ReportViewer profile={reportHTML.profile} scores={reportHTML.scores} role={reportHTML.role} onClose={function(){ setReportHTML(null); }}/> : null;
  if (screen === "landing") return wrap(<LandingPage lang={lang} setLang={setLangDir} onStart={function(){ setScreen("login"); }}/>);
  if (screen === "login")   return wrap(<Login lang={lang} setLang={setLangDir} onLogin={onLogin} advisors={advisors}/>);
  if (screen === "profile") return wrap(<ProfileForm lang={lang} setLang={setLangDir} user={user} onNext={onProfile} onLogout={onLogout}/>);
  if (screen === "welcome") return wrap(<Welcome lang={lang} setLang={setLangDir} user={user} onStart={function(){ setScreen("assess"); }} onLogout={onLogout}/>);
  if (screen === "assess")  return wrap(<Assessment lang={lang} setLang={setLangDir} user={user} onFinish={onFinish}/>);
  if (screen === "code")    return wrap(<CandidateCode lang={lang} setLang={setLangDir} user={user} code={resultCode} onLogout={onLogout}/>);
  if (screen === "report-v") {
    var cv = cands[viewIdx] || {};
    return wrap(<div style={{ position:"relative", flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
      <Report lang={lang} setLang={setLangDir} user={{ name:cv.name||"", id:cv.id||"", role:user.role }} profile={profile} scores={scores} onLogout={goBack} initRole="advisor" onShowReport={showReport}/>
      {viewer}
    </div>);
  }
  if (screen === "advisor") return wrap(<div style={{ position:"relative", flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
    <AdvisorDash lang={lang} setLang={setLangDir} user={user} onLogout={onLogout} cands={cands} onView={onView} onShowReport={showReport}/>
    {viewer}
  </div>);
  if (screen === "admin")   return wrap(<div style={{ position:"relative", flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
    <AdminDash lang={lang} setLang={setLangDir} user={user} onLogout={onLogout} cands={cands} onView={onView} advisors={advisors} onDeleteCand={onDeleteCand}
      onAddAdvisor={function(a){
        if (_db) {
          _db.collection("advisors").add(a).catch(function(e){ alert("Error saving advisor: " + e.message); });
        } else {
          setAdvisors(function(p){ return p.concat([a]); });
        }
      }}
      onDeleteAdvisor={function(i){
        var adv = advisors[i];
        if (_db && adv && adv._docId) {
          _db.collection("advisors").doc(adv._docId).delete().catch(function(e){ alert("Error deleting: " + e.message); });
        } else {
          setAdvisors(function(p){ return p.filter(function(_,x){ return x!==i; }); });
        }
      }}
      onShowReport={showReport}/>
    {viewer}
  </div>);
  return null;
}

const _root = ReactDOM.createRoot(document.getElementById("root"));
_root.render(React.createElement(ErrorBoundary, null, React.createElement(App)));

  </script>
  <script>
    // Hide loading ONLY when React has actually rendered into #root
    var _obs = new MutationObserver(function(){
      var r = document.getElementById('root');
      if(r && r.children.length > 0){
        var l = document.getElementById('cm-loading');
        if(l) l.style.display = 'none';
        _obs.disconnect();
      }
    });
    _obs.observe(document.getElementById('root'), {childList:true,subtree:true});
    // Safety net: after 30s show an error instead of black screen
    setTimeout(function(){
      var r = document.getElementById('root');
      if(r && r.children.length === 0){
        var l = document.getElementById('cm-loading');
        if(l){
          l.innerHTML = '<p style="color:#dc4c3c;font-size:14px;text-align:center;padding:20px">Failed to load. Please check your connection and refresh.<br><br><button onclick="location.reload()" style="margin-top:12px;padding:10px 24px;background:#1aabaa;color:#06111f;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer">Refresh</button></p>';
        }
      }
    }, 30000);
  </script>
  <script>
    if('serviceWorker' in navigator){
      window.addEventListener('load', function(){
        navigator.serviceWorker.register('sw.js')
          .catch(function(e){ console.warn('SW registration failed', e); });
      });
    }
  </script>
</body>
</html>

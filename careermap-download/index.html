function LandingPage({ onStart, lang, setLang }) {
  var ar = lang === "ar";
  var fr = lang === "fr";
  var [ph, setPh] = React.useState(0);

  React.useEffect(function() {
    var t1 = setTimeout(function(){ setPh(1); }, 80);
    var t2 = setTimeout(function(){ setPh(2); }, 350);
    var t3 = setTimeout(function(){ setPh(3); }, 2000);
    var t4 = setTimeout(function(){ setPh(4); }, 2600);
    return function(){ [t1,t2,t3,t4].forEach(clearTimeout); };
  }, []);

  var TR = function(delay) {
    return "opacity .7s "+delay+"s cubic-bezier(.4,0,.2,1), transform .7s "+delay+"s cubic-bezier(.4,0,.2,1)";
  };

  return (
    <div dir={ar?"rtl":"ltr"} style={{
      height:"100%", width:"100%", overflow:"hidden", position:"relative",
      background:"radial-gradient(ellipse at 50% 40%, #081828 0%, #06111f 65%)",
      display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center"
    }}>

      {/* Language picker */}
      <div style={{ position:"absolute", top:18, right:18, display:"flex", gap:6, zIndex:10 }}>
        {["fr","en","ar"].map(function(l){
          return (
            <button key={l} onClick={function(){setLang(l);}}
              style={{ padding:"5px 11px", borderRadius:99, fontSize:10, fontWeight:800,
                background:lang===l?C.teal:"rgba(255,255,255,.06)",
                color:lang===l?C.bg:C.mu, border:"none",
                transition:"all .2s" }}>
              {l.toUpperCase()}
            </button>
          );
        })}
      </div>

      {/* Ambient beacon glow behind compass */}
      <div style={{
        position:"absolute", width:340, height:340, borderRadius:"50%", pointerEvents:"none",
        background:"radial-gradient(circle, rgba(26,171,170,.13) 0%, transparent 68%)",
        animation:"beaconPulse 5s ease-in-out infinite",
        opacity: ph>=1?1:0, transition:"opacity 1s"
      }}/>

      {/* ── COMPASS ── */}
      <div style={{
        marginBottom:36, position:"relative",
        opacity: ph>=1?1:0, transform: ph>=1?"scale(1)":"scale(.65)",
        transition:"opacity .8s cubic-bezier(.4,0,.2,1), transform .8s cubic-bezier(.34,1.56,.64,1)"
      }}>
        <svg viewBox="0 0 100 100" width={158} height={158} xmlns="http://www.w3.org/2000/svg">
          {/* Outer glow ring */}
          <circle cx="50" cy="50" r="48" fill="none"
            stroke="rgba(26,171,170,.08)" strokeWidth="4"/>

          {/* Main ring — draws in */}
          <circle cx="50" cy="50" r="46" fill="none"
            stroke={C.teal} strokeWidth="1.6"
            pathLength="1" strokeDasharray="1"
            strokeDashoffset={ph>=2?"0":"1"}
            style={{transition:"stroke-dashoffset 1.3s cubic-bezier(.4,0,.2,1) .1s"}}/>

          {/* Inner ring — draws in */}
          <circle cx="50" cy="50" r="38" fill="none"
            stroke="#1a3a55" strokeWidth=".8"
            pathLength="1" strokeDasharray="1"
            strokeDashoffset={ph>=2?"0":"1"}
            style={{transition:"stroke-dashoffset 1s cubic-bezier(.4,0,.2,1) .4s"}}/>

          {/* Cross lines */}
          {ph>=2 && <line x1="50" y1="10" x2="50" y2="90" stroke="#1a3a55" strokeWidth=".4"
            style={{opacity:0, animation:"fadeUp .3s 1.0s both"}}/>}
          {ph>=2 && <line x1="10" y1="50" x2="90" y2="50" stroke="#1a3a55" strokeWidth=".4"
            style={{opacity:0, animation:"fadeUp .3s 1.0s both"}}/>}

          {/* Cardinal labels */}
          {ph>=2 && [
            {l:"N", x:50, y:8.5, col:C.teal, sz:7, fw:"bold"},
            {l:"S", x:50, y:97, col:C.bdr,   sz:5, fw:"normal"},
            {l:"E", x:94, y:53, col:C.bdr,   sz:5, fw:"normal"},
            {l:"W", x:6,  y:53, col:C.bdr,   sz:5, fw:"normal"},
          ].map(function(c){
            return <text key={c.l} x={c.x} y={c.y} textAnchor="middle"
              fontFamily="Arial" fontWeight={c.fw} fontSize={c.sz} fill={c.col}
              style={{opacity:0, animation:"fadeUp .35s 1.1s both"}}>{c.l}</text>;
          })}

          {/* Degree ticks */}
          {ph>=2 && [0,45,90,135,180,225,270,315].map(function(deg){
            var rad = (deg-90)*Math.PI/180;
            var r1=42, r2=deg%90===0?38:40;
            return <line key={deg}
              x1={50+r1*Math.cos(rad)} y1={50+r1*Math.sin(rad)}
              x2={50+r2*Math.cos(rad)} y2={50+r2*Math.sin(rad)}
              stroke={deg%90===0?C.teal+"66":C.bdr} strokeWidth={deg%90===0?1:.5}
              style={{opacity:0, animation:"fadeUp .3s 1.2s both"}}/>;
          })}

          {/* Needle — spins and settles */}
          {ph>=2 && (
            <g style={{transformOrigin:"50px 50px",
                animation:"needleSettle 2.6s cubic-bezier(.34,1.56,.64,1) .9s both"}}>
              {/* North needle — gold */}
              <polygon points="50,15 53.5,50 50,43 46.5,50" fill={C.gold}/>
              {/* South needle — teal */}
              <polygon points="50,85 53.5,50 50,57 46.5,50" fill={C.teal} opacity=".85"/>
            </g>
          )}

          {/* East/West small arrows */}
          {ph>=2 && <polygon points="85,50 50,47 57,50 50,53" fill={C.teal} opacity=".5"
            style={{opacity:0, animation:"fadeUp .3s 1.6s both"}}/>}
          {ph>=2 && <polygon points="15,50 50,47 43,50 50,53" fill={C.gold} opacity=".5"
            style={{opacity:0, animation:"fadeUp .3s 1.6s both"}}/>}

          {/* Center jewel */}
          {ph>=2 && <circle cx="50" cy="50" r="5.5" fill={C.bg} stroke={C.gold} strokeWidth="1.8"
            style={{opacity:0, animation:"fadeUp .3s 1.6s both"}}/>}
          {ph>=2 && <circle cx="50" cy="50" r="2.5" fill={C.gold}
            style={{opacity:0, animation:"fadeUp .3s 1.7s both"}}/>}

          {/* North dot */}
          {ph>=2 && <circle cx="50" cy="15" r="2.8" fill={C.teal}
            style={{opacity:0, animation:"fadeUp .3s 1.7s both"}}/>}
        </svg>
      </div>

      {/* ── WORDMARK ── */}
      <div style={{ textAlign:"center", lineHeight:.88, marginBottom:16 }}>
        <div style={{
          fontSize:"clamp(54px,15vw,82px)", fontWeight:900, letterSpacing:"-3px", color:C.wh,
          opacity:ph>=3?1:0, transform:ph>=3?"translateY(0)":"translateY(20px)",
          transition:TR("0")
        }}>CAREER</div>
        <div style={{
          fontSize:"clamp(54px,15vw,82px)", fontWeight:900, letterSpacing:"-3px", color:C.teal,
          opacity:ph>=3?1:0, transform:ph>=3?"translateY(0)":"translateY(20px)",
          transition:TR(".1")
        }}>MAP</div>
      </div>

      {/* Thin separator line */}
      <div style={{
        width:ph>=3?48:0, height:1, background:"linear-gradient(90deg,transparent,"+C.teal+",transparent)",
        transition:"width .7s .3s", marginBottom:16
      }}/>

      {/* Tagline — one line, no fluff */}
      <p style={{
        fontSize:11, letterSpacing:3, textTransform:"uppercase", color:C.mu,
        marginBottom:40, textAlign:"center",
        opacity:ph>=3?1:0, transition:TR(".2")
      }}>
        {fr?"Évaluation psychométrique":ar?"التقييم المهني":"Psychometric Assessment"}
      </p>

      {/* ── CTA ── */}
      <button onClick={onStart}
        style={{
          padding:"17px 52px", borderRadius:99, fontSize:16, fontWeight:900,
          background:"linear-gradient(135deg,"+C.teal+" 0%,#0a7575 100%)",
          color:"#fff", border:"none", letterSpacing:".6px",
          boxShadow:"0 0 0 0 "+C.teal,
          opacity:ph>=4?1:0, transform:ph>=4?"translateY(0)":"translateY(14px)",
          transition:TR("0")+", box-shadow .2s",
        }}
        onMouseEnter={function(e){
          e.currentTarget.style.boxShadow="0 8px 32px rgba(26,171,170,.45)";
          e.currentTarget.style.transform="scale(1.04)";
        }}
        onMouseLeave={function(e){
          e.currentTarget.style.boxShadow="0 0 0 0 "+C.teal;
          e.currentTarget.style.transform="scale(1)";
        }}
        onTouchStart={function(e){ e.currentTarget.style.transform="scale(.97)"; }}
        onTouchEnd={function(e){ e.currentTarget.style.transform="scale(1)"; }}>
        {fr?"Commencer":ar?"ابدأ الآن":"Begin"} →
      </button>
    </div>
  );
}
function App() {
  injectCSS();
  var [lang, setLang] = useState("en");
  var [screen, setScreen] = useState("landing");
  var [user, setUser] = useState(null);
  var [profile, setProfile] = useState(null);
  var [scores, setScores] = useState({ h:{}, b:{}, s:{}, eq:{}, entre:{}, resi:{} });
  var [cands, setCands] = useState(function() { try { return JSON.parse(localStorage.getItem("cm_cands")||"[]"); } catch(e){ return []; } });
  var [viewIdx, setViewIdx] = useState(null);
  var [advisors, setAdvisors] = useState(function() { try { return JSON.parse(localStorage.getItem("cm_advisors")||"[]"); } catch(e){ return []; } });
  var [resultCode, setResultCode] = useState("");
  var [reportHTML, setReportHTML] = useState(null);
  var [showQR, setShowQR] = useState(false);

  // Firebase real-time sync (when configured), otherwise localStorage
  useEffect(function() {
    var unsubA, unsubC;
    try {
      if (!_db) throw new Error("no db");
      unsubA = _db.collection("advisors").onSnapshot(
        function(snap) { try { setAdvisors(snap.docs.map(function(d){ return Object.assign({ _docId: d.id }, d.data()); })); } catch(e){} },
        function(e){ console.error("advisors:", e); }
      );
      unsubC = _db.collection("candidates").onSnapshot(
        function(snap) { try { setCands(snap.docs.map(function(d){ return Object.assign({ _docId: d.id }, d.data()); })); } catch(e){} },
        function(e){ console.error("candidates:", e); }
      );
    } catch(e) {
      try { var a = JSON.parse(localStorage.getItem("cm_advisors")||"[]"); if(a.length) setAdvisors(a); } catch(err){}
      try { var c = JSON.parse(localStorage.getItem("cm_cands")||"[]"); if(c.length) setCands(c); } catch(err){}
    }
    return function(){ try { if(unsubA) unsubA(); if(unsubC) unsubC(); } catch(e){} };
  }, []);

  // localStorage fallback persistence (only when no Firebase)
  useEffect(function() { if (!_db) { try { localStorage.setItem("cm_cands", JSON.stringify(cands)); } catch(e){} } }, [cands]);
  useEffect(function() { if (!_db) { try { localStorage.setItem("cm_advisors", JSON.stringify(advisors)); } catch(e){} } }, [advisors]);

  function setLangDir(l) {
    setLang(l);
    if (typeof document !== "undefined") {
      document.documentElement.setAttribute("dir", l === "ar" ? "rtl" : "ltr");
    }
  }

  function onLogin(u) {
    setReportHTML(null);
    setUser(u);
    if (u.role === "admin")   setScreen("admin");
    else if (u.role === "advisor") setScreen("advisor");
    else setScreen("profile");
  }

  function onLogout() {
    setUser(null); setProfile(null);
    setScores({ h:{}, b:{}, s:{}, eq:{}, entre:{}, resi:{} });
    setViewIdx(null); setResultCode(""); setReportHTML(null);
    setScreen("login");
  }

  function showReport(p, sc, role) {
    setReportHTML({profile:p||{name:user.name,id:user.id,age:'-',gender:'-',edu:'-',region:'-'},scores:sc||{h:{},b:{},s:{}},role:role});
  }

  function onProfile(pf) {
    var displayName = [pf.firstName, pf.lastName].filter(Boolean).join(" ") || user.id;
    var fullProfile = Object.assign({}, pf, { name:displayName, id:user.id });
    setProfile(fullProfile);
    setUser(function(u) { return Object.assign({}, u, { name:displayName }); });
    setScreen("welcome");
  }

  function onDeleteCand(c) {
    if (_db && c._docId) {
      _db.collection("candidates").doc(c._docId).delete().catch(function(e){ alert("Error: "+e.message); });
    } else {
      setCands(function(p){ return p.filter(function(x){ return x.id !== c.id; }); });
    }
  }

  function onFinish(sc) {
    var code = "RPT-" + user.id;
    var duplicate = cands.some(function(x){ return x.id === user.id; });
    if (duplicate && !window.confirm('This candidate already has a result. Save a new one?')) { setScreen("code"); setResultCode(code); return; }
    setScores(sc);
    setResultCode(code);
    var rec = {
      name: user.name, id: user.id, code: code,
      profile: Object.assign({}, profile || {}, { name:user.name, id:user.id }),
      scores: sc,
      savedAt: new Date().toISOString()
    };
    if (_db) {
      _db.collection("candidates").add(rec).catch(function(e){ console.error("save candidate:", e); });
      // onSnapshot will update cands automatically; also set locally for instant UI
      setCands(function(p) { return p.concat([rec]); });
    } else {
      setCands(function(p) { return p.concat([rec]); });
    }
    setScreen("code");
  }

  function onView(i) {
    var c = cands[i];
    setScores(c.scores);
    setProfile(c.profile);
    setViewIdx(i);
    setScreen("report-v");
  }

  function goBack() {
    setScreen(user && user.role === "admin" ? "admin" : "advisor");
  }

  function wrap(el) {
    return (
      <div style={{ width:"100%", height:"100%", display:"flex", flexDirection:"column", overflow:"hidden", position:"relative" }}>
        {el}
        {/* Floating QR share button */}
        <button
          onClick={function(){ setShowQR(true); }}
          title="Share QR Code"
          style={{
            position:"fixed", bottom:20, right:20, zIndex:9000,
            width:48, height:48, borderRadius:"50%",
            background:"#1aabaa", border:"none", cursor:"pointer",
            display:"flex", alignItems:"center", justifyContent:"center",
            boxShadow:"0 4px 16px #1aabaa66",
            padding:0
          }}>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#06111f" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="3" height="3"/>
            <rect x="18" y="14" width="3" height="3"/>
            <rect x="14" y="18" width="3" height="3"/>
            <rect x="18" y="18" width="3" height="3"/>
          </svg>
        </button>
        {showQR && <ShareQRModal onClose={function(){ setShowQR(false); }}/>}
      </div>
    );
  }

  var viewer = reportHTML ? <ReportViewer profile={reportHTML.profile} scores={reportHTML.scores} role={reportHTML.role} onClose={function(){ setReportHTML(null); }}/> : null;
  if (screen === "landing") return wrap(<LandingPage lang={lang} setLang={setLangDir} onStart={function(){ setScreen("login"); }}/>);
  if (screen === "login")   return wrap(<Login lang={lang} setLang={setLangDir} onLogin={onLogin} advisors={advisors}/>);
  if (screen === "profile") return wrap(<ProfileForm lang={lang} setLang={setLangDir} user={user} onNext={onProfile} onLogout={onLogout}/>);
  if (screen === "welcome") return wrap(<Welcome lang={lang} setLang={setLangDir} user={user} onStart={function(){ setScreen("assess"); }} onLogout={onLogout}/>);
  if (screen === "assess")  return wrap(<Assessment lang={lang} setLang={setLangDir} user={user} onFinish={onFinish}/>);
  if (screen === "code")    return wrap(<CandidateCode lang={lang} setLang={setLangDir} user={user} code={resultCode} scores={scores} profile={profile} onLogout={onLogout}/>);
  if (screen === "report-v") {
    var cv = cands[viewIdx] || {};
    return wrap(<div style={{ position:"relative", flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
      <Report lang={lang} setLang={setLangDir} user={{ name:cv.name||"", id:cv.id||"", role:user.role }} profile={profile} scores={scores} onLogout={goBack} initRole="advisor" onShowReport={showReport}/>
      {viewer}
    </div>);
  }
  if (screen === "advisor") return wrap(<div style={{ position:"relative", flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
    <AdvisorDash lang={lang} setLang={setLangDir} user={user} onLogout={onLogout} cands={cands} onView={onView} onShowReport={showReport}/>
    {viewer}
  </div>);
  if (screen === "admin")   return wrap(<div style={{ position:"relative", flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
    <AdminDash lang={lang} setLang={setLangDir} user={user} onLogout={onLogout} cands={cands} onView={onView} advisors={advisors} onDeleteCand={onDeleteCand}
      onAddAdvisor={function(a){
        if (_db) {
          _db.collection("advisors").add(a).catch(function(e){ alert("Error saving advisor: " + e.message); });
        } else {
          setAdvisors(function(p){ return p.concat([a]); });
        }
      }}
      onDeleteAdvisor={function(i){
        var adv = advisors[i];
        if (_db && adv && adv._docId) {
          _db.collection("advisors").doc(adv._docId).delete().catch(function(e){ alert("Error deleting: " + e.message); });
        } else {
          setAdvisors(function(p){ return p.filter(function(_,x){ return x!==i; }); });
        }
      }}
      onShowReport={showReport}/>
    {viewer}
  </div>);
  return null;
}

const _root = ReactDOM.createRoot(document.getElementById("root"));
_root.render(React.createElement(ErrorBoundary, null, React.createElement(App)));

  </script>
  <script>
    // Hide loading once React renders
    var _obs = new MutationObserver(function(){
      var r = document.getElementById('root');
      if(r && r.children.length > 0){
        var l = document.getElementById('cm-loading');
        if(l) l.style.display = 'none';
        _obs.disconnect();
      }
    });
    _obs.observe(document.getElementById('root'), {childList:true,subtree:true});
    setTimeout(function(){
      var l = document.getElementById('cm-loading');
      if(l) l.style.display = 'none';
    }, 5000);
  </script>
  <script>
    if('serviceWorker' in navigator){
      window.addEventListener('load', function(){
        navigator.serviceWorker.register('sw.js').then(function(reg){
          reg.addEventListener('updatefound', function(){
            var newSW = reg.installing;
            if(!newSW) return;
            newSW.addEventListener('statechange', function(){
              if(newSW.state === 'activated') window.location.reload();
            });
          });
        }).catch(function(e){ console.warn('SW registration failed', e); });
        navigator.serviceWorker.addEventListener('controllerchange', function(){
          window.location.reload();
        });
      });
    }
  </script>
</body>
</html>

name: Hard Refresh Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  hard-refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Hard refresh talentmaponline.org
        run: |
          echo "Performing hard refresh (cache-busting GET) on production..."
          STATUS=$(curl -s -L -o /dev/null -w "%{http_code}" \
            -H "Cache-Control: no-cache, no-store, must-revalidate" \
            -H "Pragma: no-cache" \
            -H "Expires: 0" \
            "https://www.talentmaponline.org")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "Hard refresh successful — production is live and serving fresh content"
          else
            echo "Unexpected status: $STATUS"
            exit 1
          fi

      - name: Hard refresh ideamaponline.org
        run: |
          echo "Performing hard refresh on ideamaponline.org..."
          STATUS=$(curl -s -L -o /dev/null -w "%{http_code}" \
            -H "Cache-Control: no-cache, no-store, must-revalidate" \
            -H "Pragma: no-cache" \
            -H "Expires: 0" \
            "https://www.ideamaponline.org/ideamap")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "Hard refresh successful — ideamap production is live"
          else
            echo "Unexpected status: $STATUS"
          fi

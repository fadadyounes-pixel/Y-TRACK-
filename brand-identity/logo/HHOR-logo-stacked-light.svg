<?xml version="1.0" encoding="UTF-8"?>
<svg width="320" height="215" viewBox="0 0 320 215" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;800;900&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="320" height="215" fill="#F2F2F2"/>

  <!--
    GEOMETRIC MARK — centered
    Mark bounding box: 58 × 64 px
    Center x in 320px canvas = 160, so translate x = 160 - 29 = 131
  -->
  <g transform="translate(131,22)">
    <rect x="0"  y="0" width="16" height="64" fill="#0B2D5C"/>
    <rect x="42" y="0" width="16" height="64" fill="#0B2D5C"/>
    <rect x="16" y="22" width="26" height="20" fill="#E67E22"/>
  </g>

  <!-- HHOR — Primary wordmark, centered -->
  <text
    x="160" y="152"
    text-anchor="middle"
    font-family="'Montserrat', 'Arial Black', 'Helvetica Neue', sans-serif"
    font-weight="900"
    font-size="60"
    letter-spacing="5"
    fill="#0B2D5C">HHOR</text>

  <!-- Orange separator line, centered -->
  <rect x="130" y="159" width="60" height="2.5" fill="#E67E22"/>

  <!-- Platform name — line 1 -->
  <text
    x="160" y="178"
    text-anchor="middle"
    font-family="'Montserrat', 'Helvetica Neue', 'Arial', sans-serif"
    font-weight="400"
    font-size="8.5"
    letter-spacing="3.5"
    fill="#0B2D5C"
    opacity="0.60">PLATEFORME</text>

  <!-- Platform name — line 2 -->
  <text
    x="160" y="194"
    text-anchor="middle"
    font-family="'Montserrat', 'Helvetica Neue', 'Arial', sans-serif"
    font-weight="400"
    font-size="8.5"
    letter-spacing="2.2"
    fill="#0B2D5C"
    opacity="0.60">HAY HASSANI OUM RABII</text>
</svg>

/* ─── ERROR BOUNDARY ─────────────────────────────────────────────────────── */
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { err: null };
  }
  static getDerivedStateFromError(e) { return { err: e }; }
  componentDidCatch(e, info) { console.error("CareerMap error:", e, info); }
  render() {
    if (this.state.err) {
      return React.createElement("div", { style: { display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", height:"100%", background:"#06111f", padding:24, textAlign:"center" } },
        React.createElement("div", { style: { fontSize:40, marginBottom:16 } }, "⚠️"),
        React.createElement("p", { style: { color:"#f0f4f8", fontSize:16, fontWeight:700, marginBottom:8 } }, "Une erreur est survenue"),
        React.createElement("p", { style: { color:"#dc4c3c", fontSize:12, fontFamily:"monospace", background:"rgba(220,76,60,.1)", padding:"12px 16px", borderRadius:8, maxWidth:400, wordBreak:"break-word" } }, String(this.state.err)),
        React.createElement("button", { onClick: function(){ window.location.reload(); }, style: { marginTop:20, padding:"10px 24px", background:"#1aabaa", border:"none", borderRadius:10, color:"#06111f", fontWeight:800, fontSize:14, cursor:"pointer" } }, "Recharger")
      );
    }
    return this.props.children;
  }
}

/* --- COMPASS LOGO (static) --- */
function CompassLogo({ size, onLight }) {
  size = size || 34;
  onLight = onLight || false;
  var stroke = onLight ? "#1aabaa" : "#fff";
  var southFill = onLight ? "#0f7e7d" : "#fff";
  var pivotFill = onLight ? "#0f7e7d" : "#fff";
  var pivotStroke = onLight ? "#fff" : "#0f7e7d";
  return (
    <svg viewBox="0 0 48 48" width={size} height={size} fill="none">
      <circle cx="24" cy="24" r="20" stroke={stroke} strokeWidth="2.6"/>
      <polygon points="24,8 27.5,24 20.5,24" fill="#ff7a59"/>
      <polygon points="24,40 27.5,24 20.5,24" fill={southFill}/>
      <circle cx="24" cy="24" r="2.6" fill={pivotFill} stroke={pivotStroke} strokeWidth="1.3"/>
    </svg>
  );
}

const RE_CANDIDATE = /^[A-Z]{2}\d{3,}$/;
const RE_ADVISOR   = /^@[A-Za-z]{2,}ADV$/i;

function detectRole(raw) {
  if (!raw) return null;
  const v = raw.trim();
  if (!v) return null;
  if (v.toLowerCase() === ADMIN_CODE.toLowerCase()) return "admin";
  if (RE_ADVISOR.test(v))   return "advisor";
  if (RE_CANDIDATE.test(v)) return "candidate";
  return "unknown";
}

const WTS = [5, 4, 3, 2, 1];

/* ─── SCORING ────────────────────────────────────────────────────────────── */
function scoreGroup(questions, keyFn, answers, offset) {
  const s = {}, n = {};
  questions.forEach((q, i) => {
    const k = keyFn(q);
    s[k] = s[k] || 0;
    n[k] = n[k] || 0;
    const a = answers[i + offset];
    if (a != null) { s[k] += WTS[a]; n[k]++; }
  });
  const out = {};
  Object.keys(s).forEach(k => {
    out[k] = Math.round((s[k] / ((n[k] || 5) * 5)) * 100);
  });
  return out;
}
function scoreRaw(qArr, keyFn, answers, offset) {
  var s = {};
  qArr.forEach(function(q, i) {
    var k = keyFn(q);
    if (!s[k]) s[k] = 0;
    var a = answers[i + offset];
    s[k] += (a != null) ? WTS[a] : 3;
  });
  return s;
}
function computeScores(ans) {
  return {
    h:     scoreGroup(HQ,     function(q){ return q.c; }, ans, 0),
    b:     scoreGroup(BQ,     function(q){ return q.t; }, ans, 30),
    s:     scoreGroup(SQ,     function(q){ return q.d; }, ans, 55),
    eq:    scoreRaw(EQ_Q,    function(q){ return q.dim; }, ans, 75),
    entre: scoreRaw(ENTRE_Q, function(q){ return q.dim; }, ans, 91),
    resi:  scoreRaw(RESI_Q,  function(q){ return q.dim; }, ans, 106),
  };
}
function ranked(sc) {
  return Object.keys(sc || {}).sort((a, b) => (sc[b] || 0) - (sc[a] || 0));
}
function avg(sc) {
  const v = Object.values(sc || {});
  return v.length ? Math.round(v.reduce((a, b) => a + b, 0) / v.length) : 0;
}

/* ─── V2 ENHANCED INDH + CLINICAL FLAGS ─────────────────────────────────── */
function calcINDH(riasec, skillup, eq, entre, profile) {
  var urbanRegions = ["Casablanca-Settat","Rabat-Sale-Kenitra","Tanger-Tetouan","Fes-Meknes"];
  var isUrban = false;
  var reg = (profile && profile.region) || "";
  for (var ui = 0; ui < urbanRegions.length; ui++) {
    if (reg.indexOf(urbanRegions[ui]) >= 0) { isUrban = true; break; }
  }
  var coopFactor = isUrban ? 0.45 : 1;
  var wJob  = Math.max(10, 100 - (riasec.S || 50));
  var wProj = Math.max(10, riasec.E || 50);
  var wCoop = Math.max(5, Math.round((riasec.C || 50) * coopFactor));
  if (eq && eq.OEA >= 16) { wJob = wJob + 5; }
  if (eq && entre) {
    var eseBoost = (entre.ESE || 0) >= 20 ? 15 : (entre.ESE || 0) >= 15 ? 8 : 0;
    wProj = Math.max(10, wProj + eseBoost);
    if ((entre.SN || 0) >= 20) { wCoop = wCoop + 10; }
    if ((entre.EA || 0) < 12 && (entre.ESE || 0) < 12) {
      wJob = wJob + 15;
      wProj = Math.max(10, wProj - 10);
    }
  }
  var total = wJob + wProj + wCoop;
  var pJob  = Math.round(wJob  / total * 100);
  var pProj = Math.round(wProj / total * 100);
  var pCoop = 100 - pJob - pProj;
  return { pJob: pJob, pProj: pProj, pCoop: pCoop };
}

function computeFlags(riasec, ocean, skillup, eq, entre, resi) {
  var flags = [];
  var rT  = (resi && resi.total) || 0;
  var N   = (ocean && ocean.N)   || 0;
  var OEA = (eq && eq.OEA)       || 20;
  var ROE = (eq && eq.ROE)       || 20;
  var ESE = (entre && entre.ESE) || 20;
  var SN  = (entre && entre.SN)  || 0;
  var EA  = (entre && entre.EA)  || 20;
  var SC  = (skillup && skillup.C) || 0;
  var hE  = (riasec && riasec.E)  || 0;
  var hS  = (riasec && riasec.S)  || 0;
  var hC  = (riasec && riasec.C)  || 0;
  var A2  = (ocean && ocean.A2)   || 0;
  if (rT < 25 && N > 72 && ROE < 10)   flags.push({ level:"red",    code:"TRIPLE_RISK" });
  if (rT < 30 && N > 72)               flags.push({ level:"red",    code:"MENTAL_HEALTH" });
  if (rT < 30 && ESE < 12)             flags.push({ level:"orange", code:"DROPOUT_RISK" });
  if (EA < 12 && ESE < 12)             flags.push({ level:"orange", code:"REDIRECT_INSERTION" });
  if (OEA < 11 && SC < 48)             flags.push({ level:"orange", code:"COOP_INCOMPATIBLE" });
  if (rT >= 40 && hE >= 88 && ESE >= 20) flags.push({ level:"green", code:"ROBUST_ENTREPRENEUR" });
  if (hC >= 72 && A2 >= 72 && OEA >= 16 && SN >= 18) flags.push({ level:"green", code:"IDEAL_COOP" });
  if (hS >= 80 && OEA >= 16 && ROE >= 16 && rT >= 30) flags.push({ level:"green", code:"IDEAL_INSERTION" });
  return flags;
}


/* ─── LANGUAGE PLACEMENT TESTS ──────────────────────────────────────────── */
function skillToCEFR(score) {
  return score <= 4  ? "A1" :
         score <= 8  ? "A2" :
         score <= 13 ? "B1" :
         score <= 18 ? "B2" :
         score <= 22 ? "C1" : "C2";
}
function overallCEFR(gL, vL, rL, wL) {
  var ord = ["A1","A2","B1","B2","C1","C2"];
  var cnt = {};
  [gL,vL,rL,wL].forEach(function(l){ cnt[l]=(cnt[l]||0)+1; });
  var max=0, res="A1";
  ord.forEach(function(l){ if((cnt[l]||0)>max){ max=cnt[l]; res=l; } });
  return res;
}
function scoreLanguageTest(answers, testType) {
  var G=0,V=0,R=0,W=0;
  answers.forEach(function(a){
    if(!a.correct) return;
    if(a.skill==="G") G++;
    if(a.skill==="V") V++;
    if(a.skill==="R") R++;
    if(a.skill==="W") W++;
  });
  var gL=skillToCEFR(G), vL=skillToCEFR(V), rL=skillToCEFR(R), wL=skillToCEFR(W);
  return { test:testType, G:G,gLevel:gL, V:V,vLevel:vL, R:R,rLevel:rL, W:W,wLevel:wL,
           overall:overallCEFR(gL,vL,rL,wL), date:new Date().toLocaleDateString("fr-MA") };
}
function cefrColor(l) {
  return l==="A1"?"#dc4c3c":l==="A2"?"#e09030":l==="B1"?"#d4a328":

function scoreOrientaMap(answers) {
  var AR=0,LH=0,TA=0,EE=0,CS=0;
  for(var i=0;i<5;i++){ AR+=answers[i]||0; }
  for(var i=5;i<10;i++){ LH+=answers[i]||0; }
  for(var i=10;i<15;i++){ TA+=answers[i]||0; }
  for(var i=15;i<20;i++){ EE+=answers[i]||0; }
  for(var i=20;i<25;i++){ CS+=answers[i]||0; }
  var dims=[{code:"AR",score:AR},{code:"LH",score:LH},{code:"TA",score:TA},{code:"EE",score:EE},{code:"CS",score:CS}];
  dims.sort(function(a,b){return b.score-a.score;});
  return {AR:AR,LH:LH,TA:TA,EE:EE,CS:CS,dominant:dims[0].code,secondary:dims[1].code,scores:dims};
}

      I: "Your Investigative profile reflects an analytical mind and exceptional intellectual curiosity that drives you forward. You find deep satisfaction in solving complex problems, exploring data, and asking the right questions to uncover meaningful answers. Academic, scientific, and technological environments naturally stimulate and challenge you. Your strengths include methodological rigor, critical thinking, and the ability to build compelling arguments from evidence. Careers in research, data science, medicine, or R&D engineering will allow you to fully deploy this remarkable intellectual potential.",
      A: "Your Artistic profile reveals creative sensitivity and an original vision of the world that sets you apart. You think outside conventional frameworks and bring a unique aesthetic dimension to everything you create or design. Environments that value personal expression, innovation, and creativity — design, communication, arts, culture — are where you truly flourish. Your ability to combine creativity with strategic vision is particularly valuable in today's creative economy. Trust your creative instinct — it is your most distinctive and enduring competitive advantage.",
      S: "Your Social profile reflects a genuine vocation for human support and the development of others. You possess a natural ability to build connections, listen actively, and inspire trust in all situations. Educational, social, healthcare, and counseling environments are your preferred professional terrain. Your relational intelligence and empathy are rare assets in a professional world that increasingly values human skills. Whether in teaching, social work, healthcare, or human resources, your positive impact on others is your greatest and most lasting strength.",
      E: "Your Enterprising profile reveals a natural leader temperament firmly oriented toward results and initiative. You are comfortable in negotiation, leadership, and strategic development situations that require vision and persuasion. Commercial, entrepreneurial, and project management environments allow you to fully express your energy and ambition. Your ability to mobilize teams around a vision and transform ideas into concrete projects is your distinctive added value. The world of business, consulting, and entrepreneurship is your natural space for growth and lasting success.",
      C: "Your Conventional profile reveals a structured, rigorous, and deeply reliable personality. You excel in managing systems, data, and procedures, bringing order and precision where others see complexity. Administrative, financial, and accounting environments provide the ideal framework for your analytical and organizational skills. Your attention to detail, ability to maintain high standards, and exceptional reliability make you an indispensable pillar in any organization. Accounting, finance, administration, and systems management are your domains of natural excellence."
    },
    ar: {
      R: "يكشف ملفك الواقعي عن شخصية تميل نحو العمل الملموس وإتقان التقنية. تزدهر في البيئات التي تُحل فيها المشكلات بأساليب عملية كالورش والمختبرات والفضاءات الإنتاجية. قوتك تكمن في تحويل الأفكار إلى نتائج ملموسة ومستدامة. تمثل مساراتك الطبيعية التقنيات الهندسية والصيانة الصناعية والحرف الدقيقة. ذكاؤك العملي وحسك التقني يشكلان أصولاً نادرة وثمينة في الاقتصاد الراهن.",
      I: "يعكس ملفك الاستطلاعي عقلاً تحليلياً وفضولاً فكرياً استثنائياً يقودك نحو الاستكشاف الدائم. تجد رضاك العميق في حل المشكلات المعقدة واستكشاف البيانات وطرح الأسئلة الصحيحة. البيئات العلمية والأكاديمية والتكنولوجية تحفزك وتغذي تميزك بشكل طبيعي. نقاط قوتك تشمل الصرامة المنهجية والتفكير النقدي وبناء الحجج المقنعة من الأدلة.",
      A: "يكشف ملفك الفني عن حساسية إبداعية ورؤية أصيلة للعالم تميزك عن الآخرين. تفكر خارج الأطر التقليدية وتضفي بُعداً جمالياً فريداً على كل ما تبتكره أو تصممه. البيئات التي تُقدّر التعبير الشخصي والابتكار والإبداع هي فضاؤك الطبيعي للتفتح. ثق بغريزتك الإبداعية — فهي ميزتك التنافسية الأكثر تميزاً وديمومة.",
      S: "يعكس ملفك الاجتماعي دعوة حقيقية لمرافقة الإنسان وتنمية الآخرين. تمتلك قدرة طبيعية على بناء الروابط والإنصات الفعّال وإلهام الثقة في جميع المواقف. ذكاؤك العلائقي وتعاطفك العميق أدوات نادرة في سوق الشغل الحديث الذي يقدّر المهارات الإنسانية بشكل متزايد.",
      E: "يكشف ملفك المقاولاتي عن مزاج قيادي طبيعي موجه نحو النتائج وروح المبادرة. تشعر بالراحة في مواقف التفاوض والقيادة والتطوير الاستراتيجي التي تتطلب رؤية وإقناعاً. قدرتك على تعبئة الفرق وتحويل الأفكار إلى مشاريع ملموسة هي قيمتك المضافة المميزة.",
      C: "يكشف ملفك التقليدي عن شخصية منظمة ودقيقة وجديرة بالثقة. تتفوق في إدارة الأنظمة والبيانات والإجراءات، مما يمنحك نظاماً ودقة حيث يرى الآخرون تعقيداً. انتباهك للتفاصيل وموثوقيتك العالية يجعلانك ركيزة لا غنى عنها في أي مؤسسة."
    }
  };
  var HNARR_ADV = {
    fr: {
      R: "Profil Réaliste dominant — score " + (h.R||0) + "%. L'individu présente une orientation pragmatique et concrète caractéristique du type R. Les activités manuelles, techniques et mécaniques constituent les vecteurs d'engagement principaux. Les environnements abstraits ou bureaucratiques risquent de générer frustration et désengagement. Intervention prioritaire : orienter vers des formations techniques professionnalisantes (OFPPT, BTS Technique). Évaluer le potentiel pour des certifications professionnelles reconnues (CISCO, OFPPT). Surveiller les risques de sous-qualification dans les filières purement théoriques.",
      I: "Profil Investigateur dominant — score " + (h.I||0) + "%. L'individu manifeste une orientation analytique et intellectuelle marquée avec préférence pour l'exploration abstraite. Tendance probable à l'introversion productive. Potentiel élevé pour des filières scientifiques ou technologiques. Risque d'hyperspécialisation précoce : encourager le développement de compétences transversales. Préconisation : accompagnement vers des concours académiques d'excellence (CPGE, Grandes Écoles), exploration des bourses de recherche disponibles, et renforcement des aptitudes en communication professionnelle.",

function openReport(html, filename) {
  /* Try Blob download */
  try {
    var blob = new Blob([html], { type:"text/html;charset=utf-8" });
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement("a");
    a.href = url; a.download = filename || "CareerMap-Report.html";
    document.body.appendChild(a); a.click();
    setTimeout(function(){ URL.revokeObjectURL(url); document.body.removeChild(a); }, 300);
    return;
  } catch(e1) {}
  /* Fallback: new tab */
  try {
    var w = window.open("", "_blank");
    if (w) { w.document.open(); w.document.write(html); w.document.close(); return; }
  } catch(e2) {}
  /* Last fallback: data URI */
  try {
    var a2 = document.createElement("a");
    a2.href = "data:text/html;charset=utf-8," + encodeURIComponent(html);
    a2.download = filename || "CareerMap-Report.html";
    document.body.appendChild(a2); a2.click(); document.body.removeChild(a2);
  } catch(e3) {}
}

function ReportViewer({ profile, scores, role, onClose }) {
  var [lang, setLang] = useState("fr");
  var iframeRef = React.useRef(null);
  var html = useMemo(function() {
    return buildReportHTML(profile, scores, role, lang);
  }, [profile, scores, role, lang]);

  function savePDF() {
    var loadDiv = document.createElement('div');
    loadDiv.id = 'pdf-loading';
    loadDiv.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999999;background:#06111f;display:flex;align-items:center;justify-content:center;flex-direction:column;font-family:Arial,sans-serif;';
    loadDiv.innerHTML = '<div style="color:#1aabaa;font-size:44px;margin-bottom:16px;">&#8987;</div>' +
      '<div style="color:#f0f4f8;font-size:19px;font-weight:700;margin-bottom:6px;">' +
      (lang === 'ar' ? 'جاري إنشاء PDF...' : lang === 'en' ? 'Generating PDF...' : 'Génération du PDF...') +
      '</div><div style="color:#6b8aaa;font-size:13px;margin-top:4px;" id="spdfprog"></div>';
    document.body.appendChild(loadDiv);

    /* Patch the live document BEFORE html2canvas clones it.
       html2canvas re-fetches @import URLs during document cloning — if Google Fonts
       is unreachable this causes an 11-second hang PER PAGE. Stripping external
       resource references from the live document prevents this entirely. */
    var cmapSt = document.getElementById('cmap');
    var origCmapText = cmapSt ? cmapSt.textContent : null;
    if (cmapSt) cmapSt.textContent = origCmapText.replace(/@import\s+url\([^)]*\)[^;]*;?\s*/gi, '');

    /* The report preview iframe (srcDoc=html) contains a <link> to Google Fonts.
       When html2canvas clones the document it re-processes the iframe's srcdoc,
       triggering another font fetch. Replace with a stub before cloning. */
    var previewIf = iframeRef ? iframeRef.current : null;
    var origSrcdoc = previewIf ? previewIf.getAttribute('srcdoc') : null;
    if (previewIf) previewIf.setAttribute('srcdoc', '<html><body></body></html>');

    var sm = html.match(/<style[^>]*>([\s\S]*?)<\/style>/i);
    var styles = sm ? sm[1].replace('*{', '#cmrpt *{').replace('body{', '#cmrpt{') : '';
    var styleEl = document.createElement('style');
    styleEl.id = 'cmrpt-s';
    styleEl.textContent = styles;
    document.head.appendChild(styleEl);

    var b1 = html.indexOf('<body');
    var b2 = b1 >= 0 ? html.indexOf('>', b1) + 1 : 0;
    var b3 = html.lastIndexOf('</body>');
    var bodyContent = (b1 >= 0 && b3 > b2) ? html.substring(b2, b3) : '';
    bodyContent = bodyContent.replace(/<img\b[^>]*>/gi, '');

    var container = document.createElement('div');
    container.id = 'cmrpt';
    container.style.cssText = 'position:fixed;top:0;left:0;width:794px;overflow:visible;z-index:0;';
    container.innerHTML = bodyContent;
    document.body.appendChild(container);

    function cleanup() {
      var el = document.getElementById('pdf-loading');
      if (el && el.parentNode) el.parentNode.removeChild(el);
      if (container.parentNode) container.parentNode.removeChild(container);
      var se = document.getElementById('cmrpt-s');
      if (se && se.parentNode) se.parentNode.removeChild(se);
      if (cmapSt && origCmapText !== null) cmapSt.textContent = origCmapText;
      if (previewIf && origSrcdoc !== null) previewIf.setAttribute('srcdoc', origSrcdoc);
    }

    var pdfFn = 'CareerMap_' + (profile.name || profile.id || 'Report').replace(/[^a-zA-Z0-9_-]/g, '_') + '_' + lang + '.pdf';
    /* onclone: belt-and-suspenders cleanup in case the cloned document still has
       external link/style references (e.g. from the iframe stub's own processing) */
    function stripInClone(clonedDoc) {
      var sts = clonedDoc.querySelectorAll('style');
      for (var j = 0; j < sts.length; j++) {
        sts[j].textContent = sts[j].textContent.replace(/@import\s+url\([^)]*\)[^;]*;?\s*/gi, '');
      }
      var lks = clonedDoc.querySelectorAll('link[rel="stylesheet"],link[rel="preconnect"]');
      for (var k = 0; k < lks.length; k++) {
        if (lks[k].parentNode) lks[k].parentNode.removeChild(lks[k]);
      }
      var ifs = clonedDoc.querySelectorAll('iframe');
      for (var m = 0; m < ifs.length; m++) {
        if (ifs[m].parentNode) ifs[m].parentNode.removeChild(ifs[m]);
      }
    }
    var opt = {
      margin: 0, filename: pdfFn,
      image: {type: 'jpeg', quality: 0.95},
      html2canvas: {scale: 2, useCORS: false, allowTaint: true, logging: false, backgroundColor: '#ffffff', foreignObjectRendering: false, onclone: stripInClone},
      jsPDF: {unit: 'mm', format: 'a4', orientation: 'portrait'}
    };

    function doRender() {
      var pgs = container.querySelectorAll('.pdf-page');
      var n = pgs.length;
      var pr = document.getElementById('spdfprog');
      if (!n) { cleanup(); return; }
      if (pr) pr.textContent = '1 / ' + n;
      html2pdf().set(opt).from(pgs[0]).toPdf().get('pdf').then(function(pdf) {
        var i = 1;
        function nx() {
          if (i >= n) { pdf.save(pdfFn); cleanup(); return; }
          if (pr) pr.textContent = (i + 1) + ' / ' + n;
          html2pdf().set(opt).from(pgs[i]).toCanvas().get('canvas').then(function(c) {
            pdf.addPage();
            pdf.addImage(c.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, 210, 297);
            i++; nx();
          }).catch(function() { i++; nx(); });
        }
        nx();
      }).catch(function(err) {
        var pr2 = document.getElementById('spdfprog');
        if (pr2) pr2.textContent = 'Erreur — ' + (err && err.message ? err.message : String(err));
        setTimeout(cleanup, 3000);
      });
    }

    document.fonts.ready.then(function() {
      setTimeout(doRender, 600);
    });
  }

  var langLabels = { fr:"FR", en:"EN", ar:"ع" };
  var titleLabel = { fr:"Aperçu du rapport", en:"Report Preview", ar:"معاينة التقرير" };

  return (
    <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0,
        background:"rgba(6,17,31,.97)", zIndex:9999, display:"flex", flexDirection:"column" }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
          padding:"10px 18px", background:"#0d1f33", borderBottom:"1px solid #1a3a55",
          flexShrink:0, flexWrap:"wrap", gap:8 }}>
        <span style={{ fontWeight:900, fontSize:16, color:"#f0f4f8" }}>
          Career<span style={{ color:"#1aabaa" }}>Map</span>
          <span style={{ fontSize:11, color:"#6b8aaa", fontWeight:400, marginLeft:10 }}>
            {titleLabel[lang]||titleLabel.fr}
          </span>
        </span>
        <div style={{ display:"flex", gap:6, alignItems:"center", flexWrap:"wrap" }}>
          <div style={{ display:"flex", gap:4, marginRight:4 }}>
            {["fr","en","ar"].map(function(l) {
              return (
                <button key={l} onClick={function(){ setLang(l); }}
                  style={{ padding:"6px 12px", borderRadius:99, fontFamily:"inherit",
                    fontSize:12, fontWeight:700, cursor:"pointer", transition:"all .2s",
                    background: lang===l ? "#d4a328" : "rgba(255,255,255,.07)",
                    color: lang===l ? "#06111f" : "#6b8aaa",
                    border: "1.5px solid " + (lang===l ? "#d4a328" : "#1a3a55") }}>
                  {langLabels[l]}
                </button>
              );
            })}
          </div>
          <button onClick={savePDF}
            style={{ padding:"8px 16px", background:"#1aabaa",
                color:"#06111f", border:"none", borderRadius:8,
                fontFamily:"inherit", fontSize:13, fontWeight:800, cursor:"pointer" }}>
            ⬇ PDF
          </button>
          <button onClick={onClose}
            style={{ padding:"8px 14px", background:"rgba(255,255,255,.05)",
                border:"1px solid #1a3a55", color:"#8fadc8",
                borderRadius:8, fontFamily:"inherit", fontSize:13, cursor:"pointer" }}>
            ✕
          </button>
        </div>
      </div>
      <iframe ref={iframeRef} srcDoc={html}
        style={{ flex:1, border:"none", background:"#fff" }}
        title="CareerMap Report"/>
    </div>
  );
}

/* ─── SPEEDOMETER GAUGE ──────────────────────────────────────────────────── */
function SpeedoGauge({ selected, onSelect, opts }) {
  var W=340, H=200, cx=170, cy=190, RO=148, RI=50, CR=16;

  function toRad(deg){ return deg * Math.PI / 180; }
  function pt(deg, r){ return { x: cx + r*Math.cos(toRad(deg)), y: cy - r*Math.sin(toRad(deg)) }; }

  function segPath(a1, a2) {
    var p1=pt(a1,RO), p2=pt(a2,RO), p3=pt(a2,RI), p4=pt(a1,RI);
    return "M "+p1.x+" "+p1.y+
           " A "+RO+" "+RO+" 0 0 0 "+p2.x+" "+p2.y+
           " L "+p3.x+" "+p3.y+
           " A "+RI+" "+RI+" 0 0 1 "+p4.x+" "+p4.y+" Z";
  }

  var SEGS = [[180,144],[144,108],[108,72],[72,36],[36,0]];
  var MIDS = [162, 126, 90, 54, 18];

  /* Bright colours for selected segment — each segment gets its own accent */
  var SEG_COLS = ["#e53935","#fb8c00","#fdd835","#43a047","#00acc1"];

  var hasSel  = selected !== null && selected !== undefined;
  var needDeg = hasSel ? MIDS[selected] : 90;
  var tip     = pt(needDeg, RO * 0.72);
  var tail    = pt(needDeg + 180, 18);

  return (
    <svg width="100%" viewBox={"0 0 "+W+" "+H}
      style={{ display:"block", overflow:"visible" }}>
      <defs>
        <linearGradient id="sg_chrome" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%"   stopColor="#f5f5f5"/>
          <stop offset="18%"  stopColor="#d8d8d8"/>
          <stop offset="52%"  stopColor="#a0a0a0"/>
          <stop offset="82%"  stopColor="#888"/>
          <stop offset="100%" stopColor="#c8c8c8"/>
        </linearGradient>
        <linearGradient id="sg_shine" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stopColor="rgba(255,255,255,.55)"/>
          <stop offset="38%"  stopColor="rgba(255,255,255,0)"/>
          <stop offset="62%"  stopColor="rgba(255,255,255,0)"/>
          <stop offset="100%" stopColor="rgba(255,255,255,.35)"/>
        </linearGradient>
      </defs>

      {/* ── Outer chrome ring ── */}
      <path
        d={"M "+pt(180,RO+CR).x+" "+pt(180,RO+CR).y+
            " A "+(RO+CR)+" "+(RO+CR)+" 0 0 0 "+pt(0,RO+CR).x+" "+pt(0,RO+CR).y+
            " L "+pt(0,RO).x+" "+pt(0,RO).y+
            " A "+RO+" "+RO+" 0 0 1 "+pt(180,RO).x+" "+pt(180,RO).y+" Z"}
        fill="url(#sg_chrome)"/>
      <path
        d={"M "+pt(180,RO+CR).x+" "+pt(180,RO+CR).y+
            " A "+(RO+CR)+" "+(RO+CR)+" 0 0 0 "+pt(0,RO+CR).x+" "+pt(0,RO+CR).y+
            " L "+pt(0,RO).x+" "+pt(0,RO).y+
            " A "+RO+" "+RO+" 0 0 1 "+pt(180,RO).x+" "+pt(180,RO).y+" Z"}
        fill="url(#sg_shine)"/>
      <path d={"M "+pt(180,RO+CR).x+" "+pt(180,RO+CR).y+" A "+(RO+CR)+" "+(RO+CR)+" 0 0 0 "+pt(0,RO+CR).x+" "+pt(0,RO+CR).y}
        fill="none" stroke="#ddd" strokeWidth={1}/>
      <path d={"M "+pt(180,RO).x+" "+pt(180,RO).y+" A "+RO+" "+RO+" 0 0 0 "+pt(0,RO).x+" "+pt(0,RO).y}
        fill="none" stroke="#666" strokeWidth={1}/>

      {/* ── Segments ── */}
      {SEGS.map(function(s, i){
        var isSel = selected === i;
        return (
          <path key={i} d={segPath(s[0], s[1])}
            fill={isSel ? SEG_COLS[i] : "#167070"}
            onClick={function(){ onSelect(i); }}
            style={{ cursor:"pointer", transition:"fill .15s" }}/>
        );
      })}

      {/* Segment dividers */}
      {[144,108,72,36].map(function(deg){
        var a=pt(deg,RI+1), b=pt(deg,RO-1);
        return <line key={deg} x1={a.x} y1={a.y} x2={b.x} y2={b.y}
          stroke="rgba(0,0,0,.4)" strokeWidth={1.5}/>;
      })}

      {/* Bottom flat fill */}
      <rect x={cx-RO} y={cy-4} width={RO*2} height={8} fill="#167070"/>

      {/* ── Labels ── */}
      {MIDS.map(function(deg, i){
        var lp    = pt(deg, (RO+RI)/2);
        var words = (opts[i]||"").split(" ");
        var isSel = selected === i;
        return (
          <text key={i} x={lp.x} y={lp.y}
            textAnchor="middle" dominantBaseline="middle"
            fill={isSel ? "#fff" : "rgba(255,255,255,.75)"}
            fontSize={isSel ? 11 : 9}
            fontWeight={isSel ? "900" : "500"}
            fontFamily="Arial,sans-serif"
            onClick={function(){ onSelect(i); }}
            style={{ cursor:"pointer", transition:"fill .15s, font-size .15s" }}>
            {words.map(function(w, j){
              return <tspan key={j} x={lp.x} dy={j===0 ? -((words.length-1)*6) : 12}>
                {w.toUpperCase()}
              </tspan>;
            })}
          </text>
        );
      })}

      {/* ── Needle / Arrow — drawn directly, no CSS transition issues ── */}
      {hasSel && (
        <g>
          {/* Shadow */}
          <line x1={cx+1} y1={cy+1} x2={tip.x+1} y2={tip.y+1}
            stroke="rgba(0,0,0,.3)" strokeWidth={5} strokeLinecap="round"/>
          {/* Main needle shaft */}
          <line x1={cx} y1={cy} x2={tip.x} y2={tip.y}
            stroke="#ffffff" strokeWidth={4} strokeLinecap="round"/>
          {/* Arrowhead triangle */}
          {(function(){
            var ang   = Math.atan2(cy - tip.y, tip.x - cx);
            var aw    = 9;
            var al    = 18;
            var bx    = tip.x - al*Math.cos(ang);
            var by    = tip.y + al*Math.sin(ang);
            var lx    = bx - aw*Math.sin(ang);
            var ly    = by - aw*Math.cos(ang);
            var rx    = bx + aw*Math.sin(ang);
            var ry    = by + aw*Math.cos(ang);
            return <polygon
              points={tip.x+","+tip.y+" "+lx+","+ly+" "+rx+","+ry}
              fill="#ffffff"/>;
          })()}
          {/* Counterweight */}
          <line x1={cx} y1={cy} x2={tail.x} y2={tail.y}
            stroke="rgba(255,255,255,.4)" strokeWidth={4} strokeLinecap="round"/>
        </g>
      )}

      {/* ── Hub ── */}
      <circle cx={cx} cy={cy} r={20} fill="#0a3a3a" stroke="#777" strokeWidth={2}/>
      <circle cx={cx} cy={cy} r={11}
        fill={hasSel ? SEG_COLS[selected] : "#334"}
        style={{ transition:"fill .15s" }}/>
      <circle cx={cx} cy={cy} r={5} fill="rgba(255,255,255,.75)"/>
    </svg>
  );
}


/* ─── LOGIN ──────────────────────────────────────────────────────────────── */
function Login({ lang, setLang, onLogin, advisors }) {
  injectCSS();
  var ar = lang === "ar";
  var [val, setVal] = useState("");
  var [err, setErr] = useState("");
  var role = detectRole(val);

  var RCOL = { admin:C.gr, advisor:C.pu, candidate:C.teal, unknown:C.re };
  var RBG  = { admin:"rgba(29,184,122,.15)", advisor:"rgba(144,80,208,.15)", candidate:"rgba(26,171,170,.15)", unknown:"rgba(220,76,60,.12)" };
  var RICO = { admin:"⚙️", advisor:"👔", candidate:"🎓", unknown:"❌" };
  var RLBL = {
    admin:     ar ? "مدير النظام"        : lang==="fr" ? "Administrateur"    : "Administrator",
    advisor:   ar ? "مستشار"             : lang==="fr" ? "Conseiller"         : "Advisor",
    candidate: ar ? "مترشح"              : lang==="fr" ? "Candidat"           : "Candidate",
    unknown:   ar ? "صيغة غير معروفة"   : lang==="fr" ? "Format non reconnu" : "Unrecognised format",
  };

  function submit() {
    var v = val.trim();
    if (!v) { setErr(ar ? "أدخل كود الوصول." : "Please enter your access code."); return; }
    if (role === "admin") { onLogin({ name:"Administrator", id:"admin", role:"admin" }); return; }
    if (role === "advisor") {
      var found = (advisors || []).find(function(a) { return a.code.toLowerCase() === v.toLowerCase(); });
      if (!found) { setErr(ar ? "كود غير صالح." : "Invalid code. Contact the admin."); return; }
      onLogin({ name:found.name, id:v, role:"advisor" }); return;
    }
    if (role === "candidate") { onLogin({ name:"", id:v.toUpperCase(), role:"candidate" }); return; }
    setErr(ar ? "كود غير صالح." : "Invalid code. Please try again.");
  }

  var borderColor = (role && role !== "unknown") ? RCOL[role] : C.bdr;
  var btnBg = (role && role !== "unknown")
    ? "linear-gradient(135deg," + RCOL[role] + "," + RCOL[role] + "cc)"
    : "linear-gradient(135deg," + C.gold + "," + C.goldL + ")";

  return (
    <div style={{ height:"100%", background:C.bg, display:"flex", alignItems:"center",
        justifyContent:"center", padding:20, position:"relative", overflow:"hidden" }}>
      <div style={{ position:"absolute", left:-80, top:-80, width:280, height:280,
          borderRadius:"50%", background:C.goldG, filter:"blur(60px)", animation:"glow 4s ease-in-out infinite" }}/>
      <div style={{ position:"absolute", right:-60, bottom:-60, width:240, height:240,
          borderRadius:"50%", background:C.tealG, filter:"blur(60px)", animation:"glow 4s ease-in-out 2s infinite" }}/>
      <div style={{ position:"absolute", top:14, right:ar?undefined:14, left:ar?14:undefined, zIndex:9 }}>
        <LangBtn lang={lang} set={setLang}/>
      </div>

      <div className="fadeUp" style={{ background:C.card, borderRadius:22, padding:"34px 24px",
          width:"100%", maxWidth:400, border:"1px solid "+C.bdr,
          position:"relative", zIndex:5, boxShadow:"0 0 60px rgba(0,0,0,.5)" }}>

        <div style={{ textAlign:"center", marginBottom:12 }}>
          <div style={{ display:"flex", justifyContent:"center", marginBottom:10 }}>
            <CareerMapLogo size={90}/>
          </div>
          <h1 className="sy" style={{ fontSize:24, color:C.wh, letterSpacing:.5, fontWeight:900 }}>
            Career<span style={{ color:C.teal }}>Map</span>
          </h1>
        </div>
        <p style={{ textAlign:"center", color:C.mu, fontSize:11, marginBottom:24 }}>
          {ar ? "خريطة مسارك المهني والشخصي" : lang==="fr" ? "Cartographiez votre parcours de carrière" : "Map Your Career & Personality Path"}
        </p>

        <label style={{ display:"block", fontSize:9, fontWeight:700, color:C.mu,
            marginBottom:6, letterSpacing:.9, textTransform:"uppercase" }}>
          {ar ? "كود الوصول" : lang==="fr" ? "Code d'Accès" : "Access Code"}
        </label>
        <input
          autoFocus value={val}
          onChange={function(e) { var v = e.target.value; if (!v.startsWith("@")) v = v.toUpperCase(); setVal(v); setErr(""); }}
          onKeyDown={function(e) { if (e.key === "Enter") submit(); }}
          placeholder=""
          style={{ width:"100%", padding:"13px 14px", background:"rgba(255,255,255,.04)",
            border:"2px solid "+borderColor, borderRadius:11, fontSize:14, fontFamily:"monospace",
            color:C.wh, marginBottom:12, transition:"border-color .2s", letterSpacing:1 }}
        />

        {err && <p style={{ color:C.re, fontSize:11, marginBottom:10 }}>{err}</p>}

        <button onClick={submit}
          style={{ width:"100%", padding:15, background:btnBg,
            color:C.bg, border:"none", borderRadius:12,
            fontFamily:"inherit", fontSize:15, fontWeight:800 }}>
          {ar ? "← متابعة" : lang==="fr" ? "Continuer →" : "Continue →"}
        </button>


      </div>
    </div>
  );
}

/* ─── PROFILE FORM HELPERS ──────────────────────────────────────────────── */
function FloatInput({ label, value, onChange, placeholder, type, ok, err, autoFocus }) {
  var col = err ? C.re : ok ? C.gr : C.bdr;
  var lCol = err ? C.re : ok ? C.gr : C.mu;
  return (
    <div>
      <div style={{ fontSize:9, fontWeight:700, color:lCol, marginBottom:5, letterSpacing:.8,
          textTransform:"uppercase", display:"flex", alignItems:"center", gap:3 }}>
        {label} {ok && <span style={{ color:C.gr }}>✓</span>} <span style={{ color:C.re }}>*</span>
      </div>
      <input type={type||"text"} value={value} placeholder={placeholder} autoFocus={autoFocus}
        onChange={function(e){ onChange(e.target.value); }}
        style={{ width:"100%", padding:"12px 13px", background:"rgba(255,255,255,.04)",
          border:"1.5px solid "+col, borderRadius:10, color:C.wh, fontSize:13,
          transition:"border-color .2s", boxSizing:"border-box" }}/>
    </div>
  );
}
function FieldLabel({ children }) {
  return (
    <div style={{ fontSize:9, fontWeight:700, color:C.mu, marginBottom:6,
        letterSpacing:.8, textTransform:"uppercase" }}>
      {children} <span style={{ color:C.re }}>*</span>
    </div>
  );
}

/* ─── PROFILE FORM ───────────────────────────────────────────────────────── */
function ProfileForm({ lang, setLang, user, onNext, onLogout }) {
  var ar = lang === "ar";
  var [pf, setPf] = useState({ firstName:"", lastName:"", email:"", phone:"", age:"", gender:"", edu:"", region:"", prefecture:"", status:"", photo:"" });
  var isCasa = pf.region === "Casablanca-Settat";
  var ok = pf.firstName && pf.lastName && pf.email && pf.phone && pf.age && pf.gender && pf.edu && pf.region && pf.status && (!isCasa || pf.prefecture);

  /* scroll refs */
  var scrollRef    = useRef(null);   // the scrollable container
  var prefRef      = useRef(null);   // the prefecture section

  /* Auto-scroll to prefecture field when Casablanca is selected */
  useEffect(function() {
    if (isCasa && prefRef.current) {
      setTimeout(function() {
        prefRef.current.scrollIntoView({ behavior:"smooth", block:"start" });
      }, 120);
    }
  }, [isCasa]);

  function setField(k) {
    return function(v) {
      setPf(function(p) {
        var next = Object.assign({}, p, { [k]: v });
        if (k === "region") next.prefecture = "";
        return next;
      });
    };
  }

  var photoRef = useRef(null);
  function handlePhoto(e) {
    var file = e.target.files && e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) { setPf(function(p){ return Object.assign({},p,{photo:ev.target.result}); }); };
    reader.readAsDataURL(file);
  }

  var [submitErr, setSubmitErr] = useState("");

  var iStyle = { width:"100%", padding:"11px 12px", background:"rgba(255,255,255,.04)",
    border:"1.5px solid "+C.bdr, borderRadius:10, color:C.wh, fontSize:13 };
  var lStyle = { display:"block", fontSize:9, fontWeight:700, color:C.mu,
    marginBottom:5, letterSpacing:.8, textTransform:"uppercase" };
  var regionList  = MOROCCO_REGIONS;
  var genderList  = GENDERS[lang]  || GENDERS.en;
  var eduList     = EDUS[lang]     || EDUS.en;
  var statusList  = STATUSES[lang] || STATUSES.en;

  function handleNext() {
    var missing = [];
    if (!pf.firstName) missing.push(ar ? "الاسم الشخصي" : lang==="fr" ? "Prénom" : "First Name");
    if (!pf.lastName)  missing.push(ar ? "اسم العائلة" : lang==="fr" ? "Nom de famille" : "Last Name");
    var emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(pf.email);
    if (!pf.email)     missing.push(ar ? "البريد الإلكتروني" : lang==="fr" ? "Email" : "Email");
    else if (!emailOk) missing.push(ar ? "صيغة البريد غير صحيحة" : lang==="fr" ? "Format email invalide (ex: nom@email.com)" : "Invalid email (e.g. name@email.com)");
    var phoneOk = /^[+]?[\d\s\-().]{8,15}$/.test(pf.phone);
    if (!pf.phone)     missing.push(ar ? "رقم الهاتف" : lang==="fr" ? "Téléphone" : "Phone");
    else if (!phoneOk) missing.push(ar ? "رقم الهاتف غير صحيح" : lang==="fr" ? "Numéro invalide" : "Invalid phone number");
    if (!pf.age)       missing.push(ar ? "الفئة العمرية" : lang==="fr" ? "Tranche d'âge" : "Age Group");
    if (!pf.gender)    missing.push(ar ? "الجنس" : lang==="fr" ? "Genre" : "Gender");
    if (!pf.edu)       missing.push(ar ? "المستوى الدراسي" : lang==="fr" ? "Niveau d'études" : "Education Level");
    if (!pf.status)    missing.push(ar ? "الوضعية المهنية" : lang==="fr" ? "Situation professionnelle" : "Occupation Status");
    if (!pf.region)    missing.push(ar ? "الجهة" : lang==="fr" ? "Région" : "Region");
    if (isCasa && !pf.prefecture) missing.push(ar ? "العمالة/المقاطعة" : lang==="fr" ? "Préfecture" : "Prefecture");
    if (missing.length > 0) {
      setSubmitErr((ar ? "يرجى إكمال: " : lang==="fr" ? "Veuillez compléter : " : "Please fill in: ") + missing.join(" · "));
      return;
    }
    setSubmitErr("");
    onNext(pf);
  }

  var pfTotal  = isCasa ? 10 : 9;
  var pfFilled = [pf.firstName,pf.lastName,pf.email,pf.phone,pf.age,pf.gender,pf.edu,pf.status,pf.region].concat(isCasa?[pf.prefecture]:[]).filter(Boolean).length;
  var pfPct    = Math.round(pfFilled / pfTotal * 100);

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%", background:C.bg }}>
      <TopBar lang={lang} setLang={setLang} user={user} onLogout={onLogout}/>

      {/* ── HEADER ── */}
      <div style={{ background:"linear-gradient(160deg,"+C.sur+","+C.cardB+")", borderBottom:"1px solid "+C.bdr, padding:"14px 16px", flexShrink:0 }}>
        <div style={{ maxWidth:480, margin:"0 auto" }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <div>
              <div style={{ fontSize:10, color:C.mu, marginBottom:2, letterSpacing:.5 }}>
                {ar?"رقمك":lang==="fr"?"Votre ID":"Your ID"}{" · "}
                <span style={{ color:C.teal, fontFamily:"monospace", fontWeight:700 }}>{user.id}</span>
              </div>
              <div className="sy" style={{ fontSize:15, fontWeight:800, color:C.wh }}>
                {ar?"معلوماتك الشخصية":lang==="fr"?"Vos informations":"Your Information"}
              </div>
            </div>
            <button onClick={handleNext} style={{
              padding:"11px 20px",
              background: ok ? "linear-gradient(135deg,"+C.gold+","+C.goldL+")" : "rgba(255,255,255,.08)",
              color: ok ? C.bg : C.mu,
              border: ok ? "none" : "1.5px solid "+C.bdr,
              borderRadius:12, fontFamily:"inherit", fontSize:13, fontWeight:800,
              cursor:"pointer", display:"flex", alignItems:"center", gap:6,
              transition:"all .2s", boxShadow: ok ? "0 4px 18px "+C.goldG : "none"
            }}>
              {ok && <span>✓</span>}
              <span>{ar?"التالي →":lang==="fr"?"Suivant →":"Next →"}</span>
            </button>
          </div>

          {submitErr && (
            <div style={{ marginTop:8, padding:"7px 12px", background:C.re+"18",
                border:"1px solid "+C.re+"40", borderRadius:8, fontSize:10, color:C.re }}>
              ⚠️ {submitErr}
            </div>
          )}
        </div>
      </div>

      {/* ── SCROLLABLE FORM ── */}
      <div ref={scrollRef} style={{ flex:1, overflowY:"auto", padding:"16px 15px 40px" }}>
        <div style={{ maxWidth:480, margin:"0 auto" }}>

          {/* ── Identity ── */}
          <SectionHead icon="👤" title={ar?"الهوية":lang==="fr"?"Identité":"Identity"}/>

          {/* Photo upload — optional */}
          <div style={{ display:"flex", alignItems:"center", gap:14, marginBottom:16 }}>
            <div onClick={function(){ photoRef.current && photoRef.current.click(); }}
              style={{ width:72, height:72, borderRadius:"50%", overflow:"hidden", flexShrink:0,
                background:"rgba(255,255,255,.06)", border:"2px dashed "+C.bdr,
                display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer",
                transition:"border-color .2s", position:"relative" }}>
              {pf.photo
                ? <img src={pf.photo} alt="photo" style={{ width:"100%", height:"100%", objectFit:"cover" }}/>
                : <span style={{ fontSize:28, opacity:.4 }}>👤</span>}
            </div>
            <div>
              <div style={{ fontSize:11, fontWeight:700, color:C.wh, marginBottom:4 }}>
                {ar?"الصورة الشخصية":lang==="fr"?"Photo de profil":"Profile photo"}
                <span style={{ marginLeft:6, fontSize:9, color:C.mu, fontWeight:400 }}>
                  ({ar?"اختياري":lang==="fr"?"optionnel":"optional"})
                </span>
              </div>
              <button onClick={function(){ photoRef.current && photoRef.current.click(); }}
                style={{ padding:"6px 14px", background:"rgba(255,255,255,.07)", border:"1.5px solid "+C.bdr,
                  borderRadius:8, color:C.mu, fontSize:11, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>
                {pf.photo
                  ? (ar?"تغيير الصورة":lang==="fr"?"Changer":"Change photo")
                  : (ar?"رفع صورة":lang==="fr"?"Ajouter une photo":"Upload photo")}
              </button>
              {pf.photo && (
                <button onClick={function(){ setPf(function(p){ return Object.assign({},p,{photo:""}); }); }}
                  style={{ marginLeft:8, padding:"6px 10px", background:"transparent", border:"none",
                    color:C.re, fontSize:11, cursor:"pointer", fontFamily:"inherit" }}>✕</button>
              )}
              <input ref={photoRef} type="file" accept="image/*" onChange={handlePhoto}
                style={{ display:"none" }}/>
            </div>
          </div>

          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:16 }}>
            <FloatInput label={ar?"الاسم الشخصي":lang==="fr"?"Prénom":"First Name"}
              value={pf.firstName} placeholder={ar?"الاسم":lang==="fr"?"Prénom":"First"} autoFocus
              ok={!!pf.firstName}
              onChange={function(v){ setField("firstName")(v); setSubmitErr(""); }}/>
            <FloatInput label={ar?"اسم العائلة":lang==="fr"?"Nom":"Last Name"}
              value={pf.lastName} placeholder={ar?"اسم العائلة":lang==="fr"?"Nom":"Last"}
              ok={!!pf.lastName}
              onChange={function(v){ setField("lastName")(v); setSubmitErr(""); }}/>
          </div>

          {/* ── Contact ── */}
          <SectionHead icon="📬" title={ar?"التواصل":lang==="fr"?"Contact":"Contact"}/>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:16 }}>
            <FloatInput label="Email" value={pf.email} type="email" placeholder="name@email.com"
              ok={!!pf.email && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(pf.email)}
              err={!!pf.email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(pf.email)}
              onChange={function(v){ setField("email")(v); setSubmitErr(""); }}/>
            <FloatInput label={ar?"الهاتف":lang==="fr"?"Téléphone":"Phone"} value={pf.phone} type="tel"
              placeholder="+212 6XX..."
              ok={!!pf.phone && /^[+]?[\d\s\-().]{8,15}$/.test(pf.phone)}
              err={!!pf.phone && !/^[+]?[\d\s\-().]{8,15}$/.test(pf.phone)}
              onChange={function(v){ setField("phone")(v); setSubmitErr(""); }}/>
          </div>

          {/* ── Profile ── */}
          <SectionHead icon="📊" title={ar?"البيانات الشخصية":lang==="fr"?"Profil":"Profile"}/>

          {/* Gender toggle */}
          <div style={{ marginBottom:14 }}>
            <FieldLabel>{ar?"الجنس":lang==="fr"?"Genre":"Gender"}</FieldLabel>
            <div style={{ display:"flex", gap:8 }}>
              {genderList.map(function(g){
                var sel = pf.gender === g;
                return (
                  <button key={g} onClick={function(){ setField("gender")(g); setSubmitErr(""); }}
                    style={{ flex:1, padding:"12px 0", borderRadius:11, cursor:"pointer",
                      border:"1.5px solid "+(sel ? C.teal : C.bdr),
                      background: sel ? C.teal+"22" : "rgba(255,255,255,.03)",
                      color: sel ? C.teal : C.mu, fontSize:13, fontWeight:700,
                      transition:"all .15s" }}>
                    {g}
                  </button>
                );
              })}
            </div>
          </div>

          {/* Age pills */}
          <div style={{ marginBottom:14 }}>
            <FieldLabel>{ar?"الفئة العمرية":lang==="fr"?"Tranche d'âge":"Age Group"}</FieldLabel>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:7 }}>
              {AGES.map(function(a){
                var sel = pf.age === a;
                return (
                  <button key={a} onClick={function(){ setField("age")(a); setSubmitErr(""); }}
                    style={{ padding:"10px 0", borderRadius:10, cursor:"pointer",
                      border:"1.5px solid "+(sel ? C.gold : C.bdr),
                      background: sel ? C.gold+"22" : "rgba(255,255,255,.03)",
                      color: sel ? C.gold : C.mu, fontSize:11, fontWeight:700,
                      transition:"all .15s" }}>
                    {a}
                  </button>
                );
              })}
            </div>
          </div>

          {/* Status pills 2-col */}
          <div style={{ marginBottom:14 }}>
            <FieldLabel>{ar?"الوضعية":lang==="fr"?"Situation":"Status"}</FieldLabel>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:7 }}>
              {statusList.map(function(s){
                var sel = pf.status === s;
                return (
                  <button key={s} onClick={function(){ setField("status")(s); setSubmitErr(""); }}
                    style={{ padding:"10px 8px", borderRadius:10, cursor:"pointer",
                      border:"1.5px solid "+(sel ? C.pu : C.bdr),
                      background: sel ? C.pu+"22" : "rgba(255,255,255,.03)",
                      color: sel ? "#c090ff" : C.mu, fontSize:11, fontWeight:700,
                      transition:"all .15s", textAlign:"center", lineHeight:1.3 }}>
                    {s}
                  </button>
                );
              })}
            </div>
          </div>

          {/* Education styled select */}
          <div style={{ marginBottom:14 }}>
            <FieldLabel>{ar?"المستوى الدراسي":lang==="fr"?"Niveau d'études":"Education"}</FieldLabel>
            <div style={{ position:"relative" }}>
              <select value={pf.edu} onChange={function(e){ setField("edu")(e.target.value); setSubmitErr(""); }}
                style={{ width:"100%", padding:"13px 36px 13px 14px", appearance:"none", WebkitAppearance:"none",
                  background:"rgba(255,255,255,.04)", border:"1.5px solid "+(pf.edu ? C.gr : C.bdr),
                  borderRadius:11, color: pf.edu ? C.wh : C.mu, fontSize:13, cursor:"pointer", boxSizing:"border-box" }}>
                <option value="">{ar?"اختر المستوى":lang==="fr"?"Choisir...":"Select..."}</option>
                {eduList.map(function(o){ return <option key={o} value={o}>{o}</option>; })}
              </select>
              <span style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)",
                color:C.mu, pointerEvents:"none", fontSize:14 }}>▾</span>
            </div>
          </div>

          {/* ── Location ── */}
          <SectionHead icon="📍" title={ar?"الموقع الجغرافي":lang==="fr"?"Localisation":"Location"}/>

          <div style={{ marginBottom: isCasa ? 14 : 0 }}>
            <FieldLabel>{ar?"الجهة":lang==="fr"?"Région":"Region"}</FieldLabel>
            <div style={{ position:"relative" }}>
              <select value={pf.region} onChange={function(e){ setField("region")(e.target.value); setSubmitErr(""); }}
                style={{ width:"100%", padding:"13px 36px 13px 14px", appearance:"none", WebkitAppearance:"none",
                  background:"rgba(255,255,255,.04)", border:"1.5px solid "+(pf.region ? C.gr : C.bdr),
                  borderRadius:11, color: pf.region ? C.wh : C.mu, fontSize:13, cursor:"pointer", boxSizing:"border-box" }}>
                <option value="">{ar?"اختر الجهة":lang==="fr"?"Choisir...":"Select..."}</option>
                {regionList.map(function(o){ return <option key={o} value={o}>{o}</option>; })}
              </select>
              <span style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)",
                color:C.mu, pointerEvents:"none", fontSize:14 }}>▾</span>
            </div>
          </div>

          {isCasa && (
            <div ref={prefRef} style={{ marginTop:14 }}>
              <div style={{ padding:"8px 12px", background:C.goldP, borderRadius:10,
                  border:"1px solid "+C.gold+"30", marginBottom:10, display:"flex", alignItems:"center", gap:8 }}>
                <span>🏙️</span>
                <p style={{ fontSize:10, color:C.goldL }}>
                  {ar?"حدد العمالة/الإقليم داخل جهة الدار البيضاء-سطات:":lang==="fr"?"Précisez votre préfecture:":"Select your prefecture within Casablanca-Settat:"}
                </p>
              </div>
              <FieldLabel>{ar?"العمالة / المقاطعة":lang==="fr"?"Préfecture":"Prefecture"}</FieldLabel>
              <div style={{ position:"relative" }}>
                <select value={pf.prefecture} onChange={function(e){ setField("prefecture")(e.target.value); setSubmitErr(""); }}
                  style={{ width:"100%", padding:"13px 36px 13px 14px", appearance:"none", WebkitAppearance:"none",
                    background:"rgba(255,255,255,.04)", border:"1.5px solid "+(pf.prefecture ? C.gr : C.gold),
                    borderRadius:11, color: pf.prefecture ? C.wh : C.mu, fontSize:13, cursor:"pointer", boxSizing:"border-box" }}>
                  <option value="">{ar?"اختر":lang==="fr"?"Choisir...":"Select..."}</option>
                  {CASA_OPTIONS.map(function(o){ return <option key={o} value={o}>{o}</option>; })}
                </select>
                <span style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)",
                  color:C.mu, pointerEvents:"none", fontSize:14 }}>▾</span>
              </div>
            </div>
          )}

          {/* Bottom CTA */}
          <button onClick={handleNext} style={{
            width:"100%", marginTop:24, padding:16,
            background: ok ? "linear-gradient(135deg,"+C.gold+","+C.goldL+")" : "rgba(255,255,255,.06)",
            color: ok ? C.bg : C.mu,
            border: ok ? "none" : "1.5px solid "+C.bdr,
            borderRadius:14, fontFamily:"inherit", fontSize:15, fontWeight:800,
            cursor:"pointer", boxShadow: ok ? "0 6px 24px "+C.goldG : "none",
            transition:"all .25s", display:"flex", alignItems:"center", justifyContent:"center", gap:10
          }}>
            {ok && <span>✓</span>}
            <span>{ar?"التالي →":lang==="fr"?"Suivant →":"Next →"}</span>
          </button>
        </div>
      </div>
    </div>
  );
}

/* ─── WELCOME ────────────────────────────────────────────────────────────── */
function Welcome({ lang, setLang, user, onStart, onLogout }) {

    { n: ar?"مقياس الخمسة الكبار":lang==="fr"?"Big Five Personnalité":"Big Five Personality", d:"25Q · ~15min", ic:"🧠", col:C.gold },

        <div className="fadeUp" style={{ background:"linear-gradient(135deg,"+C.sur+","+C.cardB+")",

          <p style={{ fontSize:11, color:C.mu, marginBottom:4 }}>

          </h1>
          <p style={{ fontSize:11, color:C.muB, lineHeight:1.7 }}>
            {ar ? "أكمل الاختبارات الثلاثة للحصول على كود نتائجك." : lang==="fr" ? "Complétez les 3 tests pour obtenir votre code de résultats." : "Complete all 3 tests to receive your results code to share with your advisor."}
          </p>
        </div>
        {tests.map(function(t, i) {
          return (
            <div key={i} className="fadeUp" style={{ animationDelay:(i*0.07)+"s",

                display:"flex", alignItems:"center", gap:12,

                  justifyContent:"center", fontSize:21, flexShrink:0 }}>
                {t.ic}
              </div>
              <div style={{ flex:1 }}>
                <div className="sy" style={{ fontSize:12, fontWeight:700, color:C.wh, marginBottom:2 }}>{t.n}</div>
                <div style={{ fontSize:10, color:C.mu }}>{t.d}</div>
              </div>
              <div style={{ width:24, height:24, borderRadius:"50%", background:t.col,
                  display:"flex", alignItems:"center", justifyContent:"center",
                  fontSize:12, fontWeight:800, color:C.bg }}>
                {"①②③"[i]}
              </div>
            </div>
          );
        })}
        <button className="fadeUp" onClick={onStart}
          style={{ animationDelay:"0.24s", width:"100%", padding:16,
            background:"linear-gradient(135deg,"+C.gold+","+C.goldL+")",
            color:C.bg, border:"none", borderRadius:13, fontFamily:"inherit",
            fontSize:14, fontWeight:800, boxShadow:"0 7px 26px "+C.goldG, marginTop:4 }}>
          {ar ? "← ابدأ الاختبارات الثلاثة" : lang==="fr" ? "Commencer les 3 tests →" : "Begin All 3 Tests →"}
        </button>
      </div>
    </div>
  );
}

/* ─── ASSESSMENT ─────────────────────────────────────────────────────────── */
var TIMER_SECS  = 10;
var PHASE_SIZES  = [30, 25, 20, 16, 15, 10];
var PHASE_STARTS = [0,  30, 55, 75, 91, 106];
var PHASE_COLS   = [C.teal, C.gold, C.pu, "#4080e0", "#1db87a", "#dc4c3c"];
var PHASE_NAMES  = ["Holland", "Big Five", "Skill Up", "EQ-Map", "EntreMap", "ResiMap"];
var EQ_COLS  = { SEA:"#4080e0", OEA:"#1aabaa", UOE:"#d4a328", ROE:"#dc4c3c" };
var EN_COLS  = { EA:"#9050d0", SN:"#1db87a", ESE:"#e09030" };

function Assessment({ lang, setLang, user, onFinish }) {
  var ar = lang === "ar";
  var [idx, setIdx] = useState(0);
  var [timer, setTimer] = useState(TIMER_SECS);
  var ansRef = useRef({});
  var [, rerender] = useState(0);
  var timerRef = useRef(null);

  var q = ALL_Q[idx];
  var phase = 0;
  for (var _pi = PHASE_SIZES.length - 1; _pi >= 0; _pi--) {
    if (idx >= PHASE_STARTS[_pi]) { phase = _pi; break; }
  }
  var localI = idx - PHASE_STARTS[phase];
  var catKey = q.c || q.t || q.d || q.dim;
  var catCol = phase === 0 ? (C.hc[q.c] || C.teal) :
               phase === 1 ? (C.b5[q.t] || C.gold) :
               phase === 2 ? (C.su[q.d] || C.pu) :
               phase === 3 ? (EQ_COLS[q.dim] || "#4080e0") :
               phase === 4 ? (EN_COLS[q.dim] || "#1db87a") :
               "#dc4c3c";
  var cur = ansRef.current[idx];

  var OPTS_MAIN = {
    en:["Strongly Agree","Agree","Neutral","Disagree","Strongly Disagree"],
    fr:["Tout à fait d'accord","D'accord","Neutre","Pas d'accord","Pas du tout d'accord"],
    ar:["أوافق بشدة","أوافق","محايد","لا أوافق","لا أوافق بشدة"],
  };
  var OPTS_FREQ = {
    en:["Always","Often","Sometimes","Rarely","Never"],
    fr:["Toujours","Souvent","Parfois","Rarement","Jamais"],
    ar:["دائماً","كثيراً","أحياناً","نادراً","أبداً"],
  };
  var opts = (phase === 2 ? OPTS_FREQ[lang] : OPTS_MAIN[lang]) || OPTS_MAIN.en;

  var timedOut = useRef(false);

  function pickAns(sel) {
    ansRef.current = Object.assign({}, ansRef.current, { [idx]: sel });
    rerender(function(n) { return n + 1; });
    setTimeout(function() { goNext(); }, 320);
  }

  function goNext() {
    clearInterval(timerRef.current);
    var nxt = idx + 1;
    if (nxt >= ALL_Q.length) { onFinish(computeScores(ansRef.current)); return; }
    setIdx(nxt);
    setTimer(TIMER_SECS);
  }

  useEffect(function() {
    timedOut.current = false;
    timerRef.current = setInterval(function() {
      setTimer(function(s) {
        if (s <= 1) {
          clearInterval(timerRef.current);
          if (!timedOut.current) {
            timedOut.current = true;
            setTimeout(function() { goNext(); }, 0);
          }
          return 0;
        }
        return s - 1;
      });
    }, 1000);
    return function() { clearInterval(timerRef.current); };
  }, [idx]);

  function goBack() {
    clearInterval(timerRef.current);
    if (idx > 0) { setIdx(idx - 1); setTimer(TIMER_SECS); }
  }

  var timerCol = timer > 12 ? C.teal : timer > 6 ? C.am : C.re;
  var pct = Math.round((idx / ALL_Q.length) * 100);

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%", background:C.bg }}>
      <div className="noprint" style={{ background:C.sur, borderBottom:"1px solid "+C.bdr, padding:"9px 14px 11px", flexShrink:0 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:7 }}>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <span className="sy" style={{ fontSize:11, fontWeight:800, color:PHASE_COLS[phase] }}>{PHASE_NAMES[phase]}</span>
            <span style={{ width:1, height:12, background:C.bdr }}/>
            <span style={{ fontSize:10, color:C.mu }}>{localI+1}/{PHASE_SIZES[phase]}</span>
            <span style={{ fontSize:9, background:PHASE_COLS[phase]+"18", padding:"2px 7px", borderRadius:99, color:PHASE_COLS[phase], fontWeight:700 }}>{pct}%</span>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:9 }}>
            <LangBtn lang={lang} set={setLang}/>
            <div style={{ display:"flex", alignItems:"center", gap:4 }}>
              <svg width={44} height={44} style={{ transform:"rotate(-90deg)" }}>
                <circle cx={22} cy={22} r={18} fill="none" stroke={C.bdr} strokeWidth={4}/>
                <circle cx={22} cy={22} r={18} fill="none" stroke={timerCol} strokeWidth={4}
                  strokeDasharray={113.1} strokeDashoffset={113.1*(1-timer/TIMER_SECS)}
                  strokeLinecap="round" style={{ transition:"stroke-dashoffset .9s linear,stroke .3s" }}/>
              </svg>
              <span className="sy" style={{ fontSize:16, fontWeight:800, color:timerCol, minWidth:22 }}>{timer}</span>
            </div>
          </div>
        </div>
        <div style={{ display:"flex", gap:2, alignItems:"center" }}>
          <div style={{ flex:30, height:4, background:"rgba(255,255,255,.05)", borderRadius:99, overflow:"hidden" }}>
            <div style={{ height:"100%", width:Math.min(idx,30)/30*100+"%", background:C.teal, borderRadius:99, transition:"width .3s" }}/>
          </div>
          <div style={{ width:4, height:4, borderRadius:"50%", background:idx>=30?C.gr:C.bdr, flexShrink:0 }}/>
          <div style={{ flex:25, height:4, background:"rgba(255,255,255,.05)", borderRadius:99, overflow:"hidden" }}>
            <div style={{ height:"100%", width:Math.max(0,Math.min(idx-30,25))/25*100+"%", background:C.gold, borderRadius:99, transition:"width .3s" }}/>
          </div>
          <div style={{ width:4, height:4, borderRadius:"50%", background:idx>=55?C.gr:C.bdr, flexShrink:0 }}/>
          <div style={{ flex:20, height:4, background:"rgba(255,255,255,.05)", borderRadius:99, overflow:"hidden" }}>
            <div style={{ height:"100%", width:Math.max(0,Math.min(idx-55,20))/20*100+"%", background:C.pu, borderRadius:99, transition:"width .3s" }}/>
          </div>
          <div style={{ width:4, height:4, borderRadius:"50%", background:idx>=75?C.gr:C.bdr, flexShrink:0 }}/>
          <div style={{ flex:16, height:4, background:"rgba(255,255,255,.05)", borderRadius:99, overflow:"hidden" }}>
            <div style={{ height:"100%", width:Math.max(0,Math.min(idx-75,16))/16*100+"%", background:"#4080e0", borderRadius:99, transition:"width .3s" }}/>
          </div>
          <div style={{ width:4, height:4, borderRadius:"50%", background:idx>=91?C.gr:C.bdr, flexShrink:0 }}/>
          <div style={{ flex:15, height:4, background:"rgba(255,255,255,.05)", borderRadius:99, overflow:"hidden" }}>
            <div style={{ height:"100%", width:Math.max(0,Math.min(idx-91,15))/15*100+"%", background:"#1db87a", borderRadius:99, transition:"width .3s" }}/>
          </div>
          <div style={{ width:4, height:4, borderRadius:"50%", background:idx>=106?C.gr:C.bdr, flexShrink:0 }}/>
          <div style={{ flex:10, height:4, background:"rgba(255,255,255,.05)", borderRadius:99, overflow:"hidden" }}>
            <div style={{ height:"100%", width:Math.max(0,Math.min(idx-106,10))/10*100+"%", background:"#dc4c3c", borderRadius:99, transition:"width .3s" }}/>
          </div>
        </div>
      </div>

      {/* Full screen layout — 5 cards always visible */}
      <div style={{ flex:1, display:"flex", flexDirection:"column",
          padding:"10px 14px 10px", width:"100%", overflow:"hidden" }}>

        {/* Category badge */}
        <div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:8, flexShrink:0 }}>
          <span style={{ padding:"3px 11px", borderRadius:99, background:catCol+"22",
              border:"1px solid "+catCol+"55", fontSize:10, fontWeight:800, color:catCol,
              letterSpacing:.4, textTransform:"uppercase" }}>
            {catKey}
          </span>
          <span style={{ fontSize:10, color:C.mu }}>{PHASE_NAMES[phase]}</span>
        </div>

        {/* Question */}
        <div style={{ background:C.card, borderRadius:14, padding:"12px 16px",
            borderLeft:"4px solid "+catCol, marginBottom:10, flexShrink:0,
            boxShadow:"0 0 20px "+catCol+"22" }}>
          <p className={ar ? "ar" : ""} style={{ fontSize:14, fontWeight:600,
              lineHeight:1.55, color:C.wh, direction:ar?"rtl":"ltr", margin:0 }}>
            {q[lang] || q.en}
          </p>
        </div>

        {/* Answer cards */}
        <div style={{ flex:1, display:"flex", flexDirection:"column", gap:9, overflowY:"auto", paddingBottom:4 }}>
          {opts.map(function(label, i) {
            var isSel = cur === i;
            return (
              <button key={i} onClick={function() { pickAns(i); }}
                style={{
                  display:"flex", alignItems:"center", gap:12,
                  padding:"11px 16px",
                  background: isSel ? C.teal+"28" : C.card,
                  border:"2px solid " + (isSel ? C.teal : C.bdr),
                  borderRadius:12, textAlign:"left", cursor:"pointer",
                  fontFamily:"inherit", color:C.wh, fontSize:13, fontWeight:isSel?700:500,
                  animation: isSel ? "ansRing 1s ease-in-out infinite" : "none",
                  width:"100%", boxSizing:"border-box",
                  transition:"border .15s,background .15s",
                }}>
                <span style={{
                  width:27, height:27, borderRadius:"50%", flexShrink:0,
                  background: isSel ? C.teal : "transparent",
                  border:"2px solid " + (isSel ? C.teal : C.bdr),
                  display:"flex", alignItems:"center", justifyContent:"center",
                  fontSize:11, fontWeight:800, color:isSel?C.bg:C.mu,
                  transition:"all .15s"
                }}>{i+1}</span>
                <span className={ar?"ar":""} style={{ direction:ar?"rtl":"ltr", flex:1 }}>{label}</span>
              </button>
            );
          })}
        </div>

        {/* Back row */}
        <div style={{ flexShrink:0, display:"flex", gap:8, marginTop:4 }}>
          <button onClick={goBack} disabled={idx===0} className="noprint"
            style={{ padding:"10px 16px", background:"transparent", border:"1px solid "+C.bdr,
              borderRadius:12, color:C.mu, fontSize:12, fontWeight:600,
              opacity:idx===0?0.25:1, cursor:idx===0?"default":"pointer" }}>
            ←
          </button>
        </div>

      </div>
    </div>
  );
}

function buildCertificate(user, code, lang) {
  var ar = lang === "ar";
  var fr = lang === "fr";
  var title = ar ? "\u0634\u0647\u0627\u062f\u0629 \u062a\u0642\u064a\u064a\u0645 \u0645\u0633\u0627\u0631 \u0645\u0647\u0646\u064a" : fr ? "Certificat d'\u00c9valuation" : "Certificate of Assessment";
  var sub = ar ? "CareerMap V2 \u2014 \u062a\u0642\u064a\u064a\u0645 \u0627\u0644\u0627\u0633\u062a\u0639\u062f\u0627\u062f \u0627\u0644\u0645\u0647\u0646\u064a \u0648\u0627\u0644\u0634\u062e\u0635\u064a\u0629" : fr ? "\u00c9valuation des aptitudes professionnelles \u2014 V2" : "Career Aptitude & Personality Evaluation \u2014 V2";

    : fr
    ? "a compl\u00e9t\u00e9 avec succ\u00e8s l'\u00e9valuation psychom\u00e9trique <strong>CareerMap V2<\/strong>, couvrant les int\u00e9r\u00eats Holland, la personnalit\u00e9 Big Five, l'intelligence \u00e9motionnelle, l'entrepreneuriat et la r\u00e9silience."
    : "has successfully completed the <strong>CareerMap V2<\/strong> psychometric assessment, covering Holland Career Interests, Big Five Personality, Emotional Intelligence, Entrepreneurial Mindset, and Resilience.";
  var codeLabel = ar ? "\u0643\u0648\u062f \u0627\u0644\u0646\u062a\u0627\u0626\u062c" : fr ? "Code de R\u00e9sultats" : "Result Code";
  var dateLabel = ar ? "\u062a\u0627\u0631\u064a\u062e \u0627\u0644\u0625\u062a\u0645\u0627\u0645" : fr ? "Date de compl\u00e9tion" : "Date Completed";
  var printLabel = ar ? "\u0637\u0628\u0627\u0639\u0629" : fr ? "Imprimer" : "Print";
  var footNote = ar
    ? "\u062a\u0624\u0643\u062f \u0647\u0630\u0647 \u0627\u0644\u0634\u0647\u0627\u062f\u0629 \u0625\u062a\u0645\u0627\u0645 \u0627\u0644\u062a\u0642\u064a\u064a\u0645. \u0627\u0644\u0646\u062a\u0627\u0626\u062c \u0645\u062a\u0627\u062d\u0629 \u0644\u0644\u0645\u0633\u062a\u0634\u0627\u0631\u064a\u0646 \u0627\u0644\u0645\u0639\u062a\u0645\u062f\u064a\u0646 \u0639\u0628\u0631 \u0645\u0646\u0635\u0629 CareerMap."
    : fr
    ? "Ce certificat confirme la compl\u00e9tion de l'\u00e9valuation. Les r\u00e9sultats sont disponibles aux conseillers autoris\u00e9s via la plateforme CareerMap."
    : "This certificate confirms assessment completion. Results are available to authorized advisors via the CareerMap platform.";
  var dateStr = new Date().toLocaleDateString(ar ? "ar-SA" : fr ? "fr-FR" : "en-US");
  var name = (user && user.name) || "";
  var dir = ar ? "rtl" : "ltr";
  return '<!DOCTYPE html><html dir="' + dir + '"><head><meta charset="utf-8"><title>' + title + '</title><style>'
    + 'body{margin:0;background:#f8f4e8;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:Georgia,serif;}'
    + '.page{width:680px;background:#fff;padding:32px;box-sizing:border-box;}'

    + '.fi{border:2px solid #b8941f;padding:32px;text-align:center;}'
    + '.logo{font-size:52px;margin-bottom:6px;}'
    + '.org{font-size:12px;letter-spacing:3px;color:#888;text-transform:uppercase;margin-bottom:18px;}'
    + 'h1{font-size:24px;color:#b8941f;margin:0 0 4px;letter-spacing:1px;}'
    + '.sub{font-size:12px;color:#999;margin-bottom:22px;}'

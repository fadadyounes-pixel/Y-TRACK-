name: Setup Vercel Env
on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Set environment variables in Vercel
        shell: bash
        env:
          VT: ${{ secrets.VERCEL_TOKEN }}
          U_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          U_TKN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          GROQ: ${{ secrets.GROQ_API_KEY }}
          GEMINI: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 - <<'PYEOF'
import os, json, urllib.request

TOKEN = os.environ.get('VT', '')
if not TOKEN:
    print('ERROR: VERCEL_TOKEN secret is missing')
    exit(1)

def vreq(method, path, data=None):
    url = f"https://api.vercel.com{path}"
    headers = {"Authorization": f"Bearer {TOKEN}", "Content-Type": "application/json"}
    body = json.dumps(data).encode() if data else None
    req = urllib.request.Request(url, data=body, headers=headers, method=method)
    try:
        with urllib.request.urlopen(req) as r:
            return json.loads(r.read())
    except urllib.error.HTTPError as e:
        print(f"HTTP {e.code}: {e.read().decode()}")
        return {}

projects = vreq("GET", "/v9/projects").get("projects", [])
proj_id = next((p["id"] for p in projects if "y-track" in p.get("name","").lower()), None)
if not proj_id and projects:
    proj_id = projects[0]["id"]
if not proj_id:
    print("ERROR: No Vercel project found")
    exit(1)
print(f"Project: {proj_id}")

existing = {e["key"]: e["id"] for e in vreq("GET", f"/v9/projects/{proj_id}/env").get("envs", [])}

def upsert(key, value):
    if not value:
        print(f"Skip {key} (not provided)")
        return
    payload = {"key": key, "value": value, "type": "encrypted",
               "target": ["production", "preview", "development"]}
    if key in existing:
        vreq("PATCH", f"/v9/projects/{proj_id}/env/{existing[key]}", payload)
        print(f"Updated  {key}")
    else:
        vreq("POST", f"/v10/projects/{proj_id}/env", payload)
        print(f"Created  {key}")

upsert("UPSTASH_REDIS_REST_URL",   os.environ.get('U_URL',''))
upsert("UPSTASH_REDIS_REST_TOKEN", os.environ.get('U_TKN',''))
upsert("GROQ_API_KEY",             os.environ.get('GROQ',''))
upsert("GEMINI_API_KEY",           os.environ.get('GEMINI',''))
print("Done!")
PYEOF

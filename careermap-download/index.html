    + '.ft{margin-top:18px;font-size:9px;color:#bbb;}'
    + '@media print{.np{display:none;}body{background:#fff;}}'
    + '.pbtn{position:fixed;top:20px;right:20px;padding:10px 22px;background:#b8941f;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;}'
    + '</style></head><body>'
    + '<button class="pbtn np" onclick="window.print()">' + printLabel + '</button>'
    + '<div class="page"><div class="fo"><div class="fi">'
    + '<div class="logo">🧭</div>'
    + '<div class="org">CareerMap · Y-Track</div>'
    + '<h1>' + title + '</h1>'
    + '<div class="sub">' + sub + '</div>'
    + '<div class="pres">' + certFor + '</div>'
    + '<div class="cname">' + name + '</div>'
    + '<div class="desc">' + desc + '</div>'
    + '<div class="cbox"><div class="clbl">' + codeLabel + '</div><div class="cval">' + code + '</div></div>'
    + '<div class="desc">' + dateLabel + ': <strong>' + dateStr + '</strong></div>'
    + '<div class="ft">' + footNote + '</div>'
    + '</div></div></div>'
    + '</body></html>';
}

function CandidateCode({ lang, setLang, user, code, scores, profile, onLogout, onOptionalTests }) {
  var ar = lang === "ar";
  var [copied, setCopied] = useState(false);
  function doCopy() {
    try { navigator.clipboard.writeText(code); } catch(e) {}
    setCopied(true);
    setTimeout(function() { setCopied(false); }, 3000);
  }
  function doPrint() {
    var html = buildCertificate(user, code, lang);
    var w = window.open("", "_blank");
    if (w) { w.document.write(html); w.document.close(); }
  }
  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%", background:C.bg }}>
      <TopBar lang={lang} setLang={setLang} user={user} onLogout={onLogout}/>
      <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center",
          justifyContent:"center", padding:"20px 18px", maxWidth:420, margin:"0 auto", width:"100%" }}>
        <div className="fadeUp" style={{ width:"100%", textAlign:"center" }}>
          <div style={{ width:72, height:72, borderRadius:"50%", background:C.grG,
              border:"2px solid "+C.gr, display:"flex", alignItems:"center",
              justifyContent:"center", fontSize:34, margin:"0 auto 16px" }}>✅</div>
          <h2 className="sy" style={{ fontSize:20, fontWeight:800, color:C.wh, marginBottom:8 }}>
            {ar ? "أحسنت! اكتملت اختباراتك." : lang==="fr" ? "Félicitations ! Tests complétés." : "Assessment Complete!"}
          </h2>
          <p style={{ fontSize:12, color:C.muB, lineHeight:1.7, marginBottom:24 }}>
            {ar ? "شارك هذا الكود مع مستشارك للاطلاع على تقريرك الكامل." : lang==="fr" ? "Partagez ce code avec votre conseiller pour accéder à votre rapport complet." : "Share this code with your advisor to access your full career report."}
          </p>
          <div style={{ background:"linear-gradient(135deg,"+C.cardB+","+C.sur+")",
              borderRadius:18, padding:"22px 20px", border:"2px solid "+C.gold+"44",
              marginBottom:14, boxShadow:"0 0 36px "+C.goldG }}>
            <p style={{ fontSize:10, fontWeight:700, color:C.mu, letterSpacing:1.2, textTransform:"uppercase", marginBottom:8 }}>
              {ar ? "كود النتائج" : lang==="fr" ? "Code de Résultats" : "Result Code"}
            </p>
            <div className="sy" style={{ fontSize:28, fontWeight:800, color:C.goldL, letterSpacing:4, marginBottom:6, fontFamily:"monospace" }}>{code}</div>
            <p style={{ fontSize:9, color:C.mu }}>{user.name} · {new Date().toLocaleDateString()}</p>
          </div>
          <button onClick={doCopy}
            style={{ width:"100%", padding:14,
              background: copied ? "linear-gradient(135deg,"+C.gr+","+C.gr+"cc)" : "linear-gradient(135deg,"+C.gold+","+C.goldL+")",
              color:C.bg, border:"none", borderRadius:12,
              fontFamily:"inherit", fontSize:14, fontWeight:800,
              boxShadow:"0 6px 22px "+(copied?C.grG:C.goldG), marginBottom:10, transition:"all .3s" }}>
            {copied ? (ar?"تم النسخ ✓":lang==="fr"?"Copié ✓":"Copied ✓") : (ar?"نسخ الكود":lang==="fr"?"Copier le code":"Copy Code")}
          </button>

          <div style={{ background:"rgba(255,255,255,.04)", borderRadius:12, padding:"12px 16px", border:"1px solid "+C.bdr }}>
            <p style={{ fontSize:10, color:C.muB, lineHeight:1.8 }}>
              {ar ? "📋 احتفظ بهذا الكود وشاركه مع مستشارك." : lang==="fr" ? "📋 Conservez ce code et partagez-le avec votre conseiller." : "📋 Keep this code and share it with your advisor."}
            </p>
          </div>
          {onOptionalTests && (
            <button onClick={onOptionalTests} style={{ marginTop:12, width:"100%", padding:12,
              background:"rgba(26,171,170,.1)", color:"#1aabaa",
              border:"1px solid rgba(26,171,170,.3)", borderRadius:12,
              fontFamily:"inherit", fontSize:12, fontWeight:700, cursor:"pointer" }}>
              🌐 {ar?"اختبارات اللغة":lang==="fr"?"Tests de placement linguistique":"Language Placement Tests"}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

/* ─── REPORT ─────────────────────────────────────────────────────────────── */
function Report({ lang, setLang, user, profile, scores, onLogout, initRole, onShowReport }) {
  var ar = lang === "ar";
  var [tab, setTab] = useState(initRole || "candidate");
  var h = scores.h, b = scores.b, s = scores.s;
  var hTop = ranked(h), bTop = ranked(b);
  var ld = getLeadership(b, s, lang);
  var rm = getRoadmap(hTop[0] || "I", s, profile || {}, lang);
  var indh = getINDH(s, ld, profile || {}, lang, scores.eq, scores.entre);
  var ei = getEduIdx((profile && profile.edu) || "");
  var ac = ACADEMIC[hTop[0]] || ACADEMIC.I;
  var acList = ei >= 4 ? ac.hi : ac.lo;
  var el = (ei < 0 || ei >= 6) ? (ELEARN[hTop[0]] || ELEARN.I) : ei >= 4 ? (ELEARN_MID[hTop[0]] || ELEARN_MID.I) : (ELEARN_BASIC[hTop[0]] || ELEARN_BASIC.I);

  var B5D = {
    O:{hi:"Highly creative — thrives in novel environments",lo:"Prefers routine — reliable in stable roles"},
    C2:{hi:"Highly organised — excellent planner",lo:"Flexible & spontaneous — adapts well"},
    E2:{hi:"Energised by social interaction",lo:"Prefers solo work — focused"},
    A2:{hi:"Highly empathetic — great team player",lo:"Competitive and direct — strong in negotiation"},
    N:{hi:"High emotional sensitivity",lo:"Emotionally stable — calm under pressure"},
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%", background:C.bg }}>
      <TopBar lang={lang} setLang={setLang} user={user} onLogout={onLogout}/>
      <div style={{ background:C.sur, borderBottom:"1px solid "+C.bdr, padding:"12px 14px 0", flexShrink:0 }}>
        <h2 className="sy" style={{ color:C.wh, fontSize:13, fontWeight:800, marginBottom:2 }}>
          {ar ? "تقرير التقييم" : lang==="fr" ? "Rapport d'Évaluation" : "Assessment Report"}
        </h2>
        <p style={{ color:C.mu, fontSize:9, marginBottom:10 }}>
          {(profile && profile.name) || user.name} · {user.id} · {new Date().toLocaleDateString()}
        </p>
        <div style={{ display:"flex" }}>
          {[["candidate", "🎓 " + (ar?"تقرير المترشح":lang==="fr"?"Rapport Candidat":"Candidate Report")],
            ["advisor",   "🔒 " + (ar?"تقرير المستشار":lang==="fr"?"Rapport Conseiller":"Advisor Report")]
          ].map(function(item) {
            return (
              <button key={item[0]} onClick={function() { setTab(item[0]); }}
                style={{ flex:1, padding:"8px 6px", border:"none",
                  borderBottom:"2.5px solid " + (tab===item[0] ? C.goldL : "transparent"),
                  background:"transparent", color:tab===item[0] ? C.goldL : C.mu,
                  fontFamily:"inherit", fontSize:11, fontWeight:700 }}>
                {item[1]}
              </button>
            );
          })}
        </div>
      </div>

      <div style={{ flex:1, overflowY:"auto", padding:"12px 13px 40px", maxWidth:600, margin:"0 auto", width:"100%" }}>
        <button className="noprint"
          onClick={function() { onShowReport&&onShowReport(profile||{name:user.name,id:user.id,age:"-",gender:"-",edu:"-",region:"-"},scores,tab); }}
          style={{ width:"100%", padding:"9px 12px", background:C.goldP, color:C.goldL,
            border:"1px solid "+C.gold+"44", borderRadius:9, fontSize:11, fontWeight:700, marginBottom:12 }}>
          ⬡ {ar?"تحميل PDF":lang==="fr"?"Télécharger PDF":"Download PDF Report"}
        </button>

        {tab === "candidate" ? (
          <div>
            <Card glow={C.tealG}>
              <SectionHead icon="🎯" title={ar?"الملف المهني":lang==="fr"?"Profil de Carrière":"Career Profile — Holland"}/>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:7, marginBottom:12 }}>
                {hTop.map(function(code, i) {
                  return (
                    <div key={code} style={{ borderRadius:11, padding:"11px 6px", textAlign:"center",
                        background:i<2 ? C.hc[code]+"18" : "rgba(255,255,255,.03)",
                        border:"1.5px solid "+(i<2?C.hc[code]:C.bdr) }}>
                      <div className="sy" style={{ fontSize:22, fontWeight:800, color:C.hc[code] }}>{code}</div>
                      <div style={{ fontSize:9, color:C.mu, marginTop:1, fontWeight:600 }}>{HN[code]||code}</div>
                      <div style={{ fontSize:15, fontWeight:800, color:C.wh, marginTop:3 }}>{h[code]||0}%</div>
                    </div>
                  );
                })}
              </div>
              {["R","I","A","S","E","C"].map(function(code, i) {
                return (
                  <div key={code} style={{ marginBottom:10 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:3 }}>
                      <span style={{ fontSize:10, color:C.muB }}><span style={{ color:C.hc[code], fontWeight:700 }}>{code}</span> — {HN[code]}</span>
                      <span style={{ fontSize:10, fontWeight:800, color:C.wh }}>{h[code]||0}%</span>
                    </div>
                    <AnimBar pct={h[code]||0} col={C.hc[code]} delay={i*50}/>
                  </div>
                );
              })}
              <div style={{ marginTop:9 }}>
                <div style={{ fontSize:10, color:C.mu, marginBottom:5 }}>Top Career Paths:</div>
                <div style={{ display:"flex", flexWrap:"wrap", gap:5 }}>
                  {(CAREERS[hTop[0]] || []).map(function(job) {
                    return (
                      <span key={job} style={{ fontSize:9, fontWeight:600, color:C.hc[hTop[0]]||C.teal,
                          background:(C.hc[hTop[0]]||C.teal)+"14", padding:"2px 9px",
                          borderRadius:99, border:"1px solid "+(C.hc[hTop[0]]||C.teal)+"30" }}>
                        {job}
                      </span>
                    );
                  })}
                </div>
              </div>
            </Card>

            <Card glow={C.goldG}>
              <SectionHead icon="🧠" title={ar?"ملف الشخصية":lang==="fr"?"Personnalité":"Personality — Big Five"}/>
              {["O","C2","E2","A2","N"].map(function(t, i) {
                var desc = (b[t]||0) >= 60 ? (B5D[t]&&B5D[t].hi)||"" : (B5D[t]&&B5D[t].lo)||"";
                return (
                  <div key={t} style={{ marginBottom:12 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:2 }}>
                      <div>
                        <span className="sy" style={{ fontSize:11, fontWeight:700, color:C.b5[t] }}>{B5N[t]}</span>
                        <span style={{ display:"block", fontSize:9, color:C.mu, marginTop:1 }}>{desc}</span>
                      </div>
                      <span style={{ fontSize:10, fontWeight:800, color:C.wh }}>{b[t]||0}%</span>
                    </div>
                    <AnimBar pct={b[t]||0} col={C.b5[t]} delay={i*60}/>
                  </div>
                );

            </Card>

            <Card glow="rgba(144,80,208,.2)">
              <SectionHead icon="⚡" title={ar?"الاستعداد المهني":lang==="fr"?"Employabilité":"Employability — Skill Up"}/>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                {["A","E","C","R"].map(function(d, i) {
                  return (
                    <div key={d} style={{ background:"rgba(255,255,255,.04)", borderRadius:10, padding:10, border:"1px solid "+C.bdr }}>
                      <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
                        <span style={{ fontSize:9, fontWeight:700, color:C.su[d] }}>{SUN[d]}</span>
                        <span style={{ fontSize:12, fontWeight:800, color:C.wh }}>{s[d]||0}%</span>
                      </div>
                      <AnimBar pct={s[d]||0} col={C.su[d]} delay={i*55}/>

                <span style={{ fontSize:10, color:C.muB }}>Overall Employability: </span>

            <Card glow={C.grG}>
              <SectionHead icon="👑" title={ar?"ملف القيادة":lang==="fr"?"Profil de Leadership":"Leadership Profile"}/>
              <div style={{ display:"flex", alignItems:"center", gap:11, marginBottom:10, padding:"11px 12px", background:"rgba(255,255,255,.04)", borderRadius:11, border:"1px solid "+C.bdr }}>

                <div>
                  <div className="sy" style={{ fontSize:14, fontWeight:800, color:C.wh }}>{ld.style} Leader</div>

                </div>

              <p style={{ fontSize:11, color:C.muB, lineHeight:1.7, marginBottom:9 }}>{ld.desc}</p>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:7 }}>
                <div>
                  <div style={{ fontSize:9, fontWeight:700, color:C.gr, marginBottom:4 }}>✅ STRENGTHS</div>
                  {ld.str.map(function(x) { return <div key={x} style={{ fontSize:9, color:C.muB, padding:"3px 7px", background:C.gr+"0c", borderRadius:5, marginBottom:3 }}>• {x}</div>; })}
                </div>
                <div>
                  <div style={{ fontSize:9, fontWeight:700, color:C.am, marginBottom:4 }}>⚡ TO DEVELOP</div>
                  {ld.dev.map(function(x) { return <div key={x} style={{ fontSize:9, color:C.muB, padding:"3px 7px", background:C.am+"0c", borderRadius:5, marginBottom:3 }}>• {x}</div>; })}
                </div>
              </div>
            </Card>

            <Card>
              <SectionHead icon="🎓" title={ar?"التوجيه الأكاديمي":lang==="fr"?"Orientation Académique":"Academic Orientation"}/>
              <p style={{ fontSize:10, color:C.mu, marginBottom:8 }}>Based on <span style={{ color:C.teal, fontWeight:700 }}>{HN[hTop[0]]||hTop[0]}</span> profile &amp; education <span style={{ color:C.goldL, fontWeight:700 }}>{(profile&&profile.edu)||"—"}</span></p>
              {acList.map(function(p) { return <div key={p} style={{ padding:"8px 10px", background:C.teal+"08", border:"1px solid "+C.teal+"28", borderRadius:9, fontSize:10, color:C.wh, display:"flex", gap:7, marginBottom:5 }}><span style={{ color:C.teal, flexShrink:0 }}>🎓</span><span>{p}</span></div>; })}
            </Card>

            <Card>
              <SectionHead icon="💻" title={ar?"خارطة التعلم الإلكتروني":lang==="fr"?"E-Learning Roadmap":"E-Learning Roadmap"}/>
              <div style={{ padding:"7px 10px", background:C.goldP, borderRadius:8, border:"1px solid "+C.gold+"30", marginBottom:8, fontSize:10, color:C.goldL }}>Platforms: {el.p}</div>
              {el.cs.map(function(course) { return <div key={course} style={{ padding:"7px 10px", background:"rgba(255,255,255,.04)", borderRadius:8, border:"1px solid "+C.bdr, fontSize:10, color:C.wh, display:"flex", gap:7, marginBottom:5 }}><span>💻</span><span>{course}</span></div>; })}
              <div style={{ padding:"7px 10px", background:C.grG, borderRadius:8, border:"1px solid "+C.gr+"30", fontSize:10, color:C.gr, marginTop:6 }}>Certifications: {el.c}</div>
            </Card>

            <Card>
              <SectionHead icon="🗺️" title={ar?"خارطة المسار المهني":lang==="fr"?"Feuille de Route":"Career Roadmap"}/>
              {rm.map(function(step, i) {
                var colors = ["#e05050","#4080e0","#d4a328","#20b060","#9050d0"];
                return (
                  <div key={i} style={{ display:"flex", gap:9, marginBottom:8, alignItems:"flex-start" }}>
                    <div style={{ flexShrink:0, minWidth:82, background:"linear-gradient(135deg,"+C.gold+","+C.goldL+")", borderRadius:7, padding:"4px 7px", textAlign:"center", fontSize:8, fontWeight:800, color:C.bg, lineHeight:1.4 }}>{step.p}</div>
                    <div style={{ flex:1, background:"rgba(255,255,255,.04)", border:"1px solid "+C.bdr, borderLeft:"3px solid "+(colors[i]||C.gold), borderRadius:"0 8px 8px 0", padding:"7px 9px", fontSize:10, color:C.muB, lineHeight:1.6 }}>{step.a}</div>
                  </div>
                );
              })}
            </Card>

            <Card glow={C.tealG}>
              <SectionHead icon="🇲🇦" title={ar?"برامج INDH":lang==="fr"?"Programmes INDH Recommandés":"INDH Program Recommendations"}/>
              <div style={{ background:C.teal+"0a", borderRadius:10, padding:"9px 12px", marginBottom:11, border:"1px solid "+C.teal+"22", fontSize:10, color:C.muB, lineHeight:1.7 }}>
                {ar ? "بناءً على نتائجك، إليك برامج INDH Phase III الأنسب لوضعك." : "Based on your results, here are the most suitable INDH Phase III programs for your situation."}
              </div>
              {indh.map(function(rec, i) {
                return (
                  <div key={i} style={{ padding:"12px 13px", background:rec.col+"0c", borderRadius:12, border:"1px solid "+rec.col+"33", marginBottom:9 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:5 }}>
                      <span style={{ fontSize:18 }}>{rec.icon}</span>
                      <div style={{ flex:1 }}>
                        <span className="sy" style={{ fontSize:11, fontWeight:700, color:rec.col }}>{rec.prog}</span>
                      </div>
                      <span style={{ fontSize:8, fontWeight:800, color:rec.col, background:rec.col+"18", padding:"2px 8px", borderRadius:99, whiteSpace:"nowrap" }}>{rec.priority}</span>
                    </div>
                    <p style={{ fontSize:10, color:C.muB, lineHeight:1.7, marginBottom:6 }}>{rec.desc}</p>
                    <div style={{ padding:"5px 9px", background:rec.col+"12", borderRadius:7, fontSize:9, color:rec.col, fontWeight:600 }}>→ {rec.action}</div>
                  </div>
                );
              })}
            </Card>
          </div>
        ) : (
          <div>
            <div style={{ background:"linear-gradient(135deg,#2a0808,#5a1010)", borderRadius:12, padding:"12px 15px", marginBottom:12, display:"flex", gap:11, alignItems:"center" }}>
              <span style={{ fontSize:18 }}>🔒</span>
              <div>
                <div className="sy" style={{ color:"#f5b0b0", fontSize:10, fontWeight:800, letterSpacing:1.1 }}>
                  {ar ? "سري — للمستشار والمدير فقط" : "CONFIDENTIAL — ADVISOR / ADMIN ONLY"}
                </div>
                <div style={{ color:"rgba(245,176,176,.5)", fontSize:9, marginTop:1 }}>
                  {(profile&&profile.name)||user.name} · {new Date().toLocaleDateString()}
                </div>
              </div>
            </div>

            <Card>
              <SectionHead icon="🔍" title={ar?"الملخص التشخيصي":lang==="fr"?"Résumé Clinique":"Clinical Summary"}/>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:8, marginBottom:11 }}>
                {[[(hTop[0]||"–")+(hTop[1]||"–"),"Holland Code",C.teal],[avg(h)+"%","Holland Avg",C.gold],[avg(s)+"%","Employability",C.gr],[ld.score+"%","Leadership Readiness",C.pu]].map(function(item) {
                  return (
                    <div key={item[1]} style={{ background:"rgba(255,255,255,.04)", borderRadius:10, padding:"11px 9px", textAlign:"center", border:"1px solid "+C.bdr }}>
                      <div className="sy" style={{ fontSize:17, fontWeight:800, color:item[2] }}>{item[0]}</div>
                      <div style={{ fontSize:8, color:C.mu, marginTop:2, fontWeight:600, letterSpacing:.3, textTransform:"uppercase" }}>{item[1]}</div>
                    </div>
                  );
                })}
              </div>
            </Card>

            <Card>
              <SectionHead icon="📌" title={ar?"خطة التدخل":lang==="fr"?"Plan d'Intervention":"Intervention Plan"}/>
              <div style={{ overflowX:"auto" }}>
                <table style={{ width:"100%", borderCollapse:"collapse", fontSize:9 }}>
                  <thead>
                    <tr>{["Dimension","Score","Priority","Action"].map(function(hd) { return <th key={hd} style={{ background:C.cardB, color:C.muB, padding:"6px 8px", textAlign:"left", fontWeight:700 }}>{hd}</th>; })}</tr>
                  </thead>
                  <tbody>
                    {Object.keys(h).map(function(k) {
                      var v=h[k]||0, pi=v<45?0:v<65?1:2;
                      var pris=["🔴 High","🟡 Moderate","🟢 Strength"];
                      var acts=["Targeted intervention","Monitor & support","Leverage as asset"];
                      var pcols=[C.re,C.am,C.gr];
                      return <tr key={"h"+k} style={{ borderBottom:"1px solid "+C.bdr }}><td style={{ padding:"6px 8px", color:C.hc[k]||"#888", fontWeight:600 }}>Holland: {HN[k]||k} ({k})</td><td style={{ padding:"6px 8px", fontWeight:800, color:C.wh }}>{v}%</td><td style={{ padding:"6px 8px", fontWeight:600, color:pcols[pi] }}>{pris[pi]}</td><td style={{ padding:"6px 8px", color:C.muB }}>{acts[pi]}</td></tr>;
                    })}
                    {Object.keys(b).map(function(k) {
                      var v=b[k]||0, pi=v<45?0:v<65?1:2;
                      var pris=["🔴 High","🟡 Moderate","🟢 Strength"];
                      var acts=["Targeted intervention","Monitor & support","Leverage as asset"];
                      var pcols=[C.re,C.am,C.gr];
                      return <tr key={"b"+k} style={{ borderBottom:"1px solid "+C.bdr }}><td style={{ padding:"6px 8px", color:C.b5[k]||"#888", fontWeight:600 }}>Big Five: {B5N[k]||k}</td><td style={{ padding:"6px 8px", fontWeight:800, color:C.wh }}>{v}%</td><td style={{ padding:"6px 8px", fontWeight:600, color:pcols[pi] }}>{pris[pi]}</td><td style={{ padding:"6px 8px", color:C.muB }}>{acts[pi]}</td></tr>;
                    })}
                    {Object.keys(s).map(function(k) {
                      var v=s[k]||0, pi=v<45?0:v<65?1:2;
                      var pris=["🔴 High","🟡 Moderate","🟢 Strength"];
                      var acts=["Targeted intervention","Monitor & support","Leverage as asset"];
                      var pcols=[C.re,C.am,C.gr];
                      return <tr key={"s"+k} style={{ borderBottom:"1px solid "+C.bdr }}><td style={{ padding:"6px 8px", color:C.su[k]||"#888", fontWeight:600 }}>Skill Up: {SUN[k]||k}</td><td style={{ padding:"6px 8px", fontWeight:800, color:C.wh }}>{v}%</td><td style={{ padding:"6px 8px", fontWeight:600, color:pcols[pi] }}>{pris[pi]}</td><td style={{ padding:"6px 8px", color:C.muB }}>{acts[pi]}</td></tr>;
                    })}
                  </tbody>
                </table>
              </div>
            </Card>

            <Card glow={C.tealG}>
              <SectionHead icon="🇲🇦" title="INDH Recommendations"/>
              {indh.map(function(rec, i) {
                return (
                  <div key={i} style={{ padding:"10px 12px", background:rec.col+"0c", borderRadius:11, border:"1px solid "+rec.col+"33", marginBottom:8, display:"flex", gap:10, alignItems:"flex-start" }}>
                    <span style={{ fontSize:16, flexShrink:0 }}>{rec.icon}</span>
                    <div style={{ flex:1 }}>
                      <div className="sy" style={{ fontSize:10, fontWeight:700, color:rec.col, marginBottom:2 }}>{rec.prog}</div>
                      <p style={{ fontSize:9, color:C.muB, lineHeight:1.6 }}>{rec.action}</p>
                    </div>
                  </div>
                );
              })}
            </Card>

            <AdvisorNotes lang={lang} ar={ar}/>
          </div>
        )}
      </div>
    </div>
  );
}

function AdvisorNotes({ lang, ar }) {
  var [notes, setNotes] = useState("");
  var [saved, setSaved] = useState(false);
  return (
    <Card>
      <SectionHead icon="📝" title={ar?"ملاحظات الجلسة":lang==="fr"?"Notes de Session":"Session Notes"}/>
      <textarea value={notes} onChange={function(e) { setNotes(e.target.value); setSaved(false); }}
        style={{ width:"100%", height:80, background:"rgba(255,255,255,.04)", border:"1.5px solid "+C.bdr,
          borderRadius:9, padding:"8px 10px", color:C.wh, fontSize:11, resize:"vertical" }}
        placeholder="Private session notes…"/>
      <button onClick={function() { setSaved(true); }}
        style={{ marginTop:6, padding:"7px 18px",
          background:saved ? C.grG : C.cardB, color:saved ? C.gr : C.muB,
          border:"1px solid "+(saved?C.gr:C.bdr), borderRadius:8, fontFamily:"inherit", fontSize:10, fontWeight:700 }}>
        {saved ? (ar?"تم الحفظ ✓":"Saved ✓") : (ar?"حفظ":"Save Notes")}
      </button>
    </Card>
  );
}

/* ─── ADVISOR DASHBOARD ──────────────────────────────────────────────────── */
function AdvisorDash({ lang, setLang, user, onLogout, cands, onView, onShowReport }) {
  var ar = lang === "ar";
  var [inp, setInp] = useState("");
  var [err, setErr] = useState("");
  var [found, setFound] = useState(null);
  var [rpt, setRpt] = useState(null);

  function doEnroll() {
    var v = inp.trim().toUpperCase();
    if (!v) { setErr("Veuillez entrer un code."); return; }
    var i = cands.findIndex(function(c){
      return (c.code||"").toUpperCase()===v || c.id.toUpperCase()===v;
    });
    if (i < 0) { setFound(null); setErr("Code introuvable."); return; }
    setErr(""); setFound(cands[i]);
  }

  function openRep(role) {
    if (!found) return;
    try {
      var p  = found.profile||{name:found.name,id:found.id,age:"-",gender:"-",edu:"-",region:"-"};
      var sc = found.scores||{h:{},b:{},s:{}};
      setRpt({profile:p, scores:sc, role:role});
    } catch(e){ alert("Erreur: "+e.message); }
  }

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%", background:C.bg }}>
      <TopBar lang={lang} setLang={setLang} user={user} onLogout={onLogout}/>
      <div style={{ flex:1, overflowY:"auto", padding:"20px 16px" }}>
        <div style={{ width:"100%", maxWidth:500, margin:"0 auto" }}>
          <div style={{ textAlign:"center", marginBottom:28 }}>
            <div style={{ fontSize:36, marginBottom:8 }}>&#x1F454;</div>
            <h2 className="sy" style={{ fontSize:20, fontWeight:900, color:C.wh, marginBottom:4 }}>
              {lang==="fr"?"Espace Conseiller":"Advisor Portal"}
            </h2>
            <p style={{ fontSize:12, color:C.mu }}>{user.name}</p>
          </div>
          <div style={{ background:C.card, borderRadius:16, padding:"22px 20px",
              border:"1px solid "+C.bdr, marginBottom:14 }}>
            <p style={{ fontSize:12, color:C.mu, marginBottom:12 }}>
              {lang==="fr"?"Collez le code du candidat :":"Paste the candidate result code:"}
            </p>
            <div style={{ display:"flex", gap:8 }}>
              <input value={inp}
                onChange={function(e){setInp(e.target.value);setErr("");setFound(null);}}
                onKeyDown={function(e){if(e.key==="Enter")doEnroll();}}
                placeholder="RPT-AB12"
                style={{ flex:1, padding:"12px 14px", background:"rgba(255,255,255,.06)",
                  border:"1.5px solid "+(err?C.re:C.bdr), borderRadius:10,
                  color:C.wh, fontSize:14, letterSpacing:2, fontFamily:"monospace" }}/>
              <button onClick={doEnroll}
                style={{ padding:"12px 22px", background:"linear-gradient(135deg,"+C.pu+","+C.pu+"cc)",
                  color:"#fff", border:"none", borderRadius:10,
                  fontFamily:"inherit", fontSize:13, fontWeight:800, cursor:"pointer" }}>
                {lang==="fr"?"Inscrire":"Enroll"}
              </button>
            </div>
            {err&&<p style={{ color:C.re, fontSize:11, marginTop:8 }}>{err}</p>}
          </div>
          {found&&(
            <div style={{ background:C.card, borderRadius:16, padding:"20px",
                border:"1.5px solid "+C.teal+"55" }}>
              <div style={{ display:"flex", alignItems:"center", gap:12,
                  marginBottom:16, paddingBottom:14, borderBottom:"1px solid "+C.bdr }}>
                <div style={{ width:42, height:42, borderRadius:10, background:C.teal+"22",
                    border:"1px solid "+C.teal+"44", display:"flex", alignItems:"center",
                    justifyContent:"center", fontSize:22, flexShrink:0 }}>&#x1F393;</div>
                <div>
                  <div style={{ fontWeight:900, fontSize:15, color:C.wh }}>{found.name}</div>
                  <div style={{ fontSize:10, color:C.mu, fontFamily:"monospace" }}>{found.id}</div>

function AD_Donut({segs, size, thick, label, sub}) {
  size = size || 160; thick = thick || 26;
  var tot2 = segs.reduce(function(s,d){return s+d.v;},0)||1;
  var cx=size/2, cy=size/2, r=(size-thick)/2-2;
  var C2 = 2*Math.PI*r;
  var cum=0;
  var arcs = segs.map(function(s) {
    var dash=(s.v/tot2)*C2; var o=-cum; cum+=dash; return Object.assign({},s,{dash:dash,o:o});
  });
  return (
    <svg width={size} height={size} viewBox={"0 0 "+size+" "+size}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={AD_P.deep} strokeWidth={thick}/>
      {arcs.map(function(a,i){
        return <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={a.c} strokeWidth={thick-2}
          strokeDasharray={a.dash+" "+(C2-a.dash)} strokeDashoffset={a.o}
          transform={"rotate(-90 "+cx+" "+cy+")"}/>;
      })}
      {label!=null&&(
        <g>
          <text x={cx} y={cy+2} textAnchor="middle" dominantBaseline="middle" fill={AD_P.bright} fontSize="21" fontWeight="800" fontFamily="Archivo,Arial,sans-serif">{label}</text>
          {sub&&<text x={cx} y={cy+18} textAnchor="middle" fill={AD_P.muted} fontSize="10" fontFamily="Archivo,Arial,sans-serif">{sub}</text>}
        </g>
      )}
    </svg>
  );
}

function AD_HBar({rows, barColor}) {

  return (

function AD_Spark({data, color, h}) {
  color = color || AD_P.teal; h = h || 80;
  if(!data||data.length<2) return null;
  var W=400, H=h, pad={l:6,r:6,t:10,b:6};
  var mx=Math.max.apply(null,data.concat([1])), mn=0, range=mx-mn||1;
  var w=W-pad.l-pad.r, hh=H-pad.t-pad.b;
  var xs=data.map(function(_,i){return pad.l+(i/(data.length-1))*w;});
  var ys=data.map(function(v){return pad.t+hh-((v-mn)/range)*hh;});
  var line=xs.map(function(x,i){return (i===0?'M':'L')+x.toFixed(1)+","+ys[i].toFixed(1);}).join(' ');
  var area=line+" L"+xs[xs.length-1]+","+(pad.t+hh)+" L"+xs[0]+","+(pad.t+hh)+" Z";
  var gid="adsg"+color.replace('#','');
  return (
    <svg width="100%" viewBox={"0 0 "+W+" "+H} preserveAspectRatio="none" style={{display:'block'}}>
      <defs>
        <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.32"/>
          <stop offset="100%" stopColor={color} stopOpacity="0.02"/>
        </linearGradient>
      </defs>
      <path d={area} fill={"url(#"+gid+")"}/>
      <path d={line} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
      {xs.map(function(x,i){return <circle key={i} cx={x} cy={ys[i]} r="3" fill={color} stroke={AD_P.card} strokeWidth="1.5"/>;})}
    </svg>
  );
}

function AD_Radar({data, size}) {
  size = size || 190;
  var n=data.length, cx=size/2, cy=size/2, maxR=size/2-22;
  var ang=function(i){return -Math.PI/2+i*(2*Math.PI/n);};
  var pt=function(i,r){return [cx+r*Math.cos(ang(i)),cy+r*Math.sin(ang(i))];};
  var rings=[0.25,0.5,0.75,1];
  var pts=data.map(function(v,i){return pt(i,(v/100)*maxR);});
  var RKEYS=["R","I","A","S","E","C"];
  return (
    <svg width={size} height={size} viewBox={"0 0 "+size+" "+size}>
      {rings.map(function(f,ri){
        return <polygon key={ri} points={RKEYS.map(function(_,i){return pt(i,maxR*f).join(',');}).join(' ')} fill="none" stroke={AD_P.border} strokeWidth="1"/>;
      })}
      {RKEYS.map(function(_,i){
        var p=pt(i,maxR);
        return <line key={i} x1={cx} y1={cy} x2={p[0]} y2={p[1]} stroke={AD_P.border} strokeWidth="1"/>;
      })}
      <polygon points={pts.map(function(p){return p.join(',');}).join(' ')} fill={AD_P.teal+"2a"} stroke={AD_P.teal} strokeWidth="2"/>
      {pts.map(function(p,i){return <circle key={i} cx={p[0]} cy={p[1]} r="3.5" fill={AD_P.teal} stroke={AD_P.card} strokeWidth="1.5"/>;})}
      {RKEYS.map(function(t,i){
        var p=pt(i,maxR+15);
        return <text key={i} x={p[0]} y={p[1]+4} textAnchor="middle" fill={AD_P.muted} fontSize="10" fontFamily="Archivo,Arial,sans-serif">{t}</text>;
      })}
    </svg>
  );
}

function AD_Label({children, mb}) {

    var b5Keys=[{k:"O",l:"Ouverture"},{k:"C2",l:"Consciencieux"},{k:"E2",l:"Extraversion"},{k:"A2",l:"Agréabilité"},{k:"N",l:"Stabilité émot."}];
    var b5Rows=b5Keys.map(function(item){
      var vs=withScores.filter(function(c){return c.scores.b&&c.scores.b[item.k]!=null;}).map(function(c){return c.scores.b[item.k];});
      return{label:item.l,v:vs.length?Math.round(vs.reduce(function(a,b){return a+b;},0)/vs.length):0,c:AD_P.purple};
    });
    var sKeys=[{k:"A",l:"Autonomie"},{k:"E",l:"Économique"},{k:"C",l:"Collaboration"},{k:"R",l:"Readiness"}];
    var skillRows=sKeys.map(function(item){
      var vs=withSkills.filter(function(c){return c.scores.s[item.k]!=null;}).map(function(c){return c.scores.s[item.k];});
      return{label:item.l,v:vs.length?Math.round(vs.reduce(function(a,b){return a+b;},0)/vs.length):0,c:AD_P.orange};
    });
    var empHigh=filtered.filter(function(c){return avg(c.scores&&c.scores.s||{})>=65;}).length;
    var empMid =filtered.filter(function(c){var e=avg(c.scores&&c.scores.s||{});return e>=45&&e<65;}).length;
    var empLow =filtered.filter(function(c){return avg(c.scores&&c.scores.s||{})<45;}).length;
    return (
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <AD_Card><AD_Label>Complétion par test</AD_Label><AD_HBar rows={compRows}/></AD_Card>
        <AD_Card><AD_Label>Type dominant RIASEC</AD_Label><AD_HBar rows={riasecRows}/></AD_Card>
        <AD_Card>
          <AD_Label>Profil RIASEC moyen</AD_Label>
          <div style={{display:'flex',justifyContent:'center',marginBottom:10}}><AD_Radar data={radarData} size={190}/></div>
          <div style={{display:'flex',justifyContent:'center',gap:16,flexWrap:'wrap'}}>
            {["R","I","A","S","E","C"].map(function(t,i){
              return <div key={t} style={{textAlign:'center'}}>
                <div style={{fontSize:11,fontWeight:700,color:AD_P.teal}}>{t}</div>
                <div style={{fontSize:13,fontWeight:800,color:AD_P.bright}}>{radarData[i]}</div>
              </div>;
            })}
          </div>
        </AD_Card>
        <AD_Card><AD_Label>Big Five OCEAN · Moyennes</AD_Label><AD_HBar rows={b5Rows}/></AD_Card>
        <AD_Card><AD_Label>Skill Up · Moyennes</AD_Label><AD_HBar rows={skillRows}/></AD_Card>
        <AD_Card>
          <AD_Label>Employabilité · Distribution</AD_Label>
          <div style={{display:'flex',alignItems:'center',gap:20,justifyContent:'center'}}>
            <AD_Donut segs={[{v:empHigh,c:AD_P.green},{v:empMid,c:AD_P.orange},{v:empLow,c:AD_P.red}]} size={140} thick={24} label={total} sub="candidats"/>
            <AD_DonutLegend items={[['Haute ≥65%',empHigh,AD_P.green],['Modérée 45–64%',empMid,AD_P.orange],['Faible <45%',empLow,AD_P.red]]} total={total}/>
          </div>
        </AD_Card>
      </div>
    );
  }

  function renderIndh() {
    var i01=filtered.filter(function(c){var t=ranked(c.scores&&c.scores.h||{})[0]||"";return t==="R"||t==="S"||t==="C";}).length;
    var i02=filtered.filter(function(c){var t=ranked(c.scores&&c.scores.h||{})[0]||"";return t==="E";}).length;
    var i03=filtered.filter(function(c){var t=ranked(c.scores&&c.scores.h||{})[0]||"";return t==="I"||t==="A";}).length;
    var routed=i01+i02+i03;
    var empRisk=filtered.filter(function(c){return hasScores(c)&&avg(c.scores.s||{})<45;}).length;
    var empHigh=filtered.filter(function(c){return avg(c.scores&&c.scores.s||{})>=65;}).length;
    var byReg={};
    filtered.forEach(function(c){
      var reg=getRegion(c);if(reg==="—")return;
      if(!byReg[reg])byReg[reg]={total:0,'01':0,'02':0,'03':0};
      byReg[reg].total++;
      var t=ranked(c.scores&&c.scores.h||{})[0]||"";
      if(t==="R"||t==="S"||t==="C")byReg[reg]['01']++;
      else if(t==="E")byReg[reg]['02']++;
      else if(t==="I"||t==="A")byReg[reg]['03']++;
    });
    var topReg=Object.entries(byReg).sort(function(a,b){return b[1].total-a[1].total;}).slice(0,6);
    return (
      <div style={{display:'flex',flexDirection:'column',gap:16}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
          <AD_Card>
            <AD_Label>Répartition INDH (estimée)</AD_Label>
            <div style={{display:'flex',alignItems:'center',gap:28,justifyContent:'center',padding:'6px 0'}}>
              <AD_Donut segs={[{v:i01,c:AD_P.teal},{v:i02,c:AD_P.orange},{v:i03,c:AD_P.green}]} size={175} thick={32} label={routed} sub="routés"/>
              <div style={{display:'flex',flexDirection:'column',gap:14}}>
                {[['01 Insertion professionnelle',i01,AD_P.teal],['02 Auto-Emploi',i02,AD_P.orange],['03 Coopérative',i03,AD_P.green]].map(function(item){
                  return (
                    <div key={item[0]} style={{display:'flex',alignItems:'center',gap:10}}>
                      <div style={{width:12,height:12,borderRadius:'50%',background:item[2],flexShrink:0}}/>
                      <div>
                        <div style={{fontSize:12,color:AD_P.muted}}>{item[0]}</div>
                        <span style={{fontSize:18,fontWeight:800,color:AD_P.bright}}>{item[1]}</span>
                        <span style={{fontSize:12,color:AD_P.muted3,marginInlineStart:8}}>{Math.round(item[1]/(routed||1)*100)}%</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </AD_Card>
          <AD_Card>
            <AD_Label>Indicateurs de risque</AD_Label>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              <div style={{background:AD_P.red+"18",border:"1px solid "+AD_P.red+"44",borderRadius:10,padding:'14px 16px'}}>
                <div style={{fontSize:11,fontWeight:700,color:AD_P.red,letterSpacing:'1px',textTransform:'uppercase',marginBottom:4}}>Risque d'abandon</div>
                <div style={{fontSize:24,fontWeight:800,color:AD_P.bright}}>{empRisk}</div>
                <div style={{fontSize:12,color:AD_P.red+"cc"}}>Score Skill Up &lt; 45%</div>
              </div>
              <div style={{background:AD_P.green+"18",border:"1px solid "+AD_P.green+"44",borderRadius:10,padding:'14px 16px'}}>
                <div style={{fontSize:11,fontWeight:700,color:AD_P.green,letterSpacing:'1px',textTransform:'uppercase',marginBottom:4}}>Profils forts</div>
                <div style={{fontSize:24,fontWeight:800,color:AD_P.bright}}>{empHigh}</div>
                <div style={{fontSize:12,color:AD_P.green+"cc"}}>Score Skill Up ≥ 65%</div>
              </div>
            </div>
          </AD_Card>
        </div>
        <AD_Card>
          <AD_Label>Répartition INDH par région</AD_Label>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead>
              <tr>{['Région','Total','01 Insertion','02 Auto-Emploi','03 Coopérative'].map(function(h){
                return <th key={h} style={{padding:'8px 12px',textAlign:'left',fontSize:11,fontWeight:700,color:AD_P.muted3,letterSpacing:'0.8px',borderBottom:"1px solid "+AD_P.border}}>{h}</th>;
              })}</tr>
            </thead>
            <tbody>
              {topReg.map(function(item,i){
                var reg=item[0]; var d=item[1];
                return (
                  <tr key={reg} style={{background:i%2===0?'transparent':AD_P.deep}}>
                    <td style={{padding:'10px 12px',fontSize:13,color:AD_P.body}}>{reg}</td>
                    <td style={{padding:'10px 12px',fontSize:13,fontWeight:700,color:AD_P.bright}}>{d.total}</td>
                    <td style={{padding:'10px 12px',fontSize:13,color:AD_P.teal}}>{d['01']||0}</td>
                    <td style={{padding:'10px 12px',fontSize:13,color:AD_P.orange}}>{d['02']||0}</td>
                    <td style={{padding:'10px 12px',fontSize:13,color:AD_P.green}}>{d['03']||0}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </AD_Card>
      </div>
    );
  }

  function renderConseillers() {

    return (
      <div style={{display:'flex',flexDirection:'column',gap:16}}>

                  <div style={{width:44,height:44,borderRadius:13,background:'linear-gradient(135deg,rgba(124,58,237,.3),rgba(109,40,217,.2))',border:'1.5px solid rgba(124,58,237,.3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:900,color:'#a78bfa',flexShrink:0}}>{init}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:800,fontSize:13,color:AD_P.bright}}>{a.name}</div>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginTop:3}}>
                      <code style={{fontSize:11,color:'#8b5cf6',fontWeight:700}}>{a.code}</code>
                      {a.createdAt&&<span style={{fontSize:9,color:AD_P.muted3}}>{a.createdAt}</span>}
                    </div>
                  </div>
                  <div style={{display:'flex',gap:6,flexShrink:0}}>
                    <button onClick={function(){copyCode(a.code);}}
                      style={{padding:'6px 11px',borderRadius:8,fontSize:10,fontWeight:700,cursor:'pointer',background:copied===a.code?'rgba(34,197,94,.15)':'rgba(255,255,255,.05)',color:copied===a.code?'#22c55e':'rgba(255,255,255,.4)',border:'1px solid '+(copied===a.code?'rgba(34,197,94,.25)':'rgba(255,255,255,.08)')}}>
                      {copied===a.code?"✓":"Copier"}
                    </button>
                    <button onClick={function(){if(!window.confirm('Supprimer "'+a.name+'"?'))return;onDeleteAdvisor(i);}}
                      style={{padding:'6px 10px',background:'rgba(239,68,68,.1)',color:'#ef4444',border:'1px solid rgba(239,68,68,.2)',borderRadius:8,fontSize:10,fontWeight:700,cursor:'pointer'}}>🗑</button>
                  </div>
                </div>
              );
            })}
          </AD_Card>
        )}
      </div>
    );
  }

  function renderDonnees() {
    return (
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        <AD_Card style={{padding:'12px 16px'}}>
          <div style={{display:'flex',gap:10,flexWrap:'wrap',alignItems:'center'}}>

              style={{flex:'1 1 160px',background:AD_P.deep,border:"1px solid "+AD_P.border,color:AD_P.body,borderRadius:8,padding:'6px 10px',fontSize:13,outline:'none'}}/>
            <select value={filterRegion} onChange={function(e){setFReg(e.target.value);}}

              <option value="">Toutes les régions</option>
              {Object.keys(regions).filter(function(r){return r!=="—";}).sort().map(function(r){return <option key={r} value={r}>{r}</option>;})}

            <button onClick={exportCSV} style={{background:AD_P.green+"22",border:"1px solid "+AD_P.green+"55",color:AD_P.green,borderRadius:8,padding:'6px 14px',fontSize:13,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap'}}>↓ CSV</button>

        <AD_Card style={{padding:0,overflow:'hidden'}}>
          <div style={{overflowX:'auto',maxHeight:500,overflowY:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',minWidth:820}}>
              <thead>
                <tr>
                  {[['savedAt','Date'],['name','Nom'],['gender','Genre'],['region','Région'],['prefecture','Préfecture'],['age','Âge'],['holland','RIASEC'],['emp','Emploi%']].map(function(col){

                        {col[1]}{active?<span style={{marginInlineStart:3,color:AD_P.teal}}>{sortDir==='asc'?'▲':'▼'}</span>:<span style={{marginInlineStart:3,color:AD_P.muted3}}>⇅</span>}
                      </th>

          <div style={{padding:'8px 14px',borderTop:"1px solid "+AD_P.border,fontSize:11,color:AD_P.muted3}}>

          </div>
        </AD_Card>
      </div>
    );

function AdminStats({ src, lang, ar }) {
  if (!src || src.length===0) {
    return <div style={{ padding:20,textAlign:"center",color:"#6b8aaa",fontSize:12 }}>No candidate data yet.</div>;
  }
  function cnt(arr){ var m={}; arr.forEach(function(v){m[v]=(m[v]||0)+1;}); return m; }
  function pct(n,t){ return t?Math.round(n/t*100):0; }
  function Bar({ label, value, max, color, total }) {
    var p = max?Math.round(value/max*100):0;
    return (
      <div style={{ marginBottom:8 }}>
        <div style={{ display:"flex",justifyContent:"space-between",fontSize:9,marginBottom:3 }}>
          <span style={{ color:"#8fadc8",maxWidth:"65%",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap" }}>{label}</span>
          <span style={{ color:color,fontWeight:700 }}>{value} <span style={{ color:"#6b8aaa" }}>({pct(value,total)}%)</span></span>
        </div>
        <div style={{ height:8,background:"rgba(255,255,255,.06)",borderRadius:99,overflow:"hidden" }}>
          <div style={{ height:"100%",width:p+"%",background:color,borderRadius:99,transition:"width .8s" }}/>
        </div>
      </div>
    );
  }
  function Section({ title, icon, children }) {
    return (
      <div style={{ background:"#0d1f33",border:"1px solid #1a3a55",borderRadius:14,padding:"14px",marginBottom:12 }}>
        <div style={{ fontSize:11,fontWeight:800,color:"#f0f4f8",marginBottom:12 }}>{icon} {title}</div>
        {children}
      </div>
    );
  }

  var total   = src.length;
  var genders = cnt(src.map(function(c){return (c.profile&&c.profile.gender)||"Unknown";}));
  var ages    = cnt(src.map(function(c){return (c.profile&&c.profile.age)||"Unknown";}));
  var regions = cnt(src.map(function(c){return (c.profile&&c.profile.region)||"Unknown";}));
  var edus    = cnt(src.map(function(c){return (c.profile&&c.profile.edu)||"Unknown";}));
  var statuses= cnt(src.map(function(c){return (c.profile&&c.profile.status)||"Unknown";}));
  var hollands= cnt(src.map(function(c){return ranked(c.scores&&c.scores.h||{})[0]||"Unknown";}));
  var HCOLS   = {R:"#1aabaa",I:"#8b5cf6",A:"#d4a328",S:"#22c55e",E:"#f97316",C:"#6b8aaa"};
  var HN      = {R:"Réaliste",I:"Investigateur",A:"Artistique",S:"Social",E:"Entrepreneur",C:"Conventionnel"};
  var maxReg  = Math.max.apply(null,Object.values(regions).concat([1]));
  var maxEdu  = Math.max.apply(null,Object.values(edus).concat([1]));
  var maxSt   = Math.max.apply(null,Object.values(statuses).concat([1]));

  var empScores= src.map(function(c){return avg(c.scores&&c.scores.s||{});});
  var avgEmp  = empScores.length?Math.round(empScores.reduce(function(a,b){return a+b;},0)/empScores.length):0;
  var high    = empScores.filter(function(v){return v>=65;}).length;
  var mid     = empScores.filter(function(v){return v>=45&&v<65;}).length;
  var low     = empScores.filter(function(v){return v<45;}).length;

  var avgH    = {R:0,I:0,A:0,S:0,E:0,C:0};
  var avgB5   = {O:0,C2:0,E2:0,A2:0,N:0};
  var avgSU   = {A:0,E:0,C:0,R:0};
  src.forEach(function(c){
    var h=c.scores&&c.scores.h||{}; var b=c.scores&&c.scores.b||{}; var s=c.scores&&c.scores.s||{};
    ["R","I","A","S","E","C"].forEach(function(k){avgH[k]+=(h[k]||0)/total;});
    ["O","C2","E2","A2","N"].forEach(function(k){avgB5[k]+=(b[k]||0)/total;});
    ["A","E","C","R"].forEach(function(k){avgSU[k]+=(s[k]||0)/total;});
  });

  return (
    <div style={{ padding:"12px" }}>
      <div style={{ display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12 }}>
        {[
          {label:"Total",value:total,color:"#1aabaa",icon:"👥"},
          {label:"Avg Empl.",value:avgEmp+"%",color:"#d4a328",icon:"⚡"},
          {label:"High ≥65%",value:high,color:"#22c55e",icon:"🟢"},
        ].map(function(k,i){
          return <div key={i} style={{ background:"#0d1f33",border:"1.5px solid "+k.color+"33",borderRadius:12,padding:"12px 10px",textAlign:"center" }}>
            <div style={{ fontSize:18 }}>{k.icon}</div>
            <div style={{ fontSize:"clamp(18px,4vw,24px)",fontWeight:900,color:k.color }}>{k.value}</div>
            <div style={{ fontSize:9,color:"#6b8aaa",marginTop:2 }}>{k.label}</div>
          </div>;
        })}
      </div>
      <Section title="Employability Distribution" icon="⚡">
        {[["🟢 High ≥65%",high,"#22c55e"],["🟡 Medium 45–64%",mid,"#d4a328"],["🔴 Low <45%",low,"#ef4444"]].map(function(item,i){
          return <Bar key={i} label={item[0]} value={item[1]} max={total} color={item[2]} total={total}/>;
        })}
        <div style={{ display:"flex",alignItems:"center",gap:10,marginTop:10,padding:"10px",background:"rgba(255,255,255,.03)",borderRadius:9 }}>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:9,color:"#6b8aaa",marginBottom:3 }}>Platform Average</div>
            <div style={{ height:10,background:"rgba(255,255,255,.06)",borderRadius:99,overflow:"hidden" }}>
              <div style={{ height:"100%",width:avgEmp+"%",background:"linear-gradient(90deg,#1aabaa,#d4a328)",borderRadius:99 }}/>
            </div>
          </div>
          <div style={{ fontSize:20,fontWeight:900,color:avgEmp>=65?"#22c55e":avgEmp>=45?"#d4a328":"#ef4444" }}>{avgEmp}%</div>
        </div>
      </Section>
      <Section title="Holland RIASEC — Average Scores" icon="🧰">
        {["R","I","A","S","E","C"].map(function(code){
          var v=Math.round(avgH[code]);
          return <Bar key={code} label={code+" — "+HN[code]} value={v} max={100} color={HCOLS[code]} total={100}/>;
        })}
      </Section>
      <Section title="Big Five OCEAN — Average Scores" icon="🌊">
        {[["O","Openness","#8b5cf6"],["C2","Conscientiousness","#8b5cf6"],["E2","Extraversion","#8b5cf6"],["A2","Agreeableness","#8b5cf6"],["N","Emot. Stability","#8b5cf6"]].map(function(item){
          var v=Math.round(avgB5[item[0]]);
          return <Bar key={item[0]} label={item[0].replace("2","")+" — "+item[1]} value={v} max={100} color={item[2]} total={100}/>;
        })}
      </Section>
      <Section title="Skill Up — Average Scores" icon="⚡">
        {[["A","Autonomie","#d4a328"],["E","Esprit Éco.","#d4a328"],["C","Collaboration","#d4a328"],["R","Readiness","#d4a328"]].map(function(item){
          var v=Math.round(avgSU[item[0]]);
          return <Bar key={item[0]} label={item[0]+" — "+item[1]} value={v} max={100} color={item[2]} total={100}/>;
        })}
      </Section>
      <Section title="Gender Distribution" icon="Gender">
        {Object.entries(genders).sort(function(a,b){return b[1]-a[1];}).map(function(item,i){
          return <Bar key={i} label={item[0]} value={item[1]} max={total} color={i===0?"#1aabaa":"#8b5cf6"} total={total}/>;
        })}
      </Section>
      <Section title="Age Distribution" icon="🎂">
        {["Under 18","18–20","21–24","25–29","30–35","36+"].map(function(age,i){
          var v=ages[age]||0;
          return v>0?<Bar key={i} label={age} value={v} max={total} color="#1aabaa" total={total}/>:null;
        })}
      </Section>
      {Object.keys(statuses).length>0 && (
        <Section title="Occupation Status" icon="💼">
          {Object.entries(statuses).sort(function(a,b){return b[1]-a[1];}).map(function(item,i){
            var cols=["#1aabaa","#8b5cf6","#d4a328","#22c55e","#f97316","#6b8aaa"];
            return <Bar key={i} label={item[0]} value={item[1]} max={maxSt} color={cols[i%cols.length]} total={total}/>;
          })}
        </Section>
      )}
      <Section title="Education Level" icon="🎓">
        {Object.entries(edus).sort(function(a,b){return b[1]-a[1];}).map(function(item,i){
          return <Bar key={i} label={item[0]} value={item[1]} max={maxEdu} color="#d4a328" total={total}/>;
        })}
      </Section>
      <Section title="Regional Distribution" icon="📍">
        {Object.entries(regions).sort(function(a,b){return b[1]-a[1];}).slice(0,8).map(function(item,i){
          return <Bar key={i} label={item[0]} value={item[1]} max={maxReg} color="#1aabaa" total={total}/>;
        })}
      </Section>
    </div>
  );
}

function LandingPage({ onStart, lang, setLang }) {
  var ar = lang === "ar";
  var fr = lang === "fr";
  var [ph, setPh] = React.useState(0);

  React.useEffect(function() {
    var t1 = setTimeout(function(){ setPh(1); }, 80);
    var t2 = setTimeout(function(){ setPh(2); }, 350);
    var t3 = setTimeout(function(){ setPh(3); }, 2000);
    var t4 = setTimeout(function(){ setPh(4); }, 2600);
    return function(){ [t1,t2,t3,t4].forEach(clearTimeout); };
  }, []);

  var TR = function(delay) {
    return "opacity .7s "+delay+"s cubic-bezier(.4,0,.2,1), transform .7s "+delay+"s cubic-bezier(.4,0,.2,1)";
  };

  return (
    <div dir={ar?"rtl":"ltr"} style={{
      height:"100%", width:"100%", overflow:"hidden", position:"relative",
      background:"radial-gradient(ellipse at 50% 40%, #081828 0%, #06111f 65%)",
      display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center"
    }}>

      {/* Language picker */}
      <div style={{ position:"absolute", top:18, right:18, display:"flex", gap:6, zIndex:10 }}>
        {["fr","en","ar"].map(function(l){
          return (
            <button key={l} onClick={function(){setLang(l);}}
              style={{ padding:"5px 11px", borderRadius:99, fontSize:10, fontWeight:800,
                background:lang===l?C.teal:"rgba(255,255,255,.06)",
                color:lang===l?C.bg:C.mu, border:"none",
                transition:"all .2s" }}>
              {l.toUpperCase()}
            </button>
          );
        })}
      </div>

      {/* Ambient beacon glow behind compass */}
      <div style={{
        position:"absolute", width:340, height:340, borderRadius:"50%", pointerEvents:"none",
        background:"radial-gradient(circle, rgba(26,171,170,.13) 0%, transparent 68%)",
        animation:"beaconPulse 5s ease-in-out infinite",
        opacity: ph>=1?1:0, transition:"opacity 1s"
      }}/>

      {/* ── COMPASS ── */}
      <div style={{
        marginBottom:36, position:"relative",
        opacity: ph>=1?1:0, transform: ph>=1?"scale(1)":"scale(.65)",
        transition:"opacity .8s cubic-bezier(.4,0,.2,1), transform .8s cubic-bezier(.34,1.56,.64,1)"
      }}>
        <svg viewBox="0 0 100 100" width={158} height={158} xmlns="http://www.w3.org/2000/svg">
          {/* Outer glow ring */}
          <circle cx="50" cy="50" r="48" fill="none"
            stroke="rgba(26,171,170,.08)" strokeWidth="4"/>

          {/* Main ring — draws in */}
          <circle cx="50" cy="50" r="46" fill="none"
            stroke={C.teal} strokeWidth="1.6"
            pathLength="1" strokeDasharray="1"
            strokeDashoffset={ph>=2?"0":"1"}
            style={{transition:"stroke-dashoffset 1.3s cubic-bezier(.4,0,.2,1) .1s"}}/>

          {/* Inner ring — draws in */}
          <circle cx="50" cy="50" r="38" fill="none"
            stroke="#1a3a55" strokeWidth=".8"
            pathLength="1" strokeDasharray="1"
            strokeDashoffset={ph>=2?"0":"1"}
            style={{transition:"stroke-dashoffset 1s cubic-bezier(.4,0,.2,1) .4s"}}/>

          {/* Cross lines */}
          {ph>=2 && <line x1="50" y1="10" x2="50" y2="90" stroke="#1a3a55" strokeWidth=".4"
            style={{opacity:0, animation:"fadeUp .3s 1.0s both"}}/>}
          {ph>=2 && <line x1="10" y1="50" x2="90" y2="50" stroke="#1a3a55" strokeWidth=".4"
            style={{opacity:0, animation:"fadeUp .3s 1.0s both"}}/>}

          {/* Cardinal labels */}
          {ph>=2 && [
            {l:"N", x:50, y:8.5, col:C.teal, sz:7, fw:"bold"},
            {l:"S", x:50, y:97, col:C.bdr,   sz:5, fw:"normal"},
            {l:"E", x:94, y:53, col:C.bdr,   sz:5, fw:"normal"},
            {l:"W", x:6,  y:53, col:C.bdr,   sz:5, fw:"normal"},
          ].map(function(c){
            return <text key={c.l} x={c.x} y={c.y} textAnchor="middle"
              fontFamily="Arial" fontWeight={c.fw} fontSize={c.sz} fill={c.col}
              style={{opacity:0, animation:"fadeUp .35s 1.1s both"}}>{c.l}</text>;
          })}

          {/* Degree ticks */}
          {ph>=2 && [0,45,90,135,180,225,270,315].map(function(deg){
            var rad = (deg-90)*Math.PI/180;
            var r1=42, r2=deg%90===0?38:40;
            return <line key={deg}
              x1={50+r1*Math.cos(rad)} y1={50+r1*Math.sin(rad)}
              x2={50+r2*Math.cos(rad)} y2={50+r2*Math.sin(rad)}
              stroke={deg%90===0?C.teal+"66":C.bdr} strokeWidth={deg%90===0?1:.5}
              style={{opacity:0, animation:"fadeUp .3s 1.2s both"}}/>;
          })}

          {/* Needle — spins and settles */}
          {ph>=2 && (
            <g style={{transformOrigin:"50px 50px",
                animation:"needleSettle 2.6s cubic-bezier(.34,1.56,.64,1) .9s both"}}>
              {/* North needle — gold */}
              <polygon points="50,15 53.5,50 50,43 46.5,50" fill={C.gold}/>
              {/* South needle — teal */}
              <polygon points="50,85 53.5,50 50,57 46.5,50" fill={C.teal} opacity=".85"/>
            </g>
          )}

          {/* East/West small arrows */}

function PlacementTest({ testType, questions, profile, lang, setLang, user, onLogout, onComplete }) {
  var isEn = testType === "english";
  var ac   = isEn ? "#1aabaa" : "#9050d0";
  var ar   = lang === "ar", fr = lang === "fr";

  var [idx, setIdx] = useState(0);
  var [cur, setCur] = useState(null);
  var [timer, setTimer] = useState(20);
  var ansRef   = useRef({});
  var timerRef = useRef(null);
  var timedOut = useRef(false);

  var q    = questions[idx];
  var maxT = (q.skill === "G" || q.skill === "V") ? 20 : 30;
  var pct  = Math.round(idx / questions.length * 100);
  var timerPct  = timer / maxT;
  var timerCol  = timerPct > 0.5 ? ac : timerPct > 0.25 ? C.am : C.re;

  var SKILL_LABEL = {
    G: isEn ? "Grammar" : "Grammaire",
    V: isEn ? "Vocabulary" : "Vocabulaire",
    R: isEn ? "Reading" : "Compréhension",
    W: isEn ? "Writing" : "Expression"
  };

  function pickAns(opt) {
    if (timedOut.current) return;
    timedOut.current = true;
    ansRef.current[idx] = opt;
    setCur(opt);
    setTimeout(function() { goNext(); }, 320);
  }

  function goNext() {
    clearInterval(timerRef.current);
    var nxt = idx + 1;
    if (nxt >= questions.length) {
      var ans = [];
      for (var i = 0; i < questions.length; i++) {
        var ch = ansRef.current[i];
        ans.push({ skill: questions[i].skill, correct: ch !== undefined && ch === questions[i].correct });
      }
      onComplete(scoreLanguageTest(ans, testType));
      return;
    }
    setIdx(nxt);
    setCur(null);
  }

  useEffect(function() {
    timedOut.current = false;
    setCur(null);
    var mt = (questions[idx].skill === "G" || questions[idx].skill === "V") ? 20 : 30;
    setTimer(mt);
    timerRef.current = setInterval(function() {
      setTimer(function(s) {
        if (s <= 1) {
          clearInterval(timerRef.current);
          if (!timedOut.current) {
            timedOut.current = true;
            setTimeout(function() { goNext(); }, 0);
          }
          return 0;
        }
        return s - 1;
      });
    }, 1000);
    return function() { clearInterval(timerRef.current); };
  }, [idx]);

  var parts   = q.text.split("\n\n");
  var passage = parts.length > 1 ? parts[0] : null;

function OrientaMapTest({ lang, setLang, user, onLogout, profile, onComplete, onBack }) {
  var ar = lang === "ar", fr = lang === "fr";

  var DIM_COL = { AR:"#1aabaa", LH:"#9050d0", TA:"#e09030", EE:"#1db87a", CS:"#dc4c3c" };
  var DIM_LABEL = {
    AR: ar?"التحليلي":fr?"Analytique":"Analytical",
    LH: ar?"اللغات والإنسانيات":fr?"Linguistique & Humanités":"Linguistic & Humanities",
    TA: ar?"التقني والتطبيقي":fr?"Technique & Appliqué":"Technical & Applied",
    EE: ar?"الاقتصادي والريادي":fr?"Économique & Entrepreneurial":"Economic & Entrepreneurial",
    CS: ar?"المدني والاجتماعي":fr?"Civique & Sciences Sociales":"Civic & Social Sciences"
  };
  var LIKERT = ar
    ? ["دائماً","كثيراً","أحياناً","نادراً","أبداً"]
    : fr ? ["Toujours","Souvent","Parfois","Rarement","Jamais"]
    : ["Always","Often","Sometimes","Rarely","Never"];
  var LVALS = [5,4,3,2,1];

  var [idx, setIdx] = useState(0);
  var [cur, setCur] = useState(null);
  var [timer, setTimer] = useState(10);
  var ansRef   = useRef({});
  var timerRef = useRef(null);
  var timedOut = useRef(false);

  var q       = ORIENTAMAP_QUESTIONS[idx];
  var ac      = DIM_COL[q.dim] || "#1aabaa";
  var pct     = Math.round(idx / ORIENTAMAP_QUESTIONS.length * 100);
  var timerCol = timer > 6 ? ac : timer > 3 ? C.am : C.re;
  var qText   = ar ? q.ar : fr ? q.fr : q.en;

  function pickAns(val) {
    if (timedOut.current) return;
    timedOut.current = true;
    ansRef.current[idx] = val;
    setCur(val);
    setTimeout(function() { goNext(); }, 320);
  }

  function goNext() {
    clearInterval(timerRef.current);
    var nxt = idx + 1;
    if (nxt >= ORIENTAMAP_QUESTIONS.length) {
      var ans = [];
      for (var i = 0; i < ORIENTAMAP_QUESTIONS.length; i++) {
        ans.push(ansRef.current[i] !== undefined ? ansRef.current[i] : 3);
      }
      onComplete(scoreOrientaMap(ans));
      return;
    }
    setIdx(nxt);
    setCur(null);
  }

  useEffect(function() {
    timedOut.current = false;
    setCur(null);
    setTimer(10);
    timerRef.current = setInterval(function() {
      setTimer(function(s) {
        if (s <= 1) {
          clearInterval(timerRef.current);
          if (!timedOut.current) {
            timedOut.current = true;
            setTimeout(function() { goNext(); }, 0);
          }
          return 0;
        }
        return s - 1;
      });
    }, 1000);
    return function() { clearInterval(timerRef.current); };
  }, [idx]);

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%", background:C.bg }}>
      {/* ── header ── */}
      <div style={{ background:C.sur, borderBottom:"1px solid "+C.bdr, padding:"9px 14px 11px", flexShrink:0 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:7 }}>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <span style={{ fontSize:11, fontWeight:800, color:ac }}>ORIENTAMAP</span>
            <span style={{ width:1, height:12, background:C.bdr }}/>
            <span style={{ fontSize:10, color:C.mu }}>{idx+1}/{ORIENTAMAP_QUESTIONS.length}</span>
            <span style={{ fontSize:9, background:ac+"18", padding:"2px 7px", borderRadius:99, color:ac, fontWeight:700 }}>{pct}%</span>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:4 }}>
            <LangBtn lang={lang} set={setLang}/>
            <svg width={44} height={44} style={{ transform:"rotate(-90deg)" }}>
              <circle cx={22} cy={22} r={18} fill="none" stroke={C.bdr} strokeWidth={4}/>
              <circle cx={22} cy={22} r={18} fill="none" stroke={timerCol} strokeWidth={4}
                strokeDasharray={113.1} strokeDashoffset={113.1*(1-timer/10)}
                strokeLinecap="round" style={{ transition:"stroke-dashoffset .9s linear,stroke .3s" }}/>
            </svg>
            <span style={{ fontSize:16, fontWeight:800, color:timerCol, minWidth:22 }}>{timer}</span>
          </div>
        </div>
        <div style={{ height:4, background:"rgba(255,255,255,.05)", borderRadius:99, overflow:"hidden" }}>
          <div style={{ height:"100%", width:pct+"%", background:ac, borderRadius:99, transition:"width .3s" }}/>
        </div>
      </div>

      {/* ── content ── */}
      <div style={{ flex:1, display:"flex", flexDirection:"column", padding:"10px 14px 10px", overflow:"hidden" }}>
        {/* dimension badge */}
        <div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:8, flexShrink:0 }}>
          <span style={{ padding:"3px 11px", borderRadius:99, background:ac+"22",
              border:"1px solid "+ac+"55", fontSize:10, fontWeight:800, color:ac,
              letterSpacing:.4, textTransform:"uppercase" }}>{q.dim}</span>
          <span style={{ fontSize:10, color:C.mu }}>{DIM_LABEL[q.dim]}</span>
        </div>
        {/* question */}
        <div style={{ background:C.card, borderRadius:14, padding:"12px 16px", marginBottom:10, flexShrink:0,
            borderLeft:"4px solid "+ac, boxShadow:"0 0 20px "+ac+"22" }}>
          <p style={{ fontSize:14, fontWeight:600, lineHeight:1.55, color:C.wh, margin:0,
              direction:ar?"rtl":"ltr", textAlign:ar?"right":"left" }}>{qText}</p>
        </div>
        {/* likert options */}
        <div style={{ flex:1, display:"flex", flexDirection:"column", gap:9, overflowY:"auto", paddingBottom:4 }}>
          {LVALS.map(function(val, i) {
            var isSel = cur === val;
            return (
              <button key={val} onClick={function() { pickAns(val); }}
                style={{ display:"flex", alignItems:"center", gap:12, padding:"13px 16px",
                  background: isSel ? ac+"33" : C.cardB,
                  border:"2px solid "+(isSel?ac:"rgba(255,255,255,.13)"), borderRadius:12,
                  textAlign:"left", cursor:"pointer", fontFamily:"inherit",
                  color:C.wh, fontSize:13, fontWeight:isSel?700:500,
                  animation: isSel ? "ansRing 1s ease-in-out infinite" : "none",
                  width:"100%", boxSizing:"border-box", transition:"border .15s,background .15s" }}>
                <span style={{ width:28, height:28, borderRadius:"50%", flexShrink:0,
                  background: isSel ? ac : "rgba(255,255,255,.08)",
                  border:"2px solid "+(isSel?ac:"rgba(255,255,255,.2)"),
                  display:"flex", alignItems:"center", justifyContent:"center",
                  fontSize:11, fontWeight:800, color:isSel?C.bg:C.body,
                  transition:"all .15s" }}>{val}</span>
                <span style={{ flex:1, color:isSel?C.wh:C.body }}>{LIKERT[i]}</span>
              </button>
            );
          })}
        </div>
        {/* back row */}
        <div style={{ flexShrink:0, display:"flex", gap:8, marginTop:4 }}>
          <button onClick={onBack}
            style={{ padding:"10px 16px", background:"transparent", border:"1px solid "+C.bdr,
              borderRadius:12, color:C.mu, fontSize:12, fontWeight:600, cursor:"pointer", opacity:0.7 }}>
            ←
          </button>
        </div>
      </div>
    </div>
  );
}

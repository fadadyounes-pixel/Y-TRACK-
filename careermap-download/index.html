                  <div style={{ display:"flex", justifyContent:"space-between", marginBottom:3 }}>
                    <span style={{ color:isTop?col:C.muB, fontSize:11, fontWeight:isTop?700:400 }}>{DIM_LABEL[code]}</span>
                    <span style={{ color:col, fontSize:11, fontWeight:700 }}>{score}/25</span>
                  </div>
                  <div style={{ background:C.bdr, borderRadius:4, height:6 }}>
                    <div style={{ width:pct+"%", height:6, background:col, borderRadius:4, transition:"width .6s" }}/>
                  </div>
                </div>
              );
            })}
          </div>

          {isLevel3 && (
            <div style={{ background:C.sur, borderRadius:12, padding:"14px 16px", marginBottom:16 }}>
              <div style={{ color:"#d4a328", fontSize:10, letterSpacing:2, fontWeight:700, marginBottom:10 }}>
                {ar?"الشعبة الموصى بها":fr?"FILIÈRE BAC RECOMMANDÉE":"RECOMMENDED BAC BRANCH"}
              </div>
              <div style={{ background:domColor, borderRadius:10, padding:"14px 18px" }}>
                <div style={{ color:"#06111f", fontSize:15, fontWeight:800 }}>{getBacBranch(dom,sec)}</div>
                <div style={{ color:"#06111f", fontSize:10, marginTop:4, opacity:0.8 }}>
                  {ar?"بناءً على ملفك الأكاديمي":fr?"Basé sur ton profil académique":"Based on your academic profile"}
                </div>
              </div>
            </div>
          )}

          {isLevel4 && insts && (
            <div style={{ background:C.sur, borderRadius:12, padding:"14px 16px", marginBottom:16 }}>
              <div style={{ color:"#d4a328", fontSize:10, letterSpacing:2, fontWeight:700, marginBottom:10 }}>
                {ar?"المؤسسات الموصى بها":fr?"ÉTABLISSEMENTS RECOMMANDÉS":"RECOMMENDED INSTITUTIONS"}
              </div>
              <div style={{ color:C.mu, fontSize:9, letterSpacing:2, marginBottom:6 }}>
                {ar?"الأولوية":fr?"PRIORITAIRES":"PRIORITY"}
              </div>
              {insts.primary.map(function(inst,i){
                return (
                  <div key={i} style={{ background:C.cardB, borderLeft:"3px solid "+domColor,
                      borderRadius:"0 8px 8px 0", padding:"10px 14px", marginBottom:6 }}>
                    <div style={{ color:C.wh, fontSize:12, fontWeight:700 }}>{inst}</div>
                  </div>
                );
              })}
              <div style={{ color:C.mu, fontSize:9, letterSpacing:2, marginBottom:6, marginTop:10 }}>
                {ar?"بدائل":fr?"ALTERNATIVES":"ALTERNATIVES"}
              </div>
              {insts.secondary.map(function(inst,i){
                return (
                  <div key={i} style={{ background:C.cardB, borderLeft:"3px solid "+C.bdr,
                      borderRadius:"0 8px 8px 0", padding:"10px 14px", marginBottom:6 }}>
                    <div style={{ color:C.muB, fontSize:12 }}>{inst}</div>
                  </div>
                );
              })}
            </div>
          )}

          {flags.length > 0 && (
            <div style={{ marginBottom:16 }}>
              {flags.map(function(flag,i){
                return (
                  <div key={i} style={{ background:C.sur, borderLeft:"3px solid "+flag.color,
                      borderRadius:"0 8px 8px 0", padding:"12px 16px", marginBottom:8 }}>
                    <div style={{ color:flag.color, fontSize:11 }}>
                      {"⚠ " + (ar?flag.ar:fr?flag.fr:flag.en)}
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          <button onClick={onRetake}
            style={{ width:"100%", background:domColor+"1a", color:domColor,
              border:"1px solid "+domColor+"44", borderRadius:10,
              padding:13, fontSize:13, fontWeight:700, cursor:"pointer", marginBottom:10, fontFamily:"inherit" }}>
            {ar?"إعادة الاختبار":fr?"Recommencer":"Retake"}
          </button>
          <button onClick={onBack}
            style={{ width:"100%", background:"transparent", color:C.mu,
              border:"1px solid "+C.bdr, borderRadius:10, padding:12,
              fontSize:12, fontWeight:600, cursor:"pointer", fontFamily:"inherit" }}>
            {ar?"← العودة":fr?"← Retour":"← Back"}
          </button>
        </div>
      </div>
    </div>
  );
}

function ReturningScreen({ lang, setLang, user, code, onLogout, onRetakeTests, onViewReport, onOptionalTests }) {
  var ar = lang === "ar";
  var fr = lang === "fr";
  var [copied, setCopied] = useState(false);
  function doCopy() {
    try { navigator.clipboard.writeText(code); } catch(e) {}
    setCopied(true); setTimeout(function() { setCopied(false); }, 3000);
  }
  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%", background:C.bg }}>
      <TopBar lang={lang} setLang={setLang} user={user} onLogout={onLogout}/>
      <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center",
          justifyContent:"center", padding:"20px 18px" }}>
        <div className="fadeUp" style={{ width:"100%", maxWidth:420, textAlign:"center" }}>
          <div style={{ width:72, height:72, borderRadius:"50%", background:"rgba(26,171,170,.15)",
              border:"2px solid #1aabaa", display:"flex", alignItems:"center",
              justifyContent:"center", fontSize:34, margin:"0 auto 16px" }}>👋</div>
          <h2 className="sy" style={{ fontSize:20, fontWeight:800, color:C.wh, marginBottom:8 }}>
            {ar ? "مرحباً مجدداً" : fr ? "Bon retour !" : "Welcome back!"}
          </h2>
          <p style={{ fontSize:12, color:C.muB, lineHeight:1.7, marginBottom:24 }}>
            {ar ? "لقد أكملت اختباراتك سابقاً. إليك كودك:"
                : fr ? "Vous avez déjà complété votre bilan. Voici votre code :"
                : "You've already completed your assessment. Here is your code:"}
          </p>
          <div style={{ background:"linear-gradient(135deg,"+C.cardB+","+C.sur+")",
              borderRadius:18, padding:"22px 20px", border:"2px solid "+C.gold+"44",
              marginBottom:14, boxShadow:"0 0 36px "+C.goldG }}>
            <p style={{ fontSize:10, fontWeight:700, color:C.mu, letterSpacing:1.2, textTransform:"uppercase", marginBottom:8 }}>
              {ar ? "كود النتائج" : fr ? "Code de Résultats" : "Result Code"}
            </p>
            <div className="sy" style={{ fontSize:28, fontWeight:800, color:C.goldL, letterSpacing:4, marginBottom:6, fontFamily:"monospace" }}>{code}</div>
            <p style={{ fontSize:9, color:C.mu }}>{user && user.name}</p>
          </div>
          <button onClick={doCopy}
            style={{ width:"100%", padding:14,
              background: copied ? "linear-gradient(135deg,"+C.gr+","+C.gr+"cc)" : "linear-gradient(135deg,"+C.gold+","+C.goldL+")",
              color:C.bg, border:"none", borderRadius:12, fontFamily:"inherit",
              fontSize:14, fontWeight:800, boxShadow:"0 6px 22px "+(copied?C.grG:C.goldG),
              marginBottom:16, cursor:"pointer", transition:"all .3s" }}>
            {copied ? (ar?"تم النسخ ✓":fr?"Copié ✓":"Copied ✓") : (ar?"نسخ الكود":fr?"Copier le code":"Copy Code")}
          </button>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:10 }}>
            <button onClick={onRetakeTests}
              style={{ padding:"14px 10px", background:"rgba(26,171,170,.12)",
                color:"#1aabaa", border:"1px solid rgba(26,171,170,.3)", borderRadius:12,
                fontFamily:"inherit", fontSize:12, fontWeight:800, cursor:"pointer" }}>
              {ar ? "إعادة الاختبارات" : fr ? "♻ Refaire les tests" : "♻ Retake Tests"}
            </button>
            <button onClick={onViewReport}
              style={{ padding:"14px 10px", background:"rgba(212,163,40,.12)",
                color:C.goldL, border:"1px solid rgba(212,163,40,.3)", borderRadius:12,
                fontFamily:"inherit", fontSize:12, fontWeight:800, cursor:"pointer" }}>
              {ar ? "🧭 التوجيه" : fr ? "🧭 Mon orientation" : "🧭 My Orientation"}
            </button>
          </div>
          {onOptionalTests && (
            <button onClick={onOptionalTests}
              style={{ width:"100%", padding:12, background:"rgba(144,80,208,.12)",
                color:"#9050d0", border:"1px solid rgba(144,80,208,.3)", borderRadius:12,
                fontFamily:"inherit", fontSize:12, fontWeight:800, cursor:"pointer" }}>
              {ar ? "🌐 اختبارات اللغة" : fr ? "🌐 Tests de langue (EN/FR)" : "🌐 Language Tests (EN/FR)"}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

function App() {
  injectCSS();
  var [lang, setLang] = useState("fr");
  var [screen, setScreen] = useState("login");
  var [user, setUser] = useState(null);
  var [profile, setProfile] = useState(null);
  var [scores, setScores] = useState({ h:{}, b:{}, s:{}, eq:{}, entre:{}, resi:{} });
  var [cands, setCands] = useState(function() { try { return JSON.parse(localStorage.getItem("cm_cands")||"[]"); } catch(e){ return []; } });
  var [viewIdx, setViewIdx] = useState(null);
  var [advisors, setAdvisors] = useState(function() { try { return JSON.parse(localStorage.getItem("cm_advisors")||"[]"); } catch(e){ return []; } });
  var [resultCode, setResultCode] = useState("");
  var [activePlacementTest, setActivePlacementTest] = useState(null);
  var [reportHTML, setReportHTML] = useState(null);
  var [showQR, setShowQR] = useState(false);

  // Firebase real-time sync (when configured), otherwise localStorage
  useEffect(function() {
    var unsubA, unsubC;
    try {
      if (!_db) throw new Error("no db");
      unsubA = _db.collection("advisors").onSnapshot(
        function(snap) { try { setAdvisors(snap.docs.map(function(d){ return Object.assign({ _docId: d.id }, d.data()); })); } catch(e){} },
        function(e){ console.error("advisors:", e); }
      );
      unsubC = _db.collection("candidates").onSnapshot(
        function(snap) { try { setCands(snap.docs.map(function(d){ return Object.assign({ _docId: d.id }, d.data()); })); } catch(e){} },
        function(e){ console.error("candidates:", e); }
      );
    } catch(e) {
      try { var a = JSON.parse(localStorage.getItem("cm_advisors")||"[]"); if(a.length) setAdvisors(a); } catch(err){}
      try { var c = JSON.parse(localStorage.getItem("cm_cands")||"[]"); if(c.length) setCands(c); } catch(err){}
    }
    return function(){ try { if(unsubA) unsubA(); if(unsubC) unsubC(); } catch(e){} };
  }, []);

  // localStorage fallback persistence (only when no Firebase)
  useEffect(function() { if (!_db) { try { localStorage.setItem("cm_cands", JSON.stringify(cands)); } catch(e){} } }, [cands]);
  useEffect(function() { if (!_db) { try { localStorage.setItem("cm_advisors", JSON.stringify(advisors)); } catch(e){} } }, [advisors]);

  function setLangDir(l) {
    setLang(l);
    if (typeof document !== "undefined") {
      document.documentElement.setAttribute("dir", l === "ar" ? "rtl" : "ltr");
    }
  }

  function onLogin(u) {
    setReportHTML(null);
    setUser(u);
    if (u.role === "admin")        setScreen("admin");
    else if (u.role === "advisor") setScreen("advisor");
    else {
      var existing = cands.find(function(c) { return c.id === u.id; });
      if (existing && existing.code) {
        setProfile(existing.profile || null);
        setScores(existing.scores || { h:{}, b:{}, s:{}, eq:{}, entre:{}, resi:{} });
        setResultCode(existing.code);
        setUser(function(prev) { return Object.assign({}, prev, { name: existing.name || u.id }); });
        setScreen("returning");
      } else {
        setScreen("profile");
      }
    }
  }

  function onLogout() {
    setUser(null); setProfile(null);
    setScores({ h:{}, b:{}, s:{}, eq:{}, entre:{}, resi:{} });
    setViewIdx(null); setResultCode(""); setReportHTML(null);
    setScreen("login");
  }

  function showReport(p, sc, role) {
    setReportHTML({profile:p||{name:user.name,id:user.id,age:'-',gender:'-',edu:'-',region:'-'},scores:sc||{h:{},b:{},s:{}},role:role});
  }

  function onPlacementComplete(result) {
    var field = result.test === "english" ? "englishMap" : "frenchMap";
    var newScores = Object.assign({}, scores);
    newScores[field] = result;
    setScores(newScores);
    // Save back to candidate record
    var updated = cands.map(function(c) {
      if (c.id !== user.id) return c;
      var newCandScores = Object.assign({}, c.scores, newScores);
      var updatedCand = Object.assign({}, c, { scores: newCandScores });
      if (_db && c._docId) {
        var upd = {}; upd["scores." + field] = result;
        _db.collection("candidates").doc(c._docId).update(upd).catch(function(e){ console.error(e); });
      }
      return updatedCand;
    });
    setCands(updated);
    setScreen(result.test === "english" ? "en-results" : "fr-results");
  }

  function onOrientaMapComplete(result) {
    var newScores = Object.assign({}, scores);
    newScores.orientamap = result;
    setScores(newScores);
    var updated = cands.map(function(c) {
      if (c.id !== user.id) return c;
      var updatedCand = Object.assign({}, c, { scores: Object.assign({}, c.scores, { orientamap: result }) });
      if (_db && c._docId) {
        _db.collection("candidates").doc(c._docId).update({ "scores.orientamap": result }).catch(function(e){ console.error(e); });
      }
      return updatedCand;
    });
    setCands(updated);
    setScreen("om-results");
  }

  function onProfile(pf) {
    var displayName = [pf.firstName, pf.lastName].filter(Boolean).join(" ") || user.id;
    var fullProfile = Object.assign({}, pf, { name:displayName, id:user.id });
    setProfile(fullProfile);
    setUser(function(u) { return Object.assign({}, u, { name:displayName }); });
    setScreen("welcome");
  }

  function onDeleteCand(c) {
    if (_db && c._docId) {
      _db.collection("candidates").doc(c._docId).delete().catch(function(e){ alert("Error: "+e.message); });
    } else {
      setCands(function(p){ return p.filter(function(x){ return x.id !== c.id; }); });
    }
  }

  function onFinish(sc) {
    var code = "RPT-" + user.id;
    var duplicate = cands.some(function(x){ return x.id === user.id; });
    if (duplicate && !window.confirm('This candidate already has a result. Save a new one?')) { setScreen("code"); setResultCode(code); return; }
    setScores(sc);
    setResultCode(code);
    var rec = {
      name: user.name, id: user.id, code: code,
      profile: Object.assign({}, profile || {}, { name:user.name, id:user.id }),
      scores: sc,
      savedAt: new Date().toISOString()
    };
    if (_db) {
      _db.collection("candidates").add(rec).catch(function(e){ console.error("save candidate:", e); });
      // onSnapshot will update cands automatically; also set locally for instant UI
      setCands(function(p) { return p.concat([rec]); });
    } else {
      setCands(function(p) { return p.concat([rec]); });
    }
    setScreen("code");
  }

  function onView(i) {
    var c = cands[i];
    setScores(c.scores);
    setProfile(c.profile);
    setViewIdx(i);
    setScreen("report-v");
  }

  function goBack() {
    setScreen(user && user.role === "admin" ? "admin" : "advisor");
  }

  function wrap(el) {
    return (
      <div style={{ width:"100%", height:"100%", display:"flex", flexDirection:"column", overflow:"hidden", position:"relative" }}>
        {el}
        {/* Floating QR share button */}
        <button
          onClick={function(){ setShowQR(true); }}
          title="Share QR Code"
          style={{
            position:"fixed", bottom:20, right:20, zIndex:9000,
            width:48, height:48, borderRadius:"50%",
            background:"#1aabaa", border:"none", cursor:"pointer",
            display:"flex", alignItems:"center", justifyContent:"center",
            boxShadow:"0 4px 16px #1aabaa66",
            padding:0
          }}>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#06111f" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="3" height="3"/>
            <rect x="18" y="14" width="3" height="3"/>
            <rect x="14" y="18" width="3" height="3"/>
            <rect x="18" y="18" width="3" height="3"/>
          </svg>
        </button>
        {showQR && <ShareQRModal onClose={function(){ setShowQR(false); }}/>}
      </div>
    );
  }

  var viewer = reportHTML ? <ReportViewer profile={reportHTML.profile} scores={reportHTML.scores} role={reportHTML.role} onClose={function(){ setReportHTML(null); }}/> : null;
  if (screen === "landing") return wrap(<LandingPage lang={lang} setLang={setLangDir} onStart={function(){ setScreen("login"); }}/>);
  if (screen === "login")   return wrap(<Login lang={lang} setLang={setLangDir} onLogin={onLogin} advisors={advisors}/>);
  if (screen === "returning") return wrap(
    <ReturningScreen lang={lang} setLang={setLangDir} user={user} code={resultCode} onLogout={onLogout}
      onRetakeTests={function() {
        setScores({ h:{}, b:{}, s:{}, eq:{}, entre:{}, resi:{} });
        setResultCode("");
        setScreen("welcome");
      }}
      onViewReport={function() { setScreen(scores && scores.orientamap ? "om-results" : "orientamap"); }}
      onOptionalTests={function() { setScreen("optional-tests"); }}
    />
  );
  if (screen === "orientamap") return wrap(
    <OrientaMapTest lang={lang} setLang={setLangDir} user={user} onLogout={onLogout}
      profile={profile} onComplete={onOrientaMapComplete}
      onBack={function(){ setScreen("returning"); }}/>
  );
  if (screen === "om-results") return wrap(
    <OrientaMapResults result={scores.orientamap||{}} profile={profile} scores={scores}
      lang={lang} setLang={setLangDir} user={user} onLogout={onLogout}
      onBack={function(){ setScreen("returning"); }}
      onRetake={function(){ setScreen("orientamap"); }}/>
  );
  if (screen === "profile") return wrap(<ProfileForm lang={lang} setLang={setLangDir} user={user} onNext={onProfile} onLogout={onLogout}/>);
  if (screen === "welcome") return wrap(<Welcome lang={lang} setLang={setLangDir} user={user} onStart={function(){ setScreen("assess"); }} onLogout={onLogout}/>);
  if (screen === "assess")  return wrap(<Assessment lang={lang} setLang={setLangDir} user={user} onFinish={onFinish}/>);
  if (screen === "code")    return wrap(<CandidateCode lang={lang} setLang={setLangDir} user={user} code={resultCode} scores={scores} profile={profile} onLogout={onLogout} onOptionalTests={function(){ setScreen("optional-tests"); }}/>);
  if (screen === "optional-tests") return wrap(
    <OptionalTests lang={lang} setLang={setLangDir} user={user} onLogout={onLogout} cands={cands} scores={scores}
      onStartTest={function(type){ setActivePlacementTest(type); setScreen(type==="english"?"en-test":"fr-test"); }}
      onBack={function(){ setScreen(resultCode?"code":"returning"); }}
    />
  );
  if (screen === "en-test") return wrap(
    <PlacementTest testType="english" questions={EN_QUESTIONS} profile={profile||{name:user&&user.name,id:user&&user.id}}
      lang={lang} setLang={setLangDir} user={user} onLogout={onLogout} onComplete={onPlacementComplete}/>
  );
  if (screen === "fr-test") return wrap(
    <PlacementTest testType="french" questions={FR_QUESTIONS} profile={profile||{name:user&&user.name,id:user&&user.id}}
      lang={lang} setLang={setLangDir} user={user} onLogout={onLogout} onComplete={onPlacementComplete}/>
  );
  if (screen === "en-results") return wrap(
    <PlacementResults result={scores.englishMap||{}} testType="english"
      profile={profile||{name:user&&user.name,id:user&&user.id}}
      lang={lang} setLang={setLangDir} user={user} onLogout={onLogout}
      onBack={function(){ setScreen("optional-tests"); }}/>
  );
  if (screen === "fr-results") return wrap(
    <PlacementResults result={scores.frenchMap||{}} testType="french"
      profile={profile||{name:user&&user.name,id:user&&user.id}}
      lang={lang} setLang={setLangDir} user={user} onLogout={onLogout}
      onBack={function(){ setScreen("optional-tests"); }}/>
  );
  if (screen === "report-v") {
    var cv = cands[viewIdx] || {};
    return wrap(<div style={{ position:"relative", flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
      <Report lang={lang} setLang={setLangDir} user={{ name:cv.name||"", id:cv.id||"", role:user.role }} profile={profile} scores={scores} onLogout={goBack} initRole="advisor" onShowReport={showReport}/>
      {viewer}
    </div>);
  }
  if (screen === "advisor") return wrap(<div style={{ position:"relative", flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
    <AdvisorDash lang={lang} setLang={setLangDir} user={user} onLogout={onLogout} cands={cands} onView={onView} onShowReport={showReport}/>
    {viewer}
  </div>);
  if (screen === "admin")   return wrap(<div style={{ position:"relative", flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
    <AdminDash lang={lang} setLang={setLangDir} user={user} onLogout={onLogout} cands={cands} onView={onView} advisors={advisors} onDeleteCand={onDeleteCand}
      onAddAdvisor={function(a){
        if (_db) {
          _db.collection("advisors").add(a).catch(function(e){ alert("Error saving advisor: " + e.message); });
        } else {
          setAdvisors(function(p){ return p.concat([a]); });
        }
      }}
      onDeleteAdvisor={function(i){
        var adv = advisors[i];
        if (_db && adv && adv._docId) {
          _db.collection("advisors").doc(adv._docId).delete().catch(function(e){ alert("Error deleting: " + e.message); });
        } else {
          setAdvisors(function(p){ return p.filter(function(_,x){ return x!==i; }); });
        }
      }}
      onShowReport={showReport}/>
    {viewer}
  </div>);
  return null;
}

const _root = ReactDOM.createRoot(document.getElementById("root"));
_root.render(React.createElement(ErrorBoundary, null, React.createElement(App)));

  </script>
  <script>
    // Hide loading once React renders
    var _obs = new MutationObserver(function(){
      var r = document.getElementById('root');
      if(r && r.children.length > 0){
        var l = document.getElementById('cm-loading');
        if(l) l.style.display = 'none';
        _obs.disconnect();
      }
    });
    _obs.observe(document.getElementById('root'), {childList:true,subtree:true});
    setTimeout(function(){
      var l = document.getElementById('cm-loading');
      if(l) l.style.display = 'none';
    }, 5000);
  </script>
  <script>
    if('serviceWorker' in navigator){
      window.addEventListener('load', function(){
        navigator.serviceWorker.register('sw.js').then(function(reg){
          reg.addEventListener('updatefound', function(){
            var newSW = reg.installing;
            if(!newSW) return;
            newSW.addEventListener('statechange', function(){
              if(newSW.state === 'activated') window.location.reload();
            });
          });
        }).catch(function(e){ console.warn('SW registration failed', e); });
        navigator.serviceWorker.addEventListener('controllerchange', function(){
          window.location.reload();
        });
      });
    }
  </script>
</body>
</html>
